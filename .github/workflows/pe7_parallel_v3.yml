name: PE7 · Parallel Pipeline v3

on:
  workflow_dispatch:
    inputs:
      target_set:
        description: '처리 세트: A | B | C | all'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - A
          - B
          - C
      run_mode:
        description: '실행 모드: fast | standard | deep'
        required: false
        default: 'standard'
        type: choice
        options:
          - fast
          - standard
          - deep
  schedule:
    - cron: '0 2 * * 3'  # 매주 수요일 02:00 UTC = 11:00 KST

env:
  PYTHON_VERSION: '3.12'
  OUTPUT_DIR: output/parallel

jobs:
  # ── 공통 초기화 ──────────────────────────────────────
  init:
    name: 🔧 Init
    runs-on: ubuntu-latest
    outputs:
      run_id: ${{ steps.meta.outputs.run_id }}
      run_date: ${{ steps.meta.outputs.run_date }}
      target_set: ${{ steps.meta.outputs.target_set }}
      run_mode: ${{ steps.meta.outputs.run_mode }}
    steps:
      - uses: actions/checkout@v4
      - name: Set run metadata
        id: meta
        run: |
          RUN_ID="parallel-$(date -u '+%Y%m%d-%H%M')"
          RUN_DATE=$(date -u '+%Y-%m-%d')
          TARGET="${{ github.event.inputs.target_set || 'all' }}"
          MODE="${{ github.event.inputs.run_mode || 'standard' }}"
          echo "run_id=${RUN_ID}" >> $GITHUB_OUTPUT
          echo "run_date=${RUN_DATE}" >> $GITHUB_OUTPUT
          echo "target_set=${TARGET}" >> $GITHUB_OUTPUT
          echo "run_mode=${MODE}" >> $GITHUB_OUTPUT
          echo "### 🔧 Parallel v3 Init" >> $GITHUB_STEP_SUMMARY
          echo "| Run ID | ${RUN_ID} |" >> $GITHUB_STEP_SUMMARY
          echo "| Target | ${TARGET} |" >> $GITHUB_STEP_SUMMARY
          echo "| Mode | ${MODE} |" >> $GITHUB_STEP_SUMMARY

  # ── 병렬 세트 A ──────────────────────────────────────
  run_set_a:
    name: ⚡ Set A
    needs: init
    if: needs.init.outputs.target_set == 'all' || needs.init.outputs.target_set == 'A'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r automation/requirements.txt
      - name: Run Set A
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RUN_ID: ${{ needs.init.outputs.run_id }}
          MODE: ${{ needs.init.outputs.run_mode }}
        run: |
          mkdir -p ${{ env.OUTPUT_DIR }}
          python automation/pe7_parallel_runner.py \
            --set A \
            --mode "$MODE" \
            --run-id "$RUN_ID" \
            --output "${{ env.OUTPUT_DIR }}/set_a.json"
      - uses: actions/upload-artifact@v4
        with:
          name: parallel-set-a-${{ needs.init.outputs.run_id }}
          path: ${{ env.OUTPUT_DIR }}/set_a.json

  # ── 병렬 세트 B ──────────────────────────────────────
  run_set_b:
    name: ⚡ Set B
    needs: init
    if: needs.init.outputs.target_set == 'all' || needs.init.outputs.target_set == 'B'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r automation/requirements.txt
      - name: Run Set B
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RUN_ID: ${{ needs.init.outputs.run_id }}
          MODE: ${{ needs.init.outputs.run_mode }}
        run: |
          mkdir -p ${{ env.OUTPUT_DIR }}
          python automation/pe7_parallel_runner.py \
            --set B \
            --mode "$MODE" \
            --run-id "$RUN_ID" \
            --output "${{ env.OUTPUT_DIR }}/set_b.json"
      - uses: actions/upload-artifact@v4
        with:
          name: parallel-set-b-${{ needs.init.outputs.run_id }}
          path: ${{ env.OUTPUT_DIR }}/set_b.json

  # ── 병렬 세트 C ──────────────────────────────────────
  run_set_c:
    name: ⚡ Set C
    needs: init
    if: needs.init.outputs.target_set == 'all' || needs.init.outputs.target_set == 'C'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r automation/requirements.txt
      - name: Run Set C
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RUN_ID: ${{ needs.init.outputs.run_id }}
          MODE: ${{ needs.init.outputs.run_mode }}
        run: |
          mkdir -p ${{ env.OUTPUT_DIR }}
          python automation/pe7_parallel_runner.py \
            --set C \
            --mode "$MODE" \
            --run-id "$RUN_ID" \
            --output "${{ env.OUTPUT_DIR }}/set_c.json"
      - uses: actions/upload-artifact@v4
        with:
          name: parallel-set-c-${{ needs.init.outputs.run_id }}
          path: ${{ env.OUTPUT_DIR }}/set_c.json

  # ── 병합 및 최종 보고 ─────────────────────────────────
  merge_and_report:
    name: 🔀 Merge & Report
    needs: [init, run_set_a, run_set_b, run_set_c]
    if: always() && needs.init.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r automation/requirements.txt
      - name: Download all parallel artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ env.OUTPUT_DIR }}/
          merge-multiple: true
      - name: Merge results
        env:
          RUN_ID: ${{ needs.init.outputs.run_id }}
          RUN_DATE: ${{ needs.init.outputs.run_date }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: |
          python automation/pe7_merge_results.py \
            --input-dir "${{ env.OUTPUT_DIR }}" \
            --run-id "$RUN_ID" \
            --run-date "$RUN_DATE" \
            --output "${{ env.OUTPUT_DIR }}/merged_${RUN_ID}.json"
          echo "### ✅ Parallel v3 완료 — ${RUN_ID}" >> $GITHUB_STEP_SUMMARY

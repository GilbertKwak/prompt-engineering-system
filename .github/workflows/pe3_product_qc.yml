name: PE3 · Product QC

on:
  push:
    paths:
      - 'products/**'
      - 'automation/**'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'

jobs:
  product_qc:
    name: 🔬 Product QC Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r automation/requirements.txt

      - name: Run QC
        run: |
          python automation/pe3_product_qc.py \
            --input-dir products/ \
            --output output/qc/

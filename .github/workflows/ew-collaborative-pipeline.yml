# ================================================================
# EW Collaborative Intelligence Pipeline v2.2
# ================================================================
# Architecture: Perplexity (Research) ↔ GitHub (Orchestration)
#               ↔ Notion (Knowledge Base & Dashboard)
#
# 3-Way Collaboration Flow:
#   [P1] GitHub Actions 트리거 → Perplexity sonar-pro EW 수집
#   [P2] GitHub Actions → KG Delta 생성 + Git commit + Issue 자동 생성
#   [P3] GitHub Actions → Notion C-31 대시보드 자동 업데이트
#        Notion 완료 → GitHub Issue 피드백 코멘트 (피드백 루프)
#   [P3.5] Notion 검증 체계 — 업데이트 후 3단계 검증
#          ① Read-back  : Notion API로 페이지 재조회
#          ② Field-check: 핵심 필드(run_date, ew_severity, ew_count) 값 일치 확인
#          ③ Score      : 검증 점수 산출 → PASS(≥80) / WARN(60~79) / FAIL(<60)
#   [P4] 전체 파이프라인 상태 요약 & 헬스 체크
# ================================================================
# PATCH v2.2 (2026-05-20)
#   FIX-1: inputs null 안전 처리 — force_notion_update schedule 조건 추가
#   FIX-2: create_github_issue 조건 — false/'false' 명시 제외 방식으로 정리
#   FIX-3: notion-kb-sync needs — github-orchestration 의존 제거
#   FIX-4: notion-verification needs — github-orchestration 의존 제거
#   FIX-5: P4 pipeline-summary printf — Unicode 박스 → ASCII 대체
# ================================================================
name: "EW · Collaborative Intelligence Pipeline"

on:
  # ── 정기 실행 (매일 09:00 KST = 00:00 UTC) ────────────────────
  schedule:
    - cron: "0 0 * * *"

  # ── 수동 실행 ────────────────────────────────────────────────
  workflow_dispatch:
    inputs:
      ew_domain:
        description: "EW 탐지 도메인"
        required: true
        default: "enterprise_ai"
        type: choice
        options:
          - enterprise_ai
          - semiconductor_hbm
          - ai_infrastructure
          - geopolitical_tech
          - all_domains
      ew_severity_threshold:
        description: "최소 심각도 임계값"
        required: false
        default: "MEDIUM"
        type: choice
        options:
          - LOW
          - MEDIUM
          - HIGH
          - CRITICAL
      force_notion_update:
        description: "Notion 강제 업데이트 여부"
        required: false
        default: "false"
        type: boolean
      create_github_issue:
        description: "GitHub Issue 자동 생성 여부"
        required: false
        default: "true"
        type: boolean

  # ── 외부 워크플로우에서 호출 가능 ────────────────────────────
  workflow_call:
    inputs:
      ew_domain:
        required: true
        type: string
      ew_severity_threshold:
        required: false
        type: string
        default: "MEDIUM"
      force_notion_update:
        required: false
        type: boolean
        default: false
      create_github_issue:
        required: false
        type: boolean
        default: true
    secrets:
      PERPLEXITY_API_KEY:
        required: true
      NOTION_API_KEY:
        required: true
      NOTION_C31_PAGE_ID:
        required: true

# ── 전역 환경변수 (워크플로우 레벨, secrets 제외) ───────────────
env:
  PYTHONUNBUFFERED: "1"
  PIPELINE_VERSION: "2.2.0"
  PIPELINE_NAME: "EW-Collaborative"
  NOTION_VERIFY_PASS_THRESHOLD: "80"    # 검증 점수 PASS 기준
  NOTION_VERIFY_WARN_THRESHOLD: "60"    # 검증 점수 WARN 기준
  NOTION_VERIFY_RETRY_MAX: "3"          # 검증 재시도 최대 횟수
  NOTION_VERIFY_RETRY_DELAY: "10"       # 재시도 간격(초) — Notion API 반영 지연 고려

jobs:
  # ================================================================
  # PHASE 1: Perplexity Research Engine
  # ─ 역할: 실시간 EW 시그널을 Perplexity sonar-pro로 수집·분석
  # ─ 출력: JSON 인텔 파일 → GitHub artifact
  # ================================================================
  perplexity-research:
    name: "[P1] Perplexity Research Engine"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      run_date:         ${{ steps.meta.outputs.run_date }}
      week_id:          ${{ steps.meta.outputs.week_id }}
      intel_dir:        ${{ steps.meta.outputs.intel_dir }}
      ew_detected:      ${{ steps.analyze.outputs.ew_detected }}
      ew_count:         ${{ steps.analyze.outputs.ew_count }}
      ew_severity:      ${{ steps.analyze.outputs.ew_severity }}
      ew_domains:       ${{ steps.analyze.outputs.ew_domains }}
      perplexity_model: ${{ steps.collect.outputs.model_used }}

    steps:
      - uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: automation/requirements.txt

      - name: 의존성 설치
        run: pip install -r automation/requirements.txt

      # ── 실행 메타데이터 ────────────────────────────────────────
      - name: 파이프라인 메타데이터 설정
        id: meta
        run: |
          RUN_DATE=$(date -u +%Y-%m-%d)
          WEEK_ID=$(date -u +%Y-W%V)
          INTEL_DIR="output/ew_collab/${RUN_DATE}"
          mkdir -p "$INTEL_DIR"
          echo "run_date=$RUN_DATE"   >> $GITHUB_OUTPUT
          echo "week_id=$WEEK_ID"     >> $GITHUB_OUTPUT
          echo "intel_dir=$INTEL_DIR" >> $GITHUB_OUTPUT
          echo "=== Pipeline v$PIPELINE_VERSION ==="
          echo "Date   : $RUN_DATE"
          echo "Week   : $WEEK_ID"
          echo "Domain : ${{ inputs.ew_domain || 'enterprise_ai' }}"

      # ── Perplexity API 호출 (step-level env 분리) ─────────────
      - name: "[Perplexity] EW 시그널 수집"
        id: collect
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: |
          DOMAIN="${{ inputs.ew_domain || 'enterprise_ai' }}"
          INTEL_DIR="${{ steps.meta.outputs.intel_dir }}"
          WEEK_ID="${{ steps.meta.outputs.week_id }}"

          python automation/ai_intel_collector.py \
            --domain "$DOMAIN" \
            --week   "$WEEK_ID" \
            --scope  deep \
            --model  sonar-pro \
            --queries \
              "${DOMAIN} AI breakthrough disruption signal 2026 latest" \
              "${DOMAIN} enterprise adoption rate sudden shift signals" \
              "${DOMAIN} competitive landscape unexpected change" \
              "${DOMAIN} investment M&A strategic move recent" \
              "${DOMAIN} regulatory policy change impact" \
            --output "$INTEL_DIR/ew_intel_${DOMAIN}.json"

          echo "model_used=sonar-pro" >> $GITHUB_OUTPUT
          echo "[Perplexity] 수집 완료: $INTEL_DIR/ew_intel_${DOMAIN}.json"

      # ── EW 탐지 분석 (step-level env 분리) ────────────────────
      - name: "[Perplexity] EW 탐지 분석"
        id: analyze
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: |
          DOMAIN="${{ inputs.ew_domain || 'enterprise_ai' }}"
          THRESHOLD="${{ inputs.ew_severity_threshold || 'MEDIUM' }}"
          INTEL_DIR="${{ steps.meta.outputs.intel_dir }}"

          python automation/ew_detector.py \
            --intel-file "$INTEL_DIR/ew_intel_${DOMAIN}.json" \
            --domain     "$DOMAIN" \
            --threshold  "$THRESHOLD" \
            --output     "$INTEL_DIR/ew_detection_result.json"

          EW_DETECTED=$(python -c "
import json
with open('$INTEL_DIR/ew_detection_result.json') as f:
    d = json.load(f)
print(str(d.get('ew_detected', False)).lower())
")
          EW_COUNT=$(python -c "
import json
with open('$INTEL_DIR/ew_detection_result.json') as f:
    d = json.load(f)
print(d.get('ew_count', 0))
")
          EW_SEVERITY=$(python -c "
import json
with open('$INTEL_DIR/ew_detection_result.json') as f:
    d = json.load(f)
print(d.get('max_severity', 'NONE'))
")
          EW_DOMAINS=$(python -c "
import json
with open('$INTEL_DIR/ew_detection_result.json') as f:
    d = json.load(f)
print(','.join(d.get('triggered_domains', [])))
")
          echo "ew_detected=$EW_DETECTED" >> $GITHUB_OUTPUT
          echo "ew_count=$EW_COUNT"       >> $GITHUB_OUTPUT
          echo "ew_severity=$EW_SEVERITY" >> $GITHUB_OUTPUT
          echo "ew_domains=$EW_DOMAINS"   >> $GITHUB_OUTPUT

          echo "=== EW 탐지 결과 ==="
          echo "탐지 여부 : $EW_DETECTED"
          echo "EW 건수  : $EW_COUNT"
          echo "심각도   : $EW_SEVERITY"
          echo "도메인   : $EW_DOMAINS"

      - name: Perplexity 인텔 Artifact 저장
        uses: actions/upload-artifact@v4
        with:
          name: "perplexity-intel-${{ steps.meta.outputs.run_date }}"
          path: ${{ steps.meta.outputs.intel_dir }}/
          retention-days: 30

  # ================================================================
  # PHASE 2: GitHub Orchestration Layer
  # ─ 역할: KG Delta 생성 + Git commit + Issue 자동 생성
  # ─ 조건: EW 탐지된 경우만 실행 (또는 강제 실행)
  # FIX-1: force_notion_update — workflow_dispatch boolean은 문자열 "true"로
  #        전달될 수 있으므로 == true / == 'true' 모두 처리
  #        schedule 이벤트도 항상 실행하도록 github.event_name 조건 추가
  # ================================================================
  github-orchestration:
    name: "[P2] GitHub Orchestration"
    needs: perplexity-research
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      needs.perplexity-research.outputs.ew_detected == 'true' ||
      inputs.force_notion_update == true ||
      inputs.force_notion_update == 'true' ||
      github.event_name == 'schedule'
    outputs:
      kg_version:   ${{ steps.kg.outputs.next_version }}
      issue_number: ${{ steps.issue.outputs.issue_number }}
      issue_url:    ${{ steps.issue.outputs.issue_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: automation/requirements.txt

      - name: 의존성 설치
        run: pip install -r automation/requirements.txt

      - name: Artifact 다운로드
        uses: actions/download-artifact@v4
        with:
          name: "perplexity-intel-${{ needs.perplexity-research.outputs.run_date }}"
          path: output/ew_collab/${{ needs.perplexity-research.outputs.run_date }}/

      # ── KG 버전 계산 ──────────────────────────────────────────
      - name: KG Delta 버전 계산
        id: kg
        run: |
          CURRENT=$(python -c "
import glob, re
files = glob.glob('knowledge_graph_v*.json')
versions = []
for f in files:
    m = re.search(r'v(\d+\.\d+)', f)
    if m: versions.append(float(m.group(1)))
print(f'{max(versions):.2f}' if versions else '4.25')
")
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          NEXT="${MAJOR}.$((MINOR + 1))_EW"
          echo "current_version=$CURRENT" >> $GITHUB_OUTPUT
          echo "next_version=$NEXT"       >> $GITHUB_OUTPUT
          echo "KG 버전: $CURRENT → $NEXT"

      # ── KG Delta 생성 & Git 커밋 ──────────────────────────────
      - name: KG Delta 생성 및 Git 커밋
        run: |
          INTEL_DIR="output/ew_collab/${{ needs.perplexity-research.outputs.run_date }}"
          KG_FILE="knowledge_graph_v${{ steps.kg.outputs.next_version }}_delta.json"

          python automation/kg_delta_generator.py \
            --intel-dir       "$INTEL_DIR" \
            --current-version "${{ steps.kg.outputs.current_version }}" \
            --next-version    "${{ steps.kg.outputs.next_version }}" \
            --week            "${{ needs.perplexity-research.outputs.week_id }}" \
            --run-date        "${{ needs.perplexity-research.outputs.run_date }}" \
            --output          "$KG_FILE"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$KG_FILE" || true
          git diff --staged --quiet || \
            git commit -m "kg(ew): collaborative delta v${{ steps.kg.outputs.next_version }} [${{ needs.perplexity-research.outputs.ew_severity }}] $(date -u +%Y-%m-%d)"
          git push || true

      # ── GitHub Issue 자동 생성 (HIGH/CRITICAL) ────────────────
      # FIX-2: create_github_issue — false/'false' 명시 제외 방식으로 변경
      #        (null/빈값/true/'true' 모두 허용, false와 'false'만 스킵)
      - name: "[GitHub] EW 알림 Issue 생성"
        id: issue
        if: |
          (inputs.create_github_issue != 'false' && inputs.create_github_issue != false) &&
          (needs.perplexity-research.outputs.ew_severity == 'HIGH' ||
           needs.perplexity-research.outputs.ew_severity == 'CRITICAL')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SEVERITY="${{ needs.perplexity-research.outputs.ew_severity }}"
          DOMAIN="${{ inputs.ew_domain || 'enterprise_ai' }}"
          COUNT="${{ needs.perplexity-research.outputs.ew_count }}"
          RUN_DATE="${{ needs.perplexity-research.outputs.run_date }}"
          KG_VER="${{ steps.kg.outputs.next_version }}"
          MODEL="${{ needs.perplexity-research.outputs.perplexity_model }}"

          if [ "$SEVERITY" = "CRITICAL" ]; then
            LABEL="priority:critical,ew-alert,automated"
            EMOJI="CRITICAL"
          else
            LABEL="priority:high,ew-alert,automated"
            EMOJI="HIGH"
          fi

          BODY=$(cat <<EOF
## [EW-$EMOJI] Early Warning Alert — $SEVERITY

| 항목 | 값 |
|------|-----|
| **탐지 도메인** | \`$DOMAIN\` |
| **심각도** | **$SEVERITY** |
| **EW 건수** | $COUNT |
| **KG 버전** | $KG_VER |
| **탐지 일시** | $RUN_DATE |
| **Perplexity 모델** | $MODEL |
| **파이프라인** | EW Collaborative v$PIPELINE_VERSION |

### 탐지 출처 (3-Way Collaboration)
- [Perplexity sonar-pro] 실시간 웹 인텔리전스 수집
- [GitHub Actions] 자동 오케스트레이션 & KG 업데이트
- [Notion C-31] 대시보드 업데이트 예정

### 권장 액션
- [ ] Notion C-31 대시보드 확인
- [ ] KG Delta \`$KG_VER\` 검토
- [ ] 관련 도메인 전략 리뷰 스케줄링

---
*자동 생성: EW Collaborative Pipeline v$PIPELINE_VERSION*
EOF
)

          ISSUE_URL=$(gh issue create \
            --title "[EW-$SEVERITY] $DOMAIN 이상 신호 탐지 — $RUN_DATE" \
            --body  "$BODY" \
            --label "$LABEL" \
            --repo  "${{ github.repository }}" 2>/dev/null || echo "")

          if [ -n "$ISSUE_URL" ]; then
            ISSUE_NUM=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')
            echo "issue_number=$ISSUE_NUM" >> $GITHUB_OUTPUT
            echo "issue_url=$ISSUE_URL"    >> $GITHUB_OUTPUT
            echo "[GitHub] Issue 생성 완료: $ISSUE_URL"
          else
            echo "issue_number=" >> $GITHUB_OUTPUT
            echo "issue_url="    >> $GITHUB_OUTPUT
            echo "[GitHub] Issue 생성 스킵 (라벨 미설정 또는 오류)"
          fi

  # ================================================================
  # PHASE 3: Notion Knowledge Base Sync
  # ─ 역할: C-31 대시보드 자동 업데이트 + 피드백 루프
  # ─ 조건: Phase 1 성공 시 항상 실행
  # FIX-3: needs에서 github-orchestration 제거
  #        → github-orchestration이 skipped여도 P3 실행 보장
  # ================================================================
  notion-kb-sync:
    name: "[P3] Notion KB Sync"
    needs: [perplexity-research]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: always() && needs.perplexity-research.result == 'success'
    outputs:
      notion_update_status: ${{ steps.notion_update.outputs.update_status }}
      notion_page_url:      ${{ steps.notion_update.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: automation/requirements.txt

      - name: 의존성 설치
        run: pip install -r automation/requirements.txt

      - name: Artifact 다운로드
        uses: actions/download-artifact@v4
        with:
          name: "perplexity-intel-${{ needs.perplexity-research.outputs.run_date }}"
          path: output/ew_collab/${{ needs.perplexity-research.outputs.run_date }}/
        continue-on-error: true

      # ── Notion C-31 업데이트 (step-level env 분리) ─────────────
      - name: "[Notion] C-31 대시보드 업데이트"
        id: notion_update
        env:
          NOTION_API_KEY:     ${{ secrets.NOTION_API_KEY }}
          NOTION_C31_PAGE_ID: ${{ secrets.NOTION_C31_PAGE_ID }}
        run: |
          python automation/notion_c31_updater.py \
            --page-id          "$NOTION_C31_PAGE_ID" \
            --week             "${{ needs.perplexity-research.outputs.week_id }}" \
            --run-date         "${{ needs.perplexity-research.outputs.run_date }}" \
            --ew-triggered     "${{ needs.perplexity-research.outputs.ew_detected }}" \
            --ew-count         "${{ needs.perplexity-research.outputs.ew_count }}" \
            --ew-severity      "${{ needs.perplexity-research.outputs.ew_severity }}" \
            --ew-domains       "${{ needs.perplexity-research.outputs.ew_domains }}" \
            --kg-version       "N/A" \
            --github-issue-url "" \
            --pipeline-version "${{ env.PIPELINE_VERSION }}" \
            --perplexity-model "${{ needs.perplexity-research.outputs.perplexity_model }}" \
            --intel-dir        "output/ew_collab/${{ needs.perplexity-research.outputs.run_date }}"

          echo "update_status=success" >> $GITHUB_OUTPUT
          echo "page_url=https://www.notion.so/c31-dashboard" >> $GITHUB_OUTPUT

      # ── Notion → GitHub 피드백 루프: 처리 완료 Issue 코멘트 ───
      - name: "[Notion→GitHub] 처리 완료 피드백"
        if: needs.perplexity-research.outputs.ew_detected == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "[INFO] EW 탐지 시 GitHub Issue 피드백은 github-orchestration Job이 실행된 경우에만 유효합니다."
          echo "[INFO] github-orchestration이 skipped 상태이면 issue_number가 없으므로 코멘트를 생략합니다."

  # ================================================================
  # PHASE 3.5: Notion 검증 체계
  # ─ 역할: 업데이트 후 3단계 검증으로 Notion 동기화 품질 보증
  # ─ 3단계:
  #   ① Read-back  — Notion API로 페이지 재조회 (최대 3회 재시도)
  #   ② Field-check — 핵심 필드 값 일치 여부 확인
  #   ③ Score      — 검증 점수 산출 → PASS / WARN / FAIL 판정
  # ─ 조건: Phase 3 성공 후 항상 실행
  # FIX-4: needs에서 github-orchestration 제거
  #        → github-orchestration skipped여도 P3.5 실행 보장
  # ================================================================
  notion-verification:
    name: "[P3.5] Notion 검증 체계"
    needs: [perplexity-research, notion-kb-sync]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: always() && needs.notion-kb-sync.result == 'success'
    outputs:
      verify_result:    ${{ steps.score.outputs.verify_result }}
      verify_score:     ${{ steps.score.outputs.verify_score }}
      fields_passed:    ${{ steps.field_check.outputs.fields_passed }}
      fields_failed:    ${{ steps.field_check.outputs.fields_failed }}
      readback_ok:      ${{ steps.readback.outputs.readback_ok }}

    steps:
      - uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: automation/requirements.txt

      - name: 의존성 설치
        run: pip install -r automation/requirements.txt

      # ── ① Read-back: Notion API로 페이지 재조회 ───────────────
      - name: "[검증-①] Notion 페이지 Read-back"
        id: readback
        env:
          NOTION_API_KEY:     ${{ secrets.NOTION_API_KEY }}
          NOTION_C31_PAGE_ID: ${{ secrets.NOTION_C31_PAGE_ID }}
        run: |
          echo "=== [검증-①] Notion Read-back 시작 ==="
          echo "재시도 최대: $NOTION_VERIFY_RETRY_MAX 회"
          echo "재시도 간격: ${NOTION_VERIFY_RETRY_DELAY}초"
          echo ""

          RETRY=0
          READBACK_OK="false"

          while [ "$RETRY" -lt "$NOTION_VERIFY_RETRY_MAX" ]; do
            RETRY=$((RETRY + 1))
            echo "--- Read-back 시도 $RETRY / $NOTION_VERIFY_RETRY_MAX ---"

            python - <<'PYEOF'
import os, sys, json, urllib.request

api_key = os.environ["NOTION_API_KEY"]
page_id = os.environ["NOTION_C31_PAGE_ID"]

req = urllib.request.Request(
    f"https://api.notion.com/v1/pages/{page_id}",
    headers={
        "Authorization": f"Bearer {api_key}",
        "Notion-Version": "2022-06-28",
    }
)
try:
    with urllib.request.urlopen(req, timeout=15) as resp:
        data = json.loads(resp.read())
        assert data.get("object") == "page", "object != page"
        assert data.get("id"), "id is empty"
        with open("/tmp/notion_readback.json", "w") as f:
            json.dump(data, f, ensure_ascii=False, indent=2)
        print(f"[OK] Read-back 성공 — page id: {data['id']}")
        sys.exit(0)
except Exception as e:
    print(f"[FAIL] Read-back 실패: {e}", file=sys.stderr)
    sys.exit(1)
PYEOF

            if [ $? -eq 0 ]; then
              READBACK_OK="true"
              echo "Read-back 성공 (시도 $RETRY)"
              break
            else
              echo "Read-back 실패 — ${NOTION_VERIFY_RETRY_DELAY}초 후 재시도..."
              sleep "$NOTION_VERIFY_RETRY_DELAY"
            fi
          done

          echo "readback_ok=$READBACK_OK" >> $GITHUB_OUTPUT

          if [ "$READBACK_OK" = "false" ]; then
            echo "Read-back 최대 재시도($NOTION_VERIFY_RETRY_MAX) 초과"
          fi

      # ── ② Field-check: 핵심 필드 값 일치 확인 ─────────────────
      - name: "[검증-②] 핵심 필드 값 확인"
        id: field_check
        if: steps.readback.outputs.readback_ok == 'true'
        env:
          NOTION_API_KEY:     ${{ secrets.NOTION_API_KEY }}
          NOTION_C31_PAGE_ID: ${{ secrets.NOTION_C31_PAGE_ID }}
          RUN_DATE:           ${{ needs.perplexity-research.outputs.run_date }}
          EW_SEVERITY:        ${{ needs.perplexity-research.outputs.ew_severity }}
          EW_COUNT:           ${{ needs.perplexity-research.outputs.ew_count }}
          WEEK_ID:            ${{ needs.perplexity-research.outputs.week_id }}
          KG_VER:             "N/A"
        run: |
          echo "=== [검증-②] Field-check 시작 ==="

          python - <<'PYEOF'
import os, json, sys

expected = {
    "run_date":    os.environ.get("RUN_DATE", ""),
    "ew_severity": os.environ.get("EW_SEVERITY", ""),
    "ew_count":    os.environ.get("EW_COUNT", ""),
    "week_id":     os.environ.get("WEEK_ID", ""),
    "kg_version":  os.environ.get("KG_VER", ""),
}

try:
    with open("/tmp/notion_readback.json") as f:
        page_data = json.load(f)
    props = page_data.get("properties", {})
except Exception as e:
    print(f"[ERROR] readback 파일 로드 실패: {e}", file=sys.stderr)
    sys.exit(1)

def get_prop(props, key):
    if key not in props:
        return None
    prop = props[key]
    t = prop.get("type", "")
    try:
        if t == "title":
            return "".join(i.get("plain_text","") for i in prop.get("title", []))
        if t == "rich_text":
            return "".join(i.get("plain_text","") for i in prop.get("rich_text", []))
        if t == "select":
            return (prop.get("select") or {}).get("name", "")
        if t == "number":
            v = prop.get("number")
            return str(v) if v is not None else ""
        if t == "date":
            d = prop.get("date")
            return (d or {}).get("start", "") if d else ""
        if t == "url":
            return prop.get("url") or ""
        if t == "checkbox":
            return str(prop.get("checkbox", False)).lower()
    except Exception:
        return None
    return None

FIELD_MAP = {
    "Run Date":   ("run_date",    "exact"),
    "EW Severity":("ew_severity", "exact"),
    "EW Count":   ("ew_count",    "contains"),
    "Week":       ("week_id",     "exact"),
    "KG Version": ("kg_version",  "contains"),
    "Pipeline":   (None,          "exists"),
    "Updated At": (None,          "exists"),
}

passed, failed, warnings = [], [], []

for notion_key, (exp_key, mode) in FIELD_MAP.items():
    actual = get_prop(props, notion_key)
    exp_val = expected.get(exp_key, "") if exp_key else ""

    if actual is None:
        warnings.append(f"MISSING  | {notion_key:<18} | (필드 없음)")
        continue

    if mode == "exists":
        if actual:
            passed.append(f"EXISTS   | {notion_key:<18} | '{actual[:40]}'")
        else:
            warnings.append(f"EMPTY    | {notion_key:<18} | (값 없음)")
    elif mode == "exact":
        if actual.strip() == exp_val.strip():
            passed.append(f"EXACT OK | {notion_key:<18} | '{actual}'")
        else:
            failed.append(f"MISMATCH | {notion_key:<18} | expected='{exp_val}' actual='{actual}'")
    elif mode == "contains":
        if exp_val and exp_val in actual:
            passed.append(f"CONT. OK | {notion_key:<18} | '{actual}' contains '{exp_val}'")
        elif not exp_val and actual:
            passed.append(f"NONEMPTY | {notion_key:<18} | '{actual}'")
        else:
            failed.append(f"MISMATCH | {notion_key:<18} | expected to contain '{exp_val}', got '{actual}'")

print("\n=== Field-check 결과 ===")
print(f"{'PASSED':>8}: {len(passed)}")
print(f"{'FAILED':>8}: {len(failed)}")
print(f"{'WARNINGS':>8}: {len(warnings)}")
print()
for line in passed:    print(f"  [OK]  {line}")
for line in warnings:  print(f"  [WRN] {line}")
for line in failed:    print(f"  [ERR] {line}")

with open(os.environ["GITHUB_OUTPUT"], "a") as fout:
    fout.write(f"fields_passed={len(passed)}\n")
    fout.write(f"fields_failed={len(failed)}\n")
    fout.write(f"fields_warned={len(warnings)}\n")
    fout.write(f"fields_total={len(FIELD_MAP)}\n")

sys.exit(0)
PYEOF

      # ── ③ Score: 검증 점수 산출 → PASS / WARN / FAIL 판정 ──
      - name: "[검증-③] 검증 점수 산출 및 최종 판정"
        id: score
        env:
          READBACK_OK:      ${{ steps.readback.outputs.readback_ok || 'false' }}
          FIELDS_PASSED:    ${{ steps.field_check.outputs.fields_passed || '0' }}
          FIELDS_FAILED:    ${{ steps.field_check.outputs.fields_failed || '0' }}
          FIELDS_TOTAL:     ${{ steps.field_check.outputs.fields_total || '7' }}
          PASS_THRESHOLD:   ${{ env.NOTION_VERIFY_PASS_THRESHOLD }}
          WARN_THRESHOLD:   ${{ env.NOTION_VERIFY_WARN_THRESHOLD }}
        run: |
          echo "=== [검증-③] 검증 스코어링 ==="

          python - <<'PYEOF'
import os, sys

readback_ok   = os.environ["READBACK_OK"] == "true"
fields_passed = int(os.environ.get("FIELDS_PASSED", 0))
fields_failed = int(os.environ.get("FIELDS_FAILED", 0))
fields_total  = int(os.environ.get("FIELDS_TOTAL", 7))
pass_thr      = int(os.environ.get("PASS_THRESHOLD", 80))
warn_thr      = int(os.environ.get("WARN_THRESHOLD", 60))

readback_score = 30 if readback_ok else 0
field_ratio    = fields_passed / fields_total if fields_total > 0 else 0
field_score    = round(field_ratio * 70)
total_score    = readback_score + field_score

if total_score >= pass_thr:
    result = "PASS"
elif total_score >= warn_thr:
    result = "WARN"
else:
    result = "FAIL"

readback_label = "OK  " if readback_ok else "FAIL"

# FIX-5: ASCII box (printf 방식과 동일한 고정 너비)
W = 50
LINE = "-" * W
print()
print(f"+{LINE}+")
print(f"| {' Notion 검증 체계 최종 결과':<{W-1}}|")
print(f"+{LINE}+")
print(f"| {'  Read-back    : ' + readback_label + f'  ({readback_score}/30pts)':<{W-1}}|")
print(f"| {'  Field-check  : ' + str(fields_passed) + '/' + str(fields_total) + ' passed' + f'  ({field_score}/70pts)':<{W-1}}|")
print(f"| {'  Fail fields  : ' + str(fields_failed):<{W-1}}|")
print(f"+{LINE}+")
print(f"| {'  Score        : ' + str(total_score) + '/100':<{W-1}}|")
print(f"| {'  Result       : ' + result + f'  (PASS>={pass_thr}, WARN>={warn_thr})':<{W-1}}|")
print(f"+{LINE}+")
print()

with open(os.environ["GITHUB_OUTPUT"], "a") as fout:
    fout.write(f"verify_score={total_score}\n")
    fout.write(f"verify_result={result}\n")
    fout.write(f"readback_score={readback_score}\n")
    fout.write(f"field_score={field_score}\n")

if result == "FAIL":
    print("[FAIL] 검증 실패 — Notion 동기화 상태 점검 필요", file=sys.stderr)
    sys.exit(1)
elif result == "WARN":
    print("[WARN] 검증 경고 — 일부 필드 불일치, 수동 확인 권장")

sys.exit(0)
PYEOF

      # ── 검증 결과 Issue 코멘트 추가 ──────────────────────────
      - name: "[검증] 결과를 Issue에 코멘트"
        if: needs.perplexity-research.outputs.ew_detected == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERIFY_RESULT="${{ steps.score.outputs.verify_result }}"
          VERIFY_SCORE="${{ steps.score.outputs.verify_score }}"
          FIELDS_PASSED="${{ steps.field_check.outputs.fields_passed || '0' }}"
          FIELDS_FAILED="${{ steps.field_check.outputs.fields_failed || '0' }}"
          READBACK_OK="${{ steps.readback.outputs.readback_ok }}"

          if   [ "$VERIFY_RESULT" = "PASS" ]; then STATUS="[PASS]"
          elif [ "$VERIFY_RESULT" = "WARN" ]; then STATUS="[WARN]"
          else                                     STATUS="[FAIL]"
          fi

          # FIX: READBACK_OK 이중 따옴표로 정상 치환
          if [ "$READBACK_OK" = "true" ]; then
            READBACK_STATUS="성공"
          else
            READBACK_STATUS="실패"
          fi

          echo "[INFO] github-orchestration이 실행된 경우에만 issue_number가 존재합니다."
          echo "[INFO] EW 탐지 없이 schedule 실행 시 Issue 코멘트는 생략됩니다."
          echo "Notion 검증 결과: $STATUS ($VERIFY_SCORE/100)"
          echo "Read-back: $READBACK_STATUS | Field: $FIELDS_PASSED passed / $FIELDS_FAILED failed"

  # ================================================================
  # PHASE 4: Pipeline Summary & Health Check
  # ─ 역할: 전체 파이프라인 실행 요약 및 상태 리포트
  # FIX-5: printf ASCII 박스 — Unicode 문자 제거, 고정 너비 정렬 유지
  # ================================================================
  pipeline-summary:
    name: "[P4] Pipeline Summary"
    needs: [perplexity-research, github-orchestration, notion-kb-sync, notion-verification]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: 파이프라인 실행 요약
        run: |
          P1_STATUS="${{ needs.perplexity-research.result }}"
          P1_DETECTED="${{ needs.perplexity-research.outputs.ew_detected }}"
          P1_SEVERITY="${{ needs.perplexity-research.outputs.ew_severity }}"
          P1_COUNT="${{ needs.perplexity-research.outputs.ew_count }}"
          P2_STATUS="${{ needs.github-orchestration.result }}"
          P2_KG="${{ needs.github-orchestration.outputs.kg_version }}"
          P2_ISSUE="${{ needs.github-orchestration.outputs.issue_url }}"
          P3_STATUS="${{ needs.notion-kb-sync.result }}"
          P35_STATUS="${{ needs.notion-verification.result }}"
          P35_RESULT="${{ needs.notion-verification.outputs.verify_result }}"
          P35_SCORE="${{ needs.notion-verification.outputs.verify_score }}"
          P35_FPASSED="${{ needs.notion-verification.outputs.fields_passed }}"
          P35_FFAILED="${{ needs.notion-verification.outputs.fields_failed }}"
          RUN_DATE="${{ needs.perplexity-research.outputs.run_date }}"
          WEEK_ID="${{ needs.perplexity-research.outputs.week_id }}"

          # FIX-5: Unicode box chars -> ASCII, printf 고정 너비
          W=52
          LINE=$(printf '%*s' "$W" '' | tr ' ' '-')

          echo ""
          printf "+%s+\n" "$LINE"
          printf "| %-${W}s|\n" " EW Collaborative Intelligence Pipeline"
          printf "| %-${W}s|\n" " Version: $PIPELINE_VERSION"
          printf "+%s+\n" "$LINE"
          printf "| %-${W}s|\n" " PHASE 1 -- Perplexity Research"
          printf "|   %-$((W-2))s|\n" "Status  : $P1_STATUS"
          printf "|   %-$((W-2))s|\n" "EW      : $P1_DETECTED"
          printf "|   %-$((W-2))s|\n" "Severity: $P1_SEVERITY"
          printf "|   %-$((W-2))s|\n" "Count   : $P1_COUNT"
          printf "+%s+\n" "$LINE"
          printf "| %-${W}s|\n" " PHASE 2 -- GitHub Orchestration"
          printf "|   %-$((W-2))s|\n" "Status  : $P2_STATUS"
          printf "|   %-$((W-2))s|\n" "KG Ver  : $P2_KG"
          printf "|   %-$((W-2))s|\n" "Issue   : ${P2_ISSUE:0:44}"
          printf "+%s+\n" "$LINE"
          printf "| %-${W}s|\n" " PHASE 3 -- Notion KB Sync"
          printf "|   %-$((W-2))s|\n" "Status  : $P3_STATUS"
          printf "+%s+\n" "$LINE"
          printf "| %-${W}s|\n" " PHASE 3.5 -- Notion Verification"
          printf "|   %-$((W-2))s|\n" "Status  : $P35_STATUS"
          printf "|   %-$((W-2))s|\n" "Result  : $P35_RESULT"
          printf "|   %-$((W-2))s|\n" "Score   : $P35_SCORE/100"
          printf "|   %-$((W-2))s|\n" "Passed  : $P35_FPASSED"
          printf "|   %-$((W-2))s|\n" "Failed  : $P35_FFAILED"
          printf "+%s+\n" "$LINE"
          printf "| %-${W}s|\n" " DATE: $RUN_DATE | WEEK: $WEEK_ID"
          printf "+%s+\n" "$LINE"
          echo ""

      - name: 파이프라인 상태 검증
        run: |
          P1="${{ needs.perplexity-research.result }}"
          P3="${{ needs.notion-kb-sync.result }}"
          P35_RESULT="${{ needs.notion-verification.outputs.verify_result }}"
          P35_STATUS="${{ needs.notion-verification.result }}"

          if [ "$P1" != "success" ]; then
            echo "[FAIL] PHASE 1 (Perplexity Research) 실패 — 파이프라인 이상"
            exit 1
          fi

          if [ "$P3" = "failure" ]; then
            echo "[WARN] PHASE 3 (Notion Sync) 실패 — Notion 업데이트 수동 확인 필요"
            exit 1
          fi

          if [ "$P35_STATUS" = "failure" ] || [ "$P35_RESULT" = "FAIL" ]; then
            echo "[FAIL] PHASE 3.5 (Notion 검증) FAIL — Notion 동기화 품질 이상"
            echo "   검증 점수: ${{ needs.notion-verification.outputs.verify_score }}/100"
            exit 1
          fi

          if [ "$P35_RESULT" = "WARN" ]; then
            echo "[WARN] PHASE 3.5 (Notion 검증) WARN — 일부 필드 불일치, 수동 확인 권장"
          fi

          echo "[OK] 파이프라인 전체 완료 — 모든 Phase 정상"
          echo "   Notion 검증 점수: ${{ needs.notion-verification.outputs.verify_score }}/100 ($P35_RESULT)"

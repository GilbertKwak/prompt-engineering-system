name: "PE · Pre-flight + SSOT Validator"

on:
  workflow_dispatch:
    inputs:
      page_id:
        description: "Notion Hub 페이지 ID (SSOT 검증 대상)"
        required: false
        default: "34a55ed436f0814d9cffe6a2f0816e29"
      auto_sync:
        description: "SHA 불일치 시 Notion 자동 업데이트"
        required: false
        default: "false"
      strict:
        description: "FAIL 항목 존재 시 파이프라인 중단"
        required: false
        default: "false"
  push:
    paths:
      - "automation/preflight_check.py"
      - "automation/ssot_sha_validator.py"

jobs:
  # ──────────────────────────────────────────
  # Section A + Section C (병렬)
  # ──────────────────────────────────────────
  preflight:
    name: "Section A — Pre-flight E-0N Check"
    runs-on: ubuntu-latest
    outputs:
      preflight_status: ${{ steps.run.outputs.status }}
      fail_count: ${{ steps.run.outputs.fail_count }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run Pre-flight Check (Section A)
        id: run
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: |
          python automation/preflight_check.py \
            --output output/preflight_report.json \
            ${{ inputs.strict == 'true' && '--strict' || '' }}
          FAIL=$(python -c "
import json, sys
data = json.load(open('output/preflight_report.json'))
print(data.get('fail', 0))
")
          echo "status=done" >> $GITHUB_OUTPUT
          echo "fail_count=$FAIL" >> $GITHUB_OUTPUT

      - name: Upload preflight report
        uses: actions/upload-artifact@v4
        with:
          name: preflight-report
          path: output/preflight_report.json
          retention-days: 7

  workflow_dedup:
    name: "Section C — Workflow Dedup Fix (E-02)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Workflow Dedup Fix
        run: |
          python automation/workflow_dedup_fix.py --root .

      - name: Commit deprecation (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/
          git diff --cached --quiet || git commit -m "fix: E-02 workflow dedup — deprecate ai_intel_weekly.yml"
          git push || true

  # ──────────────────────────────────────────
  # Section B (병렬)
  # ──────────────────────────────────────────
  ssot_validate:
    name: "Section B — SSOT SHA Validator"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run SSOT SHA Validation (Section B)
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: |
          python automation/ssot_sha_validator.py \
            --page-id "${{ inputs.page_id || '34a55ed436f0814d9cffe6a2f0816e29' }}" \
            ${{ inputs.auto_sync == 'true' && '--auto-sync' || '' }} \
            --output output/sha_report.json

      - name: Upload SHA report
        uses: actions/upload-artifact@v4
        with:
          name: sha-report
          path: output/sha_report.json
          retention-days: 7

  # ──────────────────────────────────────────
  # Section D (A 완료 후)
  # ──────────────────────────────────────────
  pe3_score:
    name: "Section D — PE-3 Score Reporter"
    runs-on: ubuntu-latest
    needs: [preflight]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download preflight report
        uses: actions/download-artifact@v4
        with:
          name: preflight-report
          path: output/
        continue-on-error: true

      - name: Run PE-3 Scoring (Section D)
        run: |
          mkdir -p output/ai_intel
          python automation/pe3_score_reporter.py \
            --input-dir output/ai_intel \
            --preflight output/preflight_report.json \
            --output output/pe3_score.json \
            --root .

      - name: Upload PE-3 score
        uses: actions/upload-artifact@v4
        with:
          name: pe3-score
          path: output/pe3_score.json
          retention-days: 7

      - name: Check PE-3 threshold
        run: |
          python -c "
import json, sys
data = json.load(open('output/pe3_score.json'))
print(f\"PE-3 Score: {data['total_score']}/{data['max_score']} ({data['percentage']}%) — {data['status']}\")
if data['rewrite_required']:
    print(f\"⚠️  재작성 필요 차원: {data['low_dims']}\")
    sys.exit(1)
"

name: PE · Universal Apply

on:
  workflow_dispatch:
    inputs:
      target_prompt:
        description: '적용 대상 프롬프트 경로'
        required: true
      apply_mode:
        description: '적용 모드 (dry-run | apply | force)'
        required: false
        default: 'dry-run'
        type: choice
        options:
          - dry-run
          - apply
          - force

env:
  PYTHON_VERSION: '3.12'

jobs:
  univ_apply:
    name: 🔧 Universal Apply
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r automation/requirements.txt

      - name: Apply prompt
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TARGET: ${{ github.event.inputs.target_prompt }}
          MODE: ${{ github.event.inputs.apply_mode || 'dry-run' }}
        run: |
          python automation/pe_universal_apply.py \
            --target "$TARGET" \
            --mode "$MODE" \
            --output output/apply/

      - "전체 구조 YAML 재작성 (PE-7 AI 자동화 엔진 적용)"
      - "SEARCH_SCOPE ISO-3166 코드 표준화"
      - "INCLUSION_CRITERIA Boolean Tree 변환"
      - "VALIDATION_RULES 앵커기업 5개 + 수치 기준 추가"
      - "OUTPUT_FORMAT 필드 타입 강제 적용"
      - "ERROR_PREVENTION 6개 자동 오류 예측 규칙 추가"
      - "변형 A: SEARCH_SCOPE 교체 → filter_add 방식으로 수정"
      - "변형 B: Type C 서브변형 분리 명시"
      - "변형 C: data_confidence 필드 추가"

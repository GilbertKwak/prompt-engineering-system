# ─────────────────────────────────────────────────────────────────────────────
# AI Intel Weekly · Section A — 전체 파이프라인
# 매주 월요일 09:00 KST (00:00 UTC) 자동 실행
# workflow_dispatch로 수동 실행 가능
#
# [SSOT] .github/prompts/execution_protocol_v2.6.md
# ─────────────────────────────────────────────────────────────────────────────
name: "PE · AI Intel Weekly Digest"

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:
    inputs:
      intel_scope:
        description: "수집 깊이 (standard / deep / emergency)"
        required: false
        default: "standard"
        type: choice
        options: ["standard", "deep", "emergency"]
      force_ew_check:
        description: "EW 강제 재검사 여부"
        required: false
        default: "false"
        type: boolean
      kg_version_override:
        description: "KG 버전 직접 지정 (비워두면 자동 +0.01)"
        required: false
        default: ""
        type: string
      protocol_debug:
        description: "실행 프로토콜 디버그 출력 여부"
        required: false
        default: "false"
        type: boolean

env:
  PYTHON_VERSION: "3.11"
  OUTPUT_DIR: "output/ai_intel"
  KG_BASE_VERSION: "4.25"
  PROTOCOL_PATH: ".github/prompts/execution_protocol_v2.6.md"
  PROTOCOL_MIN_BYTES: "500"

jobs:
  # ─── Job 0: 프로토콜 검증 ─────────────────────────────────────────────────
  protocol-check:
    name: "0. 실행 프로토콜 SSOT 검증"
    runs-on: ubuntu-latest

    outputs:
      protocol_hash: ${{ steps.hash.outputs.hash }}
      protocol_version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 프로토콜 파일 존재 및 크기 확인
        run: |
          if [ ! -f "${{ env.PROTOCOL_PATH }}" ]; then
            echo "::error::SSOT 파일 없음: ${{ env.PROTOCOL_PATH }}"
            exit 1
          fi
          FILE_BYTES=$(wc -c < "${{ env.PROTOCOL_PATH }}")
          FILE_LINES=$(wc -l < "${{ env.PROTOCOL_PATH }}")
          echo "✅ 프로토콜 파일 확인: ${{ env.PROTOCOL_PATH }}"
          echo "   크기: ${FILE_BYTES} bytes / ${FILE_LINES} lines"
          if [ "$FILE_BYTES" -lt "${{ env.PROTOCOL_MIN_BYTES }}" ]; then
            echo "::error::프로토콜 파일 크기 부족: ${FILE_BYTES} bytes (최소: ${{ env.PROTOCOL_MIN_BYTES }})"
            exit 1
          fi

      - name: 필수 섹션 존재 확인
        run: |
          REQUIRED_SECTIONS=("EXECUTION_PROTOCOL" "version" "domain")
          for SECTION in "${REQUIRED_SECTIONS[@]}"; do
            if ! grep -qi "$SECTION" "${{ env.PROTOCOL_PATH }}"; then
              echo "::warning::프로토콜 필수 섹션 미발견: '$SECTION' — 계속 진행"
            else
              echo "✅ 섹션 확인: $SECTION"
            fi
          done

      - name: 프로토콜 해시 계산
        id: hash
        run: |
          HASH=$(sha256sum "${{ env.PROTOCOL_PATH }}" | cut -d' ' -f1 | head -c 12)
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "📎 프로토콜 SHA256 (앞 12자): $HASH"

      - name: 프로토콜 버전 추출
        id: version
        run: |
          VERSION=$(grep -m1 -E 'version[:\s]+[v0-9]|^#.*v[0-9]+\.[0-9]+' "${{ env.PROTOCOL_PATH }}" \
            | sed 's/.*\(v[0-9][0-9.]*\).*/\1/' | head -1)
          if [ -z "$VERSION" ]; then
            VERSION="v2.6"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📋 프로토콜 버전: $VERSION"

      - name: 프로토콜 디버그 출력 (선택)
        if: github.event.inputs.protocol_debug == 'true'
        run: |
          echo "════════════════════════════════════════"
          echo "  EXECUTION PROTOCOL CONTENT (DEBUG)"
          echo "  파일: ${{ env.PROTOCOL_PATH }}"
          echo "  해시: ${{ steps.hash.outputs.hash }}"
          echo "════════════════════════════════════════"
          cat "${{ env.PROTOCOL_PATH }}"
          echo "════════════════════════════════════════"

  # ─── Job 1: 인텔 수집 ─────────────────────────────────────────────────────
  collect-intel:
    name: "1. 도메인별 인텔 수집"
    needs: protocol-check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        domain:
          - enterprise_deployment
          - model_performance
          - infrastructure
          - regulatory
          - open_source
          - investment
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: 의존성 설치
        run: pip install -r automation/requirements_ai_intel.txt

      - name: 출력 디렉토리 생성
        run: mkdir -p ${{ env.OUTPUT_DIR }}

      - name: 실행 프로토콜 주입 (SSOT)
        run: |
          echo "EXECUTION_PROTOCOL<<__PROTOCOL_EOF__" >> $GITHUB_ENV
          cat "${{ env.PROTOCOL_PATH }}" >> $GITHUB_ENV
          echo "__PROTOCOL_EOF__" >> $GITHUB_ENV
          INJECTED=$(wc -c < "${{ env.PROTOCOL_PATH }}")
          if [ "$INJECTED" -lt "${{ env.PROTOCOL_MIN_BYTES }}" ]; then
            echo "::error::프로토콜 주입 크기 이상: ${INJECTED} bytes"
            exit 1
          fi
          echo "EXECUTION_PROTOCOL_HASH=${{ needs.protocol-check.outputs.protocol_hash }}" >> $GITHUB_ENV
          echo "EXECUTION_PROTOCOL_VERSION=${{ needs.protocol-check.outputs.protocol_version }}" >> $GITHUB_ENV
          echo "✅ EXECUTION_PROTOCOL 주입 완료 — ${INJECTED} bytes"

      - name: 주차 및 메타 계산
        id: meta
        run: |
          WEEK=$(python3 -c "from datetime import date; d=date.today(); print(f'{d.year}-W{d.isocalendar()[1]:02d}')")
          RUN_DATE=$(date +%Y-%m-%d)
          SCOPE="${{ github.event.inputs.intel_scope || 'standard' }}"
          if [ "$SCOPE" = "emergency" ]; then
            FORCE_MODEL="sonar-pro"
          else
            FORCE_MODEL=""
          fi
          echo "week=$WEEK" >> $GITHUB_OUTPUT
          echo "run_date=$RUN_DATE" >> $GITHUB_OUTPUT
          echo "scope=$SCOPE" >> $GITHUB_OUTPUT
          echo "force_model=$FORCE_MODEL" >> $GITHUB_OUTPUT
          echo "📅 주차: $WEEK | 실행일: $RUN_DATE | 스코프: $SCOPE"

      - name: 인텔 수집 — ${{ matrix.domain }}
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          FORCE_MODEL: ${{ steps.meta.outputs.force_model }}
        run: |
          DOMAIN="${{ matrix.domain }}"
          WEEK="${{ steps.meta.outputs.week }}"
          SCOPE="${{ steps.meta.outputs.scope }}"

          declare -A QUERIES
          QUERIES[enterprise_deployment]="enterprise AI deployment ROI 2026 Q2|LLM enterprise governance compliance cost optimization"
          QUERIES[model_performance]="LLM benchmark leaderboard 2026 GPT-4o Claude Gemini comparison|AI model inference latency throughput cost tradeoff"
          QUERIES[infrastructure]="NVIDIA B200 GB200 supply allocation 2026|AI datacenter energy efficiency liquid cooling trends"
          QUERIES[regulatory]="EU AI Act enforcement 2026 compliance deadline|US AI executive order regulation update 2026"
          QUERIES[open_source]="open source LLM Llama Mistral Qwen release 2026|LangChain LlamaIndex Hugging Face major update 2026"
          QUERIES[investment]="AI startup Series B C funding 2026 Q2|AI infrastructure M&A acquisition 2026 semiconductor"

          IFS='|' read -ra Q_ARRAY <<< "${QUERIES[$DOMAIN]}"

          python automation/ai_intel_collector.py \
            --domain "$DOMAIN" \
            --week "$WEEK" \
            --scope "$SCOPE" \
            --queries "${Q_ARRAY[@]}" \
            --output "${{ env.OUTPUT_DIR }}/intel_${DOMAIN}.json"

      - name: 인텔 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: intel-${{ matrix.domain }}
          path: ${{ env.OUTPUT_DIR }}/intel_${{ matrix.domain }}.json
          retention-days: 7

  # ─── Job 2: EW 탐지 ───────────────────────────────────────────────────────
  ew-detection:
    name: "2. Early Warning 탐지"
    needs: [protocol-check, collect-intel]
    runs-on: ubuntu-latest

    outputs:
      ew_triggered: ${{ steps.ew.outputs.ew_triggered }}
      ew_count: ${{ steps.ew.outputs.ew_count }}
      ew_signals: ${{ steps.ew.outputs.ew_signals }}
      ew_severity: ${{ steps.ew.outputs.ew_severity }}
      week: ${{ steps.meta.outputs.week }}
      run_date: ${{ steps.meta.outputs.run_date }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - run: pip install -r automation/requirements_ai_intel.txt

      - name: 아티팩트 다운로드
        uses: actions/download-artifact@v4
        with:
          pattern: intel-*
          path: ${{ env.OUTPUT_DIR }}
          merge-multiple: true

      - name: 실행 프로토콜 주입 (SSOT)
        run: |
          echo "EXECUTION_PROTOCOL<<__PROTOCOL_EOF__" >> $GITHUB_ENV
          cat "${{ env.PROTOCOL_PATH }}" >> $GITHUB_ENV
          echo "__PROTOCOL_EOF__" >> $GITHUB_ENV
          INJECTED=$(wc -c < "${{ env.PROTOCOL_PATH }}")
          if [ "$INJECTED" -lt "${{ env.PROTOCOL_MIN_BYTES }}" ]; then
            echo "::error::프로토콜 주입 크기 이상: ${INJECTED} bytes"
            exit 1
          fi
          echo "EXECUTION_PROTOCOL_HASH=${{ needs.protocol-check.outputs.protocol_hash }}" >> $GITHUB_ENV
          echo "EXECUTION_PROTOCOL_VERSION=${{ needs.protocol-check.outputs.protocol_version }}" >> $GITHUB_ENV
          echo "✅ EXECUTION_PROTOCOL 주입 완료 — ${INJECTED} bytes"

      - name: 주차 계산
        id: meta
        run: |
          WEEK=$(python3 -c "from datetime import date; d=date.today(); print(f'{d.year}-W{d.isocalendar()[1]:02d}')")
          echo "week=$WEEK" >> $GITHUB_OUTPUT
          echo "run_date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: EW 탐지 실행
        id: ew
        env:
          FORCE_EW: ${{ github.event.inputs.force_ew_check || 'false' }}
        run: |
          python automation/ai_ew_detector.py \
            --input-dir "${{ env.OUTPUT_DIR }}" \
            --week "${{ steps.meta.outputs.week }}" \
            --output "${{ env.OUTPUT_DIR }}/ew_report.json"

          python3 << 'PYEOF'
          import json, os
          report_path = os.path.join(os.environ.get("OUTPUT_DIR", "output/ai_intel"), "ew_report.json")
          try:
              data = json.load(open(report_path))
          except Exception as e:
              print(f"[WARN] EW 리포트 파싱 실패: {e} — 기본값 사용")
              data = {}
          triggered = str(data.get("ew_triggered", False)).lower()
          count = data.get("total_ew_signals", 0)
          signals = ",".join(data.get("signal_names", []))
          severity = data.get("overall_severity", "NONE")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"ew_triggered={triggered}\n")
              f.write(f"ew_count={count}\n")
              f.write(f"ew_signals={signals}\n")
              f.write(f"ew_severity={severity}\n")
          print(f"[EW] triggered={triggered} | count={count} | severity={severity} | signals={signals}")
          PYEOF

      - name: EW 리포트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: ew-report
          path: ${{ env.OUTPUT_DIR }}/ew_report.json
          retention-days: 7

  # ─── Job 3: KG 델타 생성 ──────────────────────────────────────────────────
  kg-delta:
    name: "3. Knowledge Graph 델타 생성"
    needs: [protocol-check, ew-detection]
    runs-on: ubuntu-latest

    outputs:
      kg_next_version: ${{ steps.kg.outputs.next_version }}
      node_count: ${{ steps.kg.outputs.node_count }}
      edge_count: ${{ steps.kg.outputs.edge_count }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - run: pip install -r automation/requirements_ai_intel.txt

      - name: 아티팩트 다운로드
        uses: actions/download-artifact@v4
        with:
          pattern: intel-*
          path: ${{ env.OUTPUT_DIR }}
          merge-multiple: true

      - name: 실행 프로토콜 주입 (SSOT)
        run: |
          echo "EXECUTION_PROTOCOL<<__PROTOCOL_EOF__" >> $GITHUB_ENV
          cat "${{ env.PROTOCOL_PATH }}" >> $GITHUB_ENV
          echo "__PROTOCOL_EOF__" >> $GITHUB_ENV
          INJECTED=$(wc -c < "${{ env.PROTOCOL_PATH }}")
          if [ "$INJECTED" -lt "${{ env.PROTOCOL_MIN_BYTES }}" ]; then
            echo "::error::프로토콜 주입 크기 이상: ${INJECTED} bytes"
            exit 1
          fi
          echo "EXECUTION_PROTOCOL_HASH=${{ needs.protocol-check.outputs.protocol_hash }}" >> $GITHUB_ENV
          echo "EXECUTION_PROTOCOL_VERSION=${{ needs.protocol-check.outputs.protocol_version }}" >> $GITHUB_ENV
          echo "✅ EXECUTION_PROTOCOL 주입 완료 — ${INJECTED} bytes"

      - name: KG 버전 계산 및 델타 생성
        id: kg
        run: |
          OVERRIDE="${{ github.event.inputs.kg_version_override }}"
          CURRENT="${{ env.KG_BASE_VERSION }}"
          if [ -n "$OVERRIDE" ]; then
            NEXT_VER="$OVERRIDE"
          else
            MAJOR=$(echo $CURRENT | cut -d. -f1)
            MINOR=$(echo $CURRENT | cut -d. -f2)
            NEXT_MINOR=$((MINOR + 1))
            NEXT_VER="${MAJOR}.${NEXT_MINOR}"
          fi
          echo "next_version=$NEXT_VER" >> $GITHUB_OUTPUT
          echo "[INFO] KG 버전: ${CURRENT} → ${NEXT_VER}"

          python automation/kg_delta_generator.py \
            --intel-dir "${{ env.OUTPUT_DIR }}" \
            --current-version "$CURRENT" \
            --next-version "$NEXT_VER" \
            --week "${{ needs.ew-detection.outputs.week }}" \
            --run-date "${{ needs.ew-detection.outputs.run_date }}" \
            --ew-signals "${{ needs.ew-detection.outputs.ew_signals }}" \
            --output "knowledge_graph_v${NEXT_VER}_delta.json"

          python3 << 'PYEOF'
          import json, os, glob
          files = glob.glob("knowledge_graph_v*_delta.json")
          if files:
              data = json.load(open(files[0]))
              node_count = data.get("node_count", len(data.get("nodes", [])))
              edge_count = data.get("edge_count", len(data.get("edges", [])))
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write(f"node_count={node_count}\n")
                  f.write(f"edge_count={edge_count}\n")
              print(f"[KG] nodes={node_count} | edges={edge_count}")
          else:
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("node_count=0\nedge_count=0\n")
              print("[WARN] KG 델타 파일 미발견")
          PYEOF

      - name: KG 델타 업로드
        uses: actions/upload-artifact@v4
        with:
          name: kg-delta
          path: knowledge_graph_v*_delta.json
          retention-days: 30

  # ─── Job 4: Notion C-31 업데이트 ─────────────────────────────────────────
  notion-update:
    name: "4. Notion C-31 업데이트"
    needs: [protocol-check, ew-detection, kg-delta]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - run: pip install -r automation/requirements_ai_intel.txt

      - name: 아티팩트 다운로드
        uses: actions/download-artifact@v4
        with:
          pattern: intel-*
          path: ${{ env.OUTPUT_DIR }}
          merge-multiple: true

      - name: 실행 프로토콜 주입 (SSOT)
        run: |
          echo "EXECUTION_PROTOCOL<<__PROTOCOL_EOF__" >> $GITHUB_ENV
          cat "${{ env.PROTOCOL_PATH }}" >> $GITHUB_ENV
          echo "__PROTOCOL_EOF__" >> $GITHUB_ENV
          INJECTED=$(wc -c < "${{ env.PROTOCOL_PATH }}")
          if [ "$INJECTED" -lt "${{ env.PROTOCOL_MIN_BYTES }}" ]; then
            echo "::error::프로토콜 주입 크기 이상: ${INJECTED} bytes"
            exit 1
          fi
          echo "EXECUTION_PROTOCOL_HASH=${{ needs.protocol-check.outputs.protocol_hash }}" >> $GITHUB_ENV
          echo "EXECUTION_PROTOCOL_VERSION=${{ needs.protocol-check.outputs.protocol_version }}" >> $GITHUB_ENV
          echo "✅ EXECUTION_PROTOCOL 주입 완료 — ${INJECTED} bytes"

      - name: NOTION_C31_PAGE_ID Secret 확인
        id: secret_check
        run: |
          if [ -z "${{ secrets.NOTION_C31_PAGE_ID }}" ]; then
            echo "::warning::NOTION_C31_PAGE_ID Secret 미설정 — Notion 업데이트를 건너뜁니다."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Notion C-31 업데이트
        if: steps.secret_check.outputs.skip != 'true'
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: |
          python automation/notion_c31_updater.py \
            --page-id "${{ secrets.NOTION_C31_PAGE_ID }}" \
            --week "${{ needs.ew-detection.outputs.week }}" \
            --run-date "${{ needs.ew-detection.outputs.run_date }}" \
            --ew-triggered "${{ needs.ew-detection.outputs.ew_triggered }}" \
            --ew-count "${{ needs.ew-detection.outputs.ew_count }}" \
            --ew-signals "${{ needs.ew-detection.outputs.ew_signals }}" \
            --ew-severity "${{ needs.ew-detection.outputs.ew_severity }}" \
            --kg-version "${{ needs.kg-delta.outputs.kg_next_version }}" \
            --node-count "${{ needs.kg-delta.outputs.node_count }}" \
            --edge-count "${{ needs.kg-delta.outputs.edge_count }}" \
            --intel-dir "${{ env.OUTPUT_DIR }}"

  # ─── Job 5: EW 긴급 알림 ─────────────────────────────────────────────────
  ew-alert:
    name: "5. EW 긴급 알림"
    needs: [protocol-check, ew-detection]
    runs-on: ubuntu-latest
    if: needs.ew-detection.outputs.ew_triggered == 'true' && needs.ew-detection.outputs.ew_severity == 'HIGH'

    steps:
      - name: EW 긴급 Issue 생성
        uses: actions/github-script@v7
        with:
          script: |
            const week     = "${{ needs.ew-detection.outputs.week }}";
            const signals  = "${{ needs.ew-detection.outputs.ew_signals }}";
            const severity = "${{ needs.ew-detection.outputs.ew_severity }}";
            const pHash    = "${{ needs.protocol-check.outputs.protocol_hash }}";
            const pVersion = "${{ needs.protocol-check.outputs.protocol_version }}";
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `🚨 [EW-${severity}] AI Intel Early Warning · ${week}`,
              body: [
                "## Early Warning 발동",
                "",
                `- **주차**: ${week}`,
                `- **심각도**: ${severity}`,
                `- **신호**: ${signals || "(없음)"}`,
                `- **실행 프로토콜**: \`${pVersion}\` (hash: \`${pHash}\`)`,
                `- **SSOT 경로**: \`.github/prompts/execution_protocol_v2.6.md\``,
                "",
                "> 자동 생성된 EW 이슈입니다. 즉각 검토 필요."
              ].join("\n"),
              labels: ["early-warning", "ai-intel", "urgent"]
            });

  # ─── Job 6: 파이프라인 완료 요약 ─────────────────────────────────────────
  pipeline-summary:
    name: "6. 파이프라인 완료 요약"
    needs: [protocol-check, ew-detection, kg-delta, notion-update]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Step Summary 및 로그 출력
        run: |
          WEEK="${{ needs.ew-detection.outputs.week }}"
          RUN_DATE="${{ needs.ew-detection.outputs.run_date }}"
          EW_TRIGGERED="${{ needs.ew-detection.outputs.ew_triggered }}"
          EW_SEVERITY="${{ needs.ew-detection.outputs.ew_severity }}"
          EW_SIGNALS="${{ needs.ew-detection.outputs.ew_signals }}"
          KG_VER="${{ needs.kg-delta.outputs.kg_next_version }}"
          NODES="${{ needs.kg-delta.outputs.node_count }}"
          EDGES="${{ needs.kg-delta.outputs.edge_count }}"
          P_HASH="${{ needs.protocol-check.outputs.protocol_hash }}"
          P_VER="${{ needs.protocol-check.outputs.protocol_version }}"

          echo "════════════════════════════════════════════════════════"
          echo "  PE · AI Intel Weekly Digest — 파이프라인 완료 요약"
          echo "════════════════════════════════════════════════════════"
          echo "  주차              : ${WEEK}"
          echo "  실행일            : ${RUN_DATE}"
          echo "  EW 발동           : ${EW_TRIGGERED}"
          echo "  EW 심각도         : ${EW_SEVERITY}"
          echo "  EW 신호           : ${EW_SIGNALS:-없음}"
          echo "  KG 버전           : ${KG_VER}"
          echo "  노드 수           : ${NODES}"
          echo "  엣지 수           : ${EDGES}"
          echo "  프로토콜 해시     : ${P_HASH}"
          echo "  프로토콜 버전     : ${P_VER}"
          echo "  SSOT 경로         : ${{ env.PROTOCOL_PATH }}"
          echo "════════════════════════════════════════════════════════"

          cat >> $GITHUB_STEP_SUMMARY << SUMMARY_EOF
          ## 🤖 PE · AI Intel Weekly Digest — ${WEEK}

          | 항목 | 값 |
          |---|---|
          | 실행일 | ${RUN_DATE} |
          | EW 발동 | ${EW_TRIGGERED} |

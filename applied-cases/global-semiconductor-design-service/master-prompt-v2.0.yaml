# ============================================================
# MASTER PROMPT v2.0 — 글로벌 반도체 설계 서비스 유사 업체 전수 발굴
# Version: 2.0.0
# Created: 2026-04-25
# Author: Gilbert Kwak
# PE-Level: PE-7 (AI Automation Design & Implementation)
# Validation: PE-3 Auto-Validate
# Parent: prompt-engineering-system / applied-cases
# ============================================================

metadata:
  version: "2.0.0"
  created: "2026-04-25"
  author: "Gilbert Kwak"
  project: "글로벌 반도체 설계 서비스 유사 업체 전수 발굴"
  pe_level: "PE-7"
  validation_rules: "PE-3"
  prev_version: "1.0.0"
  changelog: "YAML 구조화, Boolean Tree CRITERIA, 필드 타입 강제, VC Tier 기준 수치화"

# ============================================================
# SECTION 1: ROLE
# ============================================================
role:
  title: "글로벌 반도체 산업 전문 애널리스트"
  persona: |
    당신은 반도체 설계 서비스 산업을 20년 이상 추적해온
    글로벌 시장조사 전문가입니다. Design House, Turnkey ASIC,
    IP 라이선싱, EDA/SW 솔루션, 반도체 IT 서비스 생태계 전반에
    정통하며, 기업 분류·사업모델·공급망 구조를 정확히 파악합니다.
  constraints:
    - IDM(Intel, Samsung Electronics, SK Hynix, Micron 직속 설계팀) 제외
    - Fab-lite/Fabless 순수 설계 서비스 기업만 포함
    - 매출 $1M 미만이더라도 Tier 1 VC 투자 확인 시 포함

# ============================================================
# SECTION 2: OBJECTIVE
# ============================================================
objective:
  primary: "반도체 설계 서비스를 제공하는 글로벌 유사 업체 전수 발굴"
  secondary:
    - "4가지 사업 유형(A/B/C/D)별 분류 및 특성 분석"
    - "Anchor Company 5개사 기준 비교 포지셔닝"
    - "투자·M&A 매력도 평가 (D-3)"
    - "전략적 갭 분석 (D-4)"
  anchor_companies:
    - name: "Alchip Technologies"
      type: "A"
      notes: "TWSE 상장, TSMC/Samsung Foundry 파트너, HPC·AI ASIC"
    - name: "Global Unichip Corp (GUC)"
      type: "A"
      notes: "TSMC 자회사, CoWoS 패키징 포함 Turnkey"
    - name: "PGC (Parade & GUC Cluster)"
      type: "A"
      notes: "Display IC + Mixed-signal 특화"
    - name: "Flexcompute"
      type: "D"
      notes: "클라우드 기반 EDA/CFD 시뮬레이션 SaaS"
    - name: "AllSpice"
      type: "D"
      notes: "반도체 설계 데이터 협업 플랫폼 (GitHub for EDA)"

# ============================================================
# SECTION 3: SEARCH SCOPE
# ============================================================
search_scope:
  geographic_coverage:
    tier_1_must_include:
      - code: "TW"
        region: "Taiwan"
        key_clusters: ["Hsinchu Science Park", "Tainan STSP"]
      - code: "US"
        region: "United States"
        key_clusters: ["Silicon Valley", "Austin TX", "San Diego", "Boston MA"]
      - code: "CN"
        region: "China"
        key_clusters: ["Shanghai", "Shenzhen", "Beijing", "Chengdu"]
      - code: "KR"
        region: "South Korea"
        key_clusters: ["Pangyo", "Suwon", "Icheon"]
    tier_2_include:
      - code: "IN"
        region: "India"
        key_clusters: ["Bangalore", "Hyderabad", "Pune"]
      - code: "IL"
        region: "Israel"
        key_clusters: ["Tel Aviv", "Haifa"]
      - code: "DE"
        region: "Germany"
        key_clusters: ["Munich", "Dresden"]
      - code: "GB"
        region: "United Kingdom"
        key_clusters: ["Cambridge", "Bristol"]
      - code: "SG"
        region: "Singapore"
        key_clusters: ["one-north"]
      - code: "AE"
        region: "UAE"
        key_clusters: ["Dubai Silicon Oasis", "Abu Dhabi"]
      - code: "CA"
        region: "Canada"
        key_clusters: ["Ottawa", "Waterloo"]
      - code: "FR"
        region: "France"
        key_clusters: ["Grenoble", "Paris"]
      - code: "NL"
        region: "Netherlands"
        key_clusters: ["Eindhoven"]
  time_range:
    founded_from: 1990
    founded_to: 2026
    activity_required: "최근 3년 이내 활동 확인"
  keyword_clusters:
    type_a: ["ASIC design service", "turnkey ASIC", "design house", "custom chip", "SoC design"]
    type_b: ["IP licensing", "silicon IP", "processor IP", "PHY IP", "interface IP"]
    type_c: ["semiconductor IT service", "EDA service", "chip design support", "PDK service"]
    type_d: ["EDA software", "semiconductor SaaS", "chip design platform", "PCB collaboration"]
    exclusion: ["IDM", "memory fab", "wafer fab", "foundry service only"]

# ============================================================
# SECTION 4: INCLUSION CRITERIA (Boolean Tree)
# ============================================================
inclusion_criteria:
  logic: |
    INCLUDE IF:
      (
        type_match = TRUE                    # 4가지 유형 중 하나 해당
        AND fab_status != "IDM"              # IDM 완전 제외
        AND (
          revenue >= 1_000_000              # 연매출 $1M 이상
          OR vc_tier_1 = TRUE               # OR Tier 1 VC 투자
          OR listed = TRUE                  # OR 주식 상장
        )
        AND activity_last_3y = TRUE         # 최근 3년 활동 확인
      )
  type_definitions:
    type_A:
      name: "Turnkey ASIC / Design House"
      description: "고객 사양 기반 커스텀 ASIC 설계+검증+테이프아웃 원스톱 서비스"
      fab_partner_required: true
      examples: ["Alchip", "GUC", "Faraday Technology", "eSilicon", "Sievert Larsotech"]
    type_B:
      name: "Silicon IP Licensor"
      description: "재사용 가능한 IP 블록(CPU, PHY, SerDes, PLL 등) 라이선싱"
      fab_partner_required: false
      examples: ["Arm", "Synopsys IP", "Cadence IP", "CEVA", "Rambus"]
    type_C:
      name: "반도체 IT/EDA 서비스"
      description: "설계 지원, PDK 개발, 검증 자동화, 테이프아웃 지원 전문 서비스"
      fab_partner_required: false
      examples: ["Semifive", "Movella", "Siemens EDA services"]
    type_D:
      name: "설계 플랫폼/SaaS"
      description: "클라우드 EDA, 협업 도구, 시뮬레이션 SaaS"
      fab_partner_required: false
      examples: ["Flexcompute", "AllSpice", "ChipAgents", "Silvaco Cloud"]
  vc_tier_1_list:
    - "Sequoia Capital"
    - "Andreessen Horowitz (a16z)"
    - "Bessemer Venture Partners"
    - "New Enterprise Associates (NEA)"
    - "Khosla Ventures"
    - "GV (Google Ventures)"
    - "SoftBank Vision Fund"
    - "Tiger Global"
    - "Lightspeed Venture Partners"
    - "Intel Capital"
    - "Qualcomm Ventures"
    - "Samsung Catalyst Fund"

# ============================================================
# SECTION 5: OUTPUT FORMAT (Field Type Enforced)
# ============================================================
output_format:
  deliverable_1:
    name: "D-1: 발굴 기업 마스터 테이블"
    table_schema:
      fields:
        - name: "No"
          type: "INTEGER"
          required: true
        - name: "Company"
          type: "STRING"
          required: true
        - name: "Country"
          type: "ISO-3166-ALPHA2"
          required: true
          example: "TW, US, KR, CN, IN"
        - name: "Type"
          type: "ENUM(A,B,C,D)"
          required: true
        - name: "Founded"
          type: "INTEGER(YYYY)"
          required: true
          format: "4자리 연도만, 예: 1999"
        - name: "FabPartner"
          type: "ENUM(TSMC,GF,Samsung,UMC,SMIC,Intel,Other,NA)"
          required: true
        - name: "Revenue_USD"
          type: "STRING"
          format: "$XM 또는 $XB 단위, 예: $45M, $1.2B"
          note: "비공개 시 VC/Listed로 대체"
        - name: "Listed"
          type: "BOOLEAN"
          required: true
        - name: "Exchange"
          type: "STRING"
          note: "상장 시 거래소명: TWSE, NASDAQ, NYSE, KOSDAQ 등"
        - name: "VC_Tier1"
          type: "BOOLEAN"
          required: true
        - name: "KeyProduct"
          type: "STRING"
          max_length: 80
        - name: "URL"
          type: "URL"
          required: true
          format: "https://"
    minimum_count:
      type_A: 8
      type_B: 13
      type_C: 3
      type_D: 4
      total: 28
  deliverable_2:
    name: "D-2: 사업모델 심층 분석"
    format: "Anchor 5개사 기준 비교 표 + 경쟁 포지셔닝 매트릭스"
    axes:
      x: "IP 보유도 (낮음→높음)"
      y: "Turnkey 완성도 (낮음→높음)"
  deliverable_3:
    name: "D-3: 투자·M&A 매력도 평가"
    scoring_criteria:
      - "기술 차별성 (1-5)"
      - "시장 성장성 (1-5)"
      - "수익 안정성 (1-5)"
      - "전략 시너지 (1-5)"
    confidence_field: "ENUM(HIGH,MEDIUM,LOW)"
    note: "비공개 데이터 사용 시 confidence=LOW 필수 표기"
  deliverable_4:
    name: "D-4: 전략적 갭 분석"
    format: "Gap Matrix — 현재 역량 vs 목표 역량"
    dimensions:
      - "지역 커버리지"
      - "기술 스택"
      - "고객군"
      - "파트너십"

# ============================================================
# SECTION 6: VALIDATION RULES (PE-3 기준)
# ============================================================
validation_rules:
  rule_1_anchor_coverage:
    description: "Anchor 5개사 모두 D-1에 포함되어야 함"
    check: "COUNT(anchor IN D1) == 5"
    severity: "CRITICAL"
  rule_2_type_count:
    description: "각 Type별 최소 기업 수 충족"
    checks:
      - "COUNT(type_A) >= 8"
      - "COUNT(type_B) >= 13"
      - "COUNT(type_C) >= 3"
      - "COUNT(type_D) >= 4"
    severity: "HIGH"
  rule_3_idm_exclusion:
    description: "IDM 기업 완전 제외"
    idm_list: ["Intel (direct)", "Samsung Electronics (direct)", "SK Hynix", "Micron", "TSMC"]
    check: "NONE(idm IN D1)"
    severity: "CRITICAL"
  rule_4_date_format:
    description: "Founded 필드 YYYY 4자리 정수 강제"
    check: "REGEX(founded, '^[0-9]{4}$')"
    severity: "MEDIUM"
  rule_5_url_required:
    description: "모든 기업 URL 필드 1개 이상 포함"
    check: "ALL(url != NULL AND url STARTSWITH 'https://')"
    severity: "MEDIUM"
  rule_6_confidence_for_private:
    description: "비공개 데이터 사용 시 confidence 필드 LOW 표기"
    check: "IF(data_source == 'estimated') THEN confidence = 'LOW'"
    severity: "HIGH"

# ============================================================
# SECTION 7: EXECUTION PROTOCOL
# ============================================================
execution_protocol:
  mode: "PARALLEL"
  sections:
    - id: "S1"
      name: "Type A 기업 발굴"
      target_count: ">=8"
      priority: 1
    - id: "S2"
      name: "Type B 기업 발굴"
      target_count: ">=13"
      priority: 1
    - id: "S3"
      name: "Type C/D 기업 발굴"
      target_count: ">=7"
      priority: 2
    - id: "S4"
      name: "D-2 포지셔닝 매트릭스"
      depends_on: ["S1", "S2", "S3"]
      priority: 3
    - id: "S5"
      name: "D-3 투자 매력도 평가"
      depends_on: ["S1", "S2"]
      priority: 3
    - id: "S6"
      name: "D-4 갭 분석"
      depends_on: ["S4", "S5"]
      priority: 4
  error_handling:
    on_criteria_failure: "ADD_ALTERNATIVE_SOURCE"
    on_count_insufficient: "EXPAND_GEOGRAPHIC_SCOPE"
    on_data_unavailable: "MARK_CONFIDENCE_LOW_AND_CONTINUE"

# ============================================================
# PE-MIN Ga S4: Monthly Production Report — v2.0 COMPLETE
# Trigger: 매월 1일 09:00 KST / 수동 dispatch
# Pipeline:
#   1. 비중국 갈륨 생산량 집계 (USGS·EU CRMA·JOGMEC·KCMA·NRCan)
#   2. 50톤 임계 달성 여부 판정
#   3. Notion Monthly Reports DB 자동 푸시
#   4. PE-JV 파트너 평가 Notion 자동 연동
#   5. 50톤 달성 시 → S4 경보 자동 비활성화
#   6. global-semiconductor-ai-research 연동
# ============================================================
name: PE-MIN Ga S4 · Monthly Production Report

on:
  schedule:
    - cron: '0 0 1 * *'   # 매월 1일 00:00 UTC = 09:00 KST
  workflow_dispatch:
    inputs:
      reference_month:
        description: '집계 기준 월 (YYYY-MM, 기본: 직전월)'
        required: false
        default: ''
      force_s4_deactivate:
        description: 'S4 경보 강제 비활성화 (50톤 달성 확인 시)'
        required: false
        default: 'false'

env:
  PYTHON_VERSION: '3.11'
  GALLIUM_THRESHOLD_TONS: '50'

jobs:
  # ──────────────────────────────────────
  # JOB 1: 글로벌 갈륨 생산량 집계
  # ──────────────────────────────────────
  collect-production:
    name: '⛏️ 갈륨 생산량 집계 (5개 기관)'
    runs-on: ubuntu-latest
    outputs:
      total_non_cn_tons: ${{ steps.aggregate.outputs.total_non_cn_tons }}
      threshold_achieved: ${{ steps.aggregate.outputs.threshold_achieved }}
      s4_status: ${{ steps.aggregate.outputs.s4_status }}
      report_month: ${{ steps.aggregate.outputs.report_month }}
      breakdown_json: ${{ steps.aggregate.outputs.breakdown_json }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install requests pandas openpyxl notion-client python-dotenv

      - name: Collect from 5 agencies
        id: collect
        env:
          USGS_API_KEY: ${{ secrets.USGS_API_KEY }}
          REF_MONTH: ${{ github.event.inputs.reference_month || '' }}
        run: |
          python scripts/pe_min_ga_production_collector.py \
            --agencies USGS,EU_CRMA,JOGMEC,KCMA,NRCan \
            --month "${REF_MONTH}" \
            --output data/ga_production_raw.json

      - name: Aggregate & Threshold Evaluation
        id: aggregate
        env:
          FORCE_DEACTIVATE: ${{ github.event.inputs.force_s4_deactivate || 'false' }}
        run: |
          python scripts/pe_min_ga_s4_aggregator.py \
            --input data/ga_production_raw.json \
            --threshold ${{ env.GALLIUM_THRESHOLD_TONS }} \
            --output data/ga_s4_result.json

          TOTAL=$(python -c "import json; d=json.load(open('data/ga_s4_result.json')); print(d['total_non_cn_tons'])")
          ACHIEVED=$(python -c "import json; d=json.load(open('data/ga_s4_result.json')); print(str(d['threshold_achieved']).lower())")
          S4=$(python -c "import json; d=json.load(open('data/ga_s4_result.json')); print(d['s4_status'])")
          MONTH=$(python -c "import json; d=json.load(open('data/ga_s4_result.json')); print(d['report_month'])")
          BRK=$(cat data/ga_s4_result.json | tr -d '\n')

          echo "total_non_cn_tons=${TOTAL}" >> $GITHUB_OUTPUT
          echo "threshold_achieved=${ACHIEVED}" >> $GITHUB_OUTPUT
          echo "s4_status=${S4}" >> $GITHUB_OUTPUT
          echo "report_month=${MONTH}" >> $GITHUB_OUTPUT
          echo "breakdown_json=${BRK}" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ga-s4-result-${{ github.run_id }}
          path: data/ga_s4_result.json
          retention-days: 90

  # ──────────────────────────────────────
  # JOB 2: Notion DB 자동 기록
  # ──────────────────────────────────────
  notion-monthly-db:
    name: '📊 Notion Monthly Reports DB 자동 기록'
    runs-on: ubuntu-latest
    needs: collect-production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install notion-client requests

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ga-s4-result-${{ github.run_id }}
          path: data/

      - name: Push to Notion Monthly Reports DB
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_PE_MIN_RPT_DB: ${{ secrets.NOTION_PE_MIN_RPT_DB }}
          NOTION_PE_MIN_DB_ID: ${{ secrets.NOTION_PE_MIN_DB_ID }}
          TOTAL_TONS: ${{ needs.collect-production.outputs.total_non_cn_tons }}
          THRESHOLD_ACHIEVED: ${{ needs.collect-production.outputs.threshold_achieved }}
          S4_STATUS: ${{ needs.collect-production.outputs.s4_status }}
          REPORT_MONTH: ${{ needs.collect-production.outputs.report_month }}
        run: |
          python scripts/pe_min_notion_db_loop.py \
            --mode ga-s4-monthly \
            --report-path data/ga_s4_result.json

  # ──────────────────────────────────────
  # JOB 3: PE-JV 파트너 평가 연동
  # ──────────────────────────────────────
  pejv-integration:
    name: '🤝 PE-JV 파트너 평가 자동 연동'
    runs-on: ubuntu-latest
    needs: [collect-production, notion-monthly-db]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install notion-client requests

      - name: Update PE-JV Partner Evaluation
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_PE_JV_DB_ID: ${{ secrets.NOTION_PE_JV_DB_ID }}
          TOTAL_TONS: ${{ needs.collect-production.outputs.total_non_cn_tons }}
          S4_STATUS: ${{ needs.collect-production.outputs.s4_status }}
          REPORT_MONTH: ${{ needs.collect-production.outputs.report_month }}
        run: |
          python scripts/pe_min_notion_db_loop.py \
            --mode pejv-partner-update \
            --report-path data/ga_s4_result.json

  # ──────────────────────────────────────
  # JOB 4: S4 경보 상태 갱신
  # ──────────────────────────────────────
  s4-status-update:
    name: '🔔 S4 경보 상태 갱신'
    runs-on: ubuntu-latest
    needs: [collect-production, notion-monthly-db]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: S4 Alert Deactivation (50톤 달성 시)
        if: needs.collect-production.outputs.threshold_achieved == 'true'
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_PE_MIN_DB_ID: ${{ secrets.NOTION_PE_MIN_DB_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TOTAL_TONS: ${{ needs.collect-production.outputs.total_non_cn_tons }}
          REPORT_MONTH: ${{ needs.collect-production.outputs.report_month }}
        run: |
          echo "🎉 갈륨 비중국 생산 50톤 달성! S4 경보 자동 비활성화"
          python scripts/pe_min_notion_db_loop.py \
            --mode s4-deactivate \
            --total-tons ${TOTAL_TONS}

          # Slack 달성 알림
          curl -X POST "${SLACK_WEBHOOK_URL}" \
            -H 'Content-type: application/json' \
            --data "{
              \"text\": \":tada: *Gallium 50톤 달성!* S4 경보 자동 비활성화\\n비중국 연간 생산량: ${TOTAL_TONS}톤 (기준: ${REPORT_MONTH})\\n\\n→ [PE-MIN Library](https://app.notion.com/p/35155ed436f081d4aed4f7fc1958187f)\"
            }"

      - name: S4 Alert Remain Active (50톤 미달)
        if: needs.collect-production.outputs.threshold_achieved == 'false'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TOTAL_TONS: ${{ needs.collect-production.outputs.total_non_cn_tons }}
          REPORT_MONTH: ${{ needs.collect-production.outputs.report_month }}
        run: |
          echo "⚠️ 갈륨 50톤 미달 — S4 경보 유지"
          curl -X POST "${SLACK_WEBHOOK_URL}" \
            -H 'Content-type: application/json' \
            --data "{
              \"text\": \":warning: *Ga S4 Monthly Report* (${REPORT_MONTH})\\n비중국 생산량: ${TOTAL_TONS}톤 / 50톤 목표 미달\\nS4 경보 유지 중 — 다음 집계: 다음 달 1일\\n\\n→ [PE-MIN Library](https://app.notion.com/p/35155ed436f081d4aed4f7fc1958187f)\"
            }"

  # ──────────────────────────────────────
  # JOB 5: GSR 연동
  # ──────────────────────────────────────
  gsr-integration:
    name: '🔗 global-semiconductor-ai-research 연동'
    runs-on: ubuntu-latest
    needs: [collect-production, notion-monthly-db]
    steps:
      - name: Trigger GSR early-warning-monitor
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT_CROSS_REPO }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'GilbertKwak',
              repo: 'global-semiconductor-ai-research',
              workflow_id: 'early-warning-monitor.yml',
              ref: 'main',
              inputs: {
                source: 'pe-min-ga-s4-monthly-report',
                s4_status: '${{ needs.collect-production.outputs.s4_status }}',
                total_tons: '${{ needs.collect-production.outputs.total_non_cn_tons }}',
                report_month: '${{ needs.collect-production.outputs.report_month }}',
                run_id: '${{ github.run_id }}'
              }
            });
            console.log('✅ GSR early-warning-monitor.yml 트리거 완료');

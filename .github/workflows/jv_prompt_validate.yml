name: JV Fund Prompt Validation & Notion Sync

on:
  push:
    paths:
      - 'prompts/jv_fund/**'
  pull_request:
    paths:
      - 'prompts/jv_fund/**'
  schedule:
    # 월간 리뷰: 매월 1일 09:00 KST (00:00 UTC)
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      target_file:
        description: '검증 대상 파일 (기본: master_prompt_v4.md)'
        required: false
        default: 'prompts/jv_fund/master_prompt_v4.md'

jobs:
  validate-prompt:
    name: PE-1 / PE-3 자동 검증
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml requests

      - name: Run PE-1 Validation
        run: |
          python automation/auto_validate.py \
            --file ${{ github.event.inputs.target_file || 'prompts/jv_fund/master_prompt_v4.md' }} \
            --rules PE-1 \
            --output validation_report_pe1.json
          echo "PE-1 검증 완료"

      - name: Run PE-3 Validation
        run: |
          python automation/auto_validate.py \
            --file ${{ github.event.inputs.target_file || 'prompts/jv_fund/master_prompt_v4.md' }} \
            --rules PE-3 \
            --output validation_report_pe3.json
          echo "PE-3 검증 완료"

      - name: Upload Validation Reports
        uses: actions/upload-artifact@v4
        with:
          name: validation-reports
          path: |
            validation_report_pe1.json
            validation_report_pe3.json

  monthly-review-issue:
    name: 월간 검토 이슈 생성
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Monthly Review Issue
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date();
            const ym = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Monthly Review] JV Fund Prompt Library — ${ym}`,
              labels: ['prompt-review', 'monthly', 'jv-analysis'],
              body: `## 📋 월간 JV Fund 프롬프트 검토 — ${ym}\n\n### 검토 체크리스트\n- [ ] PE-1 준수율 확인 (목표: 95%+)\n- [ ] PE-3 점수 확인 (목표: 92/100)\n- [ ] 파생 프롬프트 업데이트 필요 여부\n- [ ] 신규 도메인 파생 프롬프트 검토\n- [ ] Notion 동기화 상태 확인\n- [ ] CHANGELOG 업데이트\n\n### 관련 파일\n- \`prompts/jv_fund/master_prompt_v4.md\`\n- \`prompts/jv_fund/CHANGELOG.md\`\n\n### Notion Hub\nhttps://notion.so/34f55ed436f081c08fececa8dd7577f9\n\n_자동 생성: ${new Date().toISOString()}_`
            });

  notion-sync-reminder:
    name: Notion 동기화 안내
    runs-on: ubuntu-latest
    needs: validate-prompt
    if: github.event_name == 'push'

    steps:
      - name: Notify Sync Status
        run: |
          echo "✅ 검증 완료"
          echo "📝 Notion 동기화 필요:"
          echo "   python automation/notion_sync.py --page 'JV Fund Prompt Library' --file prompts/jv_fund/master_prompt_v4.md"
          echo "🔗 Notion Hub: https://notion.so/34f55ed436f081c08fececa8dd7577f9"

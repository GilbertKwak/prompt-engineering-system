name: PE· Prompt Validate

on:
  push:
    branches: [main, develop]
    paths:
      - 'prompts/**'
      - 'schemas/**'
  pull_request:
    paths:
      - 'prompts/**'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'

jobs:
  validate:
    name: ✅ Validate Prompts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Validate prompt schemas
        run: |
          python scripts/validate_prompts.py \
            --schema schemas/prompt_schema.json \
            --dir prompts/ \
            --strict
      - name: Check metadata completeness
        run: |
          python scripts/check_metadata.py \
            --dir prompts/ \
            --required-fields "id,version,domain,created_at"

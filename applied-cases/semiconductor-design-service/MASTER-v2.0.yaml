# =============================================================================
# MASTER PROMPT v2.0 — 글로벌 반도체 설계 서비스 유사 기업 전수 발굴
# Project  : global-semiconductor-design-service
# Version  : 2.0
# Created  : 2026-04-25
# Author   : Gilbert Kwak (PE-7 AI Automation Engine)

name: PE · AI Ecosystem Pipeline

on:
  schedule:
    - cron: '0 7 * * 2'  # 매주 화요일 07:00 UTC = 16:00 KST
  workflow_dispatch:
    inputs:
      ecosystem_scope:
        description: '생태계 범위 (all | llm | infra | tools)'
        required: false
        default: 'all'

env:
  PYTHON_VERSION: '3.12'
  OUTPUT_DIR: output/ecosystem

jobs:
  ecosystem_run:
    name: 🌐 AI Ecosystem Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r automation/requirements.txt

      - name: Run ecosystem pipeline
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          SCOPE: ${{ github.event.inputs.ecosystem_scope || 'all' }}
        run: |
          mkdir -p ${{ env.OUTPUT_DIR }}
          python automation/pe_ai_ecosystem.py \
            --scope "$SCOPE" \
            --run-date "$(date -u '+%Y-%m-%d')" \
            --output "${{ env.OUTPUT_DIR }}/"

      - uses: actions/upload-artifact@v4
        with:
          name: ecosystem-$(date -u '+%Y%m%d')
          path: ${{ env.OUTPUT_DIR }}/
          retention-days: 14

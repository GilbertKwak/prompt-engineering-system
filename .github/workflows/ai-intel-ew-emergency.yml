# ============================================================
# AI Intel EW Emergency Response Workflow
# EW (Early Warning) 임계값 초과 시 즉각 실행
# 수동 trigger 또는 ai-intel-weekly.yml에서 workflow_call
# ============================================================
name: "PE · AI Intel EW Emergency"

on:
  workflow_dispatch:
    inputs:
      ew_domain:
        description: "EW 감지 도메인 (예: enterprise_deployment)"
        required: true
        default: "enterprise_deployment"
      ew_severity:
        description: "EW 심각도"
        required: true
        default: "MEDIUM"
        type: choice
        options:
          - MEDIUM
          - HIGH
          - CRITICAL
      ew_signals:
        description: "EW 시그널 (comma-separated)"
        required: false
        default: ""
      kg_current_version:
        description: "현재 KG 버전 (예: 4.25)"
        required: false
        default: ""
      notion_page_id:
        description: "Notion C-31 페이지 ID"
        required: false
        default: "34a55ed436f0814d9cffe6a2f0816e29"
  workflow_call:
    inputs:
      ew_domain:
        required: true
        type: string
      ew_severity:
        required: true
        type: string
      ew_signals:
        required: false
        type: string
        default: ""
      kg_current_version:
        required: false
        type: string
        default: ""
      notion_page_id:
        required: false
        type: string
        default: "34a55ed436f0814d9cffe6a2f0816e29"
    secrets:
      PERPLEXITY_API_KEY:
        required: true
      NOTION_API_KEY:
        required: true

env:
  PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
  NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
  PYTHONUNBUFFERED: "1"

jobs:
  # ─────────────────────────────────────
  # JOB 1: EW Deep Dive 수집 (sonar-pro)
  # ─────────────────────────────────────
  ew-deep-collect:
    name: "EW Deep Intel Collection"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      intel_dir: ${{ steps.set-dirs.outputs.intel_dir }}
      run_date: ${{ steps.set-dirs.outputs.run_date }}
      week_id: ${{ steps.set-dirs.outputs.week_id }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: automation/requirements.txt

      - name: Install dependencies
        run: pip install -r automation/requirements.txt

      - name: Set run metadata
        id: set-dirs
        run: |
          RUN_DATE=$(date -u +%Y-%m-%d)
          WEEK_ID=$(date -u +%Y-W%V)
          INTEL_DIR="output/ew_emergency/${RUN_DATE}"
          mkdir -p "$INTEL_DIR"
          echo "run_date=$RUN_DATE" >> $GITHUB_OUTPUT
          echo "week_id=$WEEK_ID" >> $GITHUB_OUTPUT
          echo "intel_dir=$INTEL_DIR" >> $GITHUB_OUTPUT
          echo "=== EW Emergency triggered ==="
          echo "Domain : ${{ inputs.ew_domain }}"
          echo "Severity: ${{ inputs.ew_severity }}"
          echo "Signals : ${{ inputs.ew_signals }}"

      - name: EW Deep Intel — sonar-pro
        run: |
          python automation/ai_intel_collector.py \
            --domain "${{ inputs.ew_domain }}" \
            --week "${{ steps.set-dirs.outputs.week_id }}" \
            --scope deep \
            --queries \
              "${{ inputs.ew_domain }} AI breakthrough disruption signal 2026" \
              "${{ inputs.ew_domain }} enterprise adoption rate shift latest" \
              "${{ inputs.ew_domain }} competitive dynamics sudden change" \
            --output "${{ steps.set-dirs.outputs.intel_dir }}/ew_intel_${{ inputs.ew_domain }}.json"

      - name: Upload EW intel artifact
        uses: actions/upload-artifact@v4
        with:
          name: ew-intel-${{ steps.set-dirs.outputs.run_date }}
          path: ${{ steps.set-dirs.outputs.intel_dir }}/
          retention-days: 14

  # ─────────────────────────────────────
  # JOB 2: KG Emergency Delta
  # ─────────────────────────────────────
  ew-kg-delta:
    name: "EW KG Emergency Delta"
    needs: ew-deep-collect
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      next_version: ${{ steps.kg.outputs.next_version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: automation/requirements.txt

      - name: Install dependencies
        run: pip install -r automation/requirements.txt

      - name: Download EW intel artifact
        uses: actions/download-artifact@v4
        with:
          name: ew-intel-${{ needs.ew-deep-collect.outputs.run_date }}
          path: output/ew_emergency/${{ needs.ew-deep-collect.outputs.run_date }}/

      - name: Compute KG versions
        id: kg
        run: |
          CURRENT="${{ inputs.kg_current_version }}"
          if [ -z "$CURRENT" ]; then
            CURRENT=$(python -c "
import glob, json, os
files = glob.glob('knowledge_graph_v*.json')
if files:
    latest = sorted(files)[-1]
    v = latest.replace('knowledge_graph_v','').replace('.json','').replace('_delta','')
    print(v)
else:
    print('4.25')
")
          fi
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          NEXT_MINOR=$((MINOR + 1))
          NEXT="${MAJOR}.${NEXT_MINOR}_EW"
          echo "current_version=$CURRENT" >> $GITHUB_OUTPUT
          echo "next_version=$NEXT" >> $GITHUB_OUTPUT
          echo "Current KG: $CURRENT → Next: $NEXT"

      - name: Generate EW KG Delta
        run: |
          python automation/kg_delta_generator.py \
            --intel-dir "output/ew_emergency/${{ needs.ew-deep-collect.outputs.run_date }}" \
            --current-version "${{ steps.kg.outputs.current_version }}" \
            --next-version "${{ steps.kg.outputs.next_version }}" \
            --week "${{ needs.ew-deep-collect.outputs.week_id }}" \
            --run-date "${{ needs.ew-deep-collect.outputs.run_date }}" \
            --ew-signals "${{ inputs.ew_signals }}" \
            --output "knowledge_graph_v${{ steps.kg.outputs.next_version }}_delta.json"

      - name: Upload KG Delta artifact
        uses: actions/upload-artifact@v4
        with:
          name: ew-kg-delta-${{ needs.ew-deep-collect.outputs.run_date }}
          path: knowledge_graph_v${{ steps.kg.outputs.next_version }}_delta.json
          retention-days: 30

      - name: Commit KG Delta to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add knowledge_graph_v${{ steps.kg.outputs.next_version }}_delta.json || true
          git diff --staged --quiet || git commit -m "kg(ew): emergency delta v${{ steps.kg.outputs.next_version }} — ${{ inputs.ew_severity }} @ ${{ needs.ew-deep-collect.outputs.run_date }}"
          git push || true

  # ─────────────────────────────────────
  # JOB 3: Notion C-31 EW 알림
  # ─────────────────────────────────────
  ew-notion-alert:
    name: "EW Notion C-31 Alert"
    needs: [ew-deep-collect, ew-kg-delta]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: automation/requirements.txt

      - name: Install dependencies
        run: pip install -r automation/requirements.txt

      - name: Download EW intel artifact
        uses: actions/download-artifact@v4
        with:
          name: ew-intel-${{ needs.ew-deep-collect.outputs.run_date }}
          path: output/ew_emergency/${{ needs.ew-deep-collect.outputs.run_date }}/
        continue-on-error: true

      - name: Update Notion C-31 with EW alert
        run: |
          python automation/notion_c31_updater.py \
            --page-id "${{ inputs.notion_page_id }}" \
            --week "${{ needs.ew-deep-collect.outputs.week_id }}" \
            --run-date "${{ needs.ew-deep-collect.outputs.run_date }}" \
            --ew-triggered true \
            --ew-count 1 \
            --ew-signals "${{ inputs.ew_signals }}" \
            --ew-severity "${{ inputs.ew_severity }}" \
            --kg-version "${{ needs.ew-kg-delta.outputs.next_version }}" \
            --node-count 0 \
            --edge-count 0 \
            --intel-dir "output/ew_emergency/${{ needs.ew-deep-collect.outputs.run_date }}"

      - name: EW Summary
        if: always()
        run: |
          echo "============================================"
          echo " EW EMERGENCY RESPONSE COMPLETE"
          echo "============================================"
          echo " Domain   : ${{ inputs.ew_domain }}"
          echo " Severity : ${{ inputs.ew_severity }}"
          echo " Signals  : ${{ inputs.ew_signals }}"
          echo " KG ver   : ${{ needs.ew-kg-delta.outputs.next_version }}"
          echo " Date     : ${{ needs.ew-deep-collect.outputs.run_date }}"
          echo "============================================"

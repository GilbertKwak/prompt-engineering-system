# ─────────────────────────────────────────────────────────────────────────────
# AI Intel Weekly · Section A — 전체 파이프라인
# 매주 월요일 01:00 UTC (cron: '0 1 * * 1') 자동 실행
# workflow_dispatch로 수동 실행 가능
#
# [SSOT] .github/prompts/execution_protocol_v2.6.md
#
# ── Secret 사용 원칙 ──────────────────────────────────────────────────────────
# 모든 secrets.*는 job-level env: 블록이 아닌 step-level env: 블록에만 선언합니다.
# 이유: secrets는 필요한 step에만 최소 노출 (principle of least privilege).
#
# ┌─────────────────────────┬───────────────────────────┬────────────────────┐
# │ Job                     │ Step                      │ Secret             │
# ├─────────────────────────┼───────────────────────────┼────────────────────┤
# │ collect-intel           │ 인텔 수집 — {domain}      │ PERPLEXITY_API_KEY │
# │ ew-detection            │ EW 탐지 실행              │ PERPLEXITY_API_KEY │
# │ notion-update           │ Notion C-31 업데이트      │ NOTION_API_KEY     │
# │                         │                           │ NOTION_C31_PAGE_ID │
# │ create-weekly-page      │ Notion Weekly Report 생성 │ NOTION_API_KEY     │
# │                         │                           │ NOTION_C31_PAGE_ID │
# └─────────────────────────┴───────────────────────────┴────────────────────┘
#
# ※ kg-delta, protocol-check, ew-alert, pipeline-summary 는
#   secrets를 직접 사용하지 않으므로 env 선언 불필요.
# ─────────────────────────────────────────────────────────────────────────────
name: "PE · AI Intel Weekly Digest"

on:
  schedule:
    - cron: "0 1 * * 1"
  workflow_dispatch:
    inputs:
      intel_scope:
        description: "수집 깊이 (standard / deep / emergency)"
        required: false
        default: "standard"
        type: choice
        options: ["standard", "deep", "emergency"]
      force_ew_check:
        description: "EW 강제 재검사 여부"
        required: false
        default: "false"
        type: boolean
      kg_version_override:
        description: "KG 버전 직접 지정 (비워두면 자동 +0.01)"
        required: false
        default: ""
        type: string
      protocol_debug:
        description: "실행 프로토콜 디버그 출력 여부"
        required: false
        default: "false"
        type: boolean

env:
  PYTHON_VERSION: "3.11"
  OUTPUT_DIR: "output/ai_intel"
  KG_BASE_VERSION: "4.25"
  PROTOCOL_PATH: ".github/prompts/execution_protocol_v2.6.md"
  PROTOCOL_MIN_BYTES: "500"

jobs:
  # ─── Job 0: 프로토콜 검증 ─────────────────────────────────────────────────
  protocol-check:
    name: "0. 실행 프로토콜 SSOT 검증"
    runs-on: ubuntu-latest
    # secrets 사용 없음

    outputs:
      protocol_hash: ${{ steps.hash.outputs.hash }}
      protocol_version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 프로토콜 파일 존재 및 크기 확인
        run: |
          if [ ! -f "${{ env.PROTOCOL_PATH }}" ]; then
            echo "::error::SSOT 파일 없음: ${{ env.PROTOCOL_PATH }}"
            exit 1
          fi
          FILE_BYTES=$(wc -c < "${{ env.PROTOCOL_PATH }}")
          FILE_LINES=$(wc -l < "${{ env.PROTOCOL_PATH }}")
          echo "✅ 프로토콜 파일 확인: ${{ env.PROTOCOL_PATH }}"
          echo "   크기: ${FILE_BYTES} bytes / ${FILE_LINES} lines"
          if [ "$FILE_BYTES" -lt "${{ env.PROTOCOL_MIN_BYTES }}" ]; then
            echo "::error::프로토콜 파일 크기 부족: ${FILE_BYTES} bytes (최소: ${{ env.PROTOCOL_MIN_BYTES }})"
            exit 1
          fi

      - name: 필수 섹션 존재 확인
        run: |
          REQUIRED_SECTIONS=("EXECUTION_PROTOCOL" "version" "domain")
          for SECTION in "${REQUIRED_SECTIONS[@]}"; do
            if ! grep -qi "$SECTION" "${{ env.PROTOCOL_PATH }}"; then
              echo "::warning::프로토콜 필수 섹션 미발견: '$SECTION' — 계속 진행"
            else
              echo "✅ 섹션 확인: $SECTION"
            fi
          done

      - name: 프로토콜 해시 계산
        id: hash
        run: |
          HASH=$(sha256sum "${{ env.PROTOCOL_PATH }}" | cut -d' ' -f1 | head -c 12)
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "📎 프로토콜 SHA256 (앞 12자): $HASH"

      - name: 프로토콜 버전 추출
        id: version
        run: |
          VERSION=$(grep -m1 -E 'version[:\s]+[v0-9]|^#.*v[0-9]+\.[0-9]+' "${{ env.PROTOCOL_PATH }}" \
            | sed 's/.*\(v[0-9][0-9.]*\).*/\1/' | head -1)
          if [ -z "$VERSION" ]; then
            VERSION="v2.6"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📋 프로토콜 버전: $VERSION"

      - name: 프로토콜 디버그 출력 (선택)
        if: github.event.inputs.protocol_debug == 'true'
        run: |
          echo "════════════════════════════════════════"
          echo "  EXECUTION PROTOCOL CONTENT (DEBUG)"
          echo "  파일: ${{ env.PROTOCOL_PATH }}"
          echo "  해시: ${{ steps.hash.outputs.hash }}"
          echo "════════════════════════════════════════"
          cat "${{ env.PROTOCOL_PATH }}"
          echo "════════════════════════════════════════"

  # ─── Job 1: 인텔 수집 ─────────────────────────────────────────────────────
  collect-intel:
    name: "1. 도메인별 인텔 수집"
    needs: protocol-check
    runs-on: ubuntu-latest
    # secrets: PERPLEXITY_API_KEY → "인텔 수집 — {domain}" step에만 주입
    strategy:
      matrix:
        domain:
          - enterprise_deployment
          - model_performance
          - infrastructure
          - regulatory
          - open_source
          - investment
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: 의존성 설치
        run: pip install -r automation/requirements_ai_intel.txt

      - name: 출력 디렉토리 생성
        run: mkdir -p ${{ env.OUTPUT_DIR }}

      - name: 실행 프로토콜 주입 (SSOT)
        run: |
          echo "EXECUTION_PROTOCOL<<__PROTOCOL_EOF__" >> $GITHUB_ENV
          cat "${{ env.PROTOCOL_PATH }}" >> $GITHUB_ENV
          echo "__PROTOCOL_EOF__" >> $GITHUB_ENV
          INJECTED=$(wc -c < "${{ env.PROTOCOL_PATH }}")
          if [ "$INJECTED" -lt "${{ env.PROTOCOL_MIN_BYTES }}" ]; then
            echo "::error::프로토콜 주입 크기 이상: ${INJECTED} bytes"
            exit 1
          fi
          echo "EXECUTION_PROTOCOL_HASH=${{ needs.protocol-check.outputs.protocol_hash }}" >> $GITHUB_ENV
          echo "EXECUTION_PROTOCOL_VERSION=${{ needs.protocol-check.outputs.protocol_version }}" >> $GITHUB_ENV
          echo "✅ EXECUTION_PROTOCOL 주입 완료 — ${INJECTED} bytes"

      - name: 주차 및 메타 계산
        id: meta
        run: |
          WEEK=$(python3 -c "from datetime import date; d=date.today(); print(f'{d.year}-W{d.isocalendar()[1]:02d}')")
          RUN_DATE=$(date +%Y-%m-%d)
          SCOPE="${{ github.event.inputs.intel_scope || 'standard' }}"
          if [ "$SCOPE" = "emergency" ]; then
            FORCE_MODEL="sonar-pro"
          else
            FORCE_MODEL=""
          fi
          echo "week=$WEEK" >> $GITHUB_OUTPUT
          echo "run_date=$RUN_DATE" >> $GITHUB_OUTPUT
          echo "scope=$SCOPE" >> $GITHUB_OUTPUT
          echo "force_model=$FORCE_MODEL" >> $GITHUB_OUTPUT
          echo "📅 주차: $WEEK | 실행일: $RUN_DATE | 스코프: $SCOPE"

      # ── step-level env 블록 — PERPLEXITY_API_KEY 이 step에만 노출 ─────────
      - name: 인텔 수집 — ${{ matrix.domain }}
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          FORCE_MODEL: ${{ steps.meta.outputs.force_model }}
        run: |
          DOMAIN="${{ matrix.domain }}"
          WEEK="${{ steps.meta.outputs.week }}"
          SCOPE="${{ steps.meta.outputs.scope }}"

          declare -A QUERIES
          QUERIES[enterprise_deployment]="enterprise AI deployment ROI 2026 Q2|LLM enterprise governance compliance cost optimization"
          QUERIES[model_performance]="LLM benchmark leaderboard 2026 GPT-4o Claude Gemini comparison|AI model inference latency throughput cost tradeoff"
          QUERIES[infrastructure]="NVIDIA B200 GB200 supply allocation 2026|AI datacenter energy efficiency liquid cooling trends"
          QUERIES[regulatory]="EU AI Act enforcement 2026 compliance deadline|US AI executive order regulation update 2026"
          QUERIES[open_source]="open source LLM Llama Mistral Qwen release 2026|LangChain LlamaIndex Hugging Face major update 2026"
          QUERIES[investment]="AI startup Series B C funding 2026 Q2|AI infrastructure M&A acquisition 2026 semiconductor"

          IFS='|' read -ra Q_ARRAY <<< "${QUERIES[$DOMAIN]}"

          python automation/ai_intel_collector.py \
            --domain "$DOMAIN" \
            --week "$WEEK" \
            --scope "$SCOPE" \
            --queries "${Q_ARRAY[@]}" \
            --output "${{ env.OUTPUT_DIR }}/intel_${DOMAIN}.json"

      - name: 인텔 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: intel-${{ matrix.domain }}
          path: ${{ env.OUTPUT_DIR }}/intel_${{ matrix.domain }}.json
          retention-days: 7

  # ─── Job 2: EW 탐지 ───────────────────────────────────────────────────────
  ew-detection:
    name: "2. Early Warning 탐지"
    needs: [protocol-check, collect-intel]
    runs-on: ubuntu-latest
    # secrets: PERPLEXITY_API_KEY → "EW 탐지 실행" step에만 주입

    outputs:
      ew_triggered: ${{ steps.ew.outputs.ew_triggered }}
      ew_count: ${{ steps.ew.outputs.ew_count }}
      ew_signals: ${{ steps.ew.outputs.ew_signals }}
      ew_severity: ${{ steps.ew.outputs.ew_severity }}
      week: ${{ steps.meta.outputs.week }}
      run_date: ${{ steps.meta.outputs.run_date }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - run: pip install -r automation/requirements_ai_intel.txt

      - name: 아티팩트 다운로드
        uses: actions/download-artifact@v4
        with:
          pattern: intel-*
          path: ${{ env.OUTPUT_DIR }}
          merge-multiple: true

      - name: 실행 프로토콜 주입 (SSOT)
        run: |
          echo "EXECUTION_PROTOCOL<<__PROTOCOL_EOF__" >> $GITHUB_ENV
          cat "${{ env.PROTOCOL_PATH }}" >> $GITHUB_ENV
          echo "__PROTOCOL_EOF__" >> $GITHUB_ENV
          INJECTED=$(wc -c < "${{ env.PROTOCOL_PATH }}")
          if [ "$INJECTED" -lt "${{ env.PROTOCOL_MIN_BYTES }}" ]; then
            echo "::error::프로토콜 주입 크기 이상: ${INJECTED} bytes"
            exit 1
          fi
          echo "EXECUTION_PROTOCOL_HASH=${{ needs.protocol-check.outputs.protocol_hash }}" >> $GITHUB_ENV
          echo "EXECUTION_PROTOCOL_VERSION=${{ needs.protocol-check.outputs.protocol_version }}" >> $GITHUB_ENV
          echo "✅ EXECUTION_PROTOCOL 주입 완료 — ${INJECTED} bytes"

      - name: 주차 계산
        id: meta
        run: |
          WEEK=$(python3 -c "from datetime import date; d=date.today(); print(f'{d.year}-W{d.isocalendar()[1]:02d}')")
          echo "week=$WEEK" >> $GITHUB_OUTPUT
          echo "run_date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      # ── step-level env 블록 — PERPLEXITY_API_KEY 이 step에만 노출 ─────────
      - name: EW 탐지 실행
        id: ew
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          FORCE_EW: ${{ github.event.inputs.force_ew_check || 'false' }}
        run: |
          python automation/ai_ew_detector.py \
            --input-dir "${{ env.OUTPUT_DIR }}" \
            --week "${{ steps.meta.outputs.week }}" \
            --output "${{ env.OUTPUT_DIR }}/ew_report.json"

          python3 << 'PYEOF'
          import json, os
          report_path = os.path.join(os.environ.get("OUTPUT_DIR", "output/ai_intel"), "ew_report.json")
          try:
              data = json.load(open(report_path))
          except Exception as e:
              print(f"[WARN] EW 리포트 파싱 실패: {e} — 기본값 사용")
              data = {}
          triggered = str(data.get("ew_triggered", False)).lower()
          count = data.get("total_ew_signals", 0)
          signals = ",".join(data.get("signal_names", []))
          severity = data.get("overall_severity", "NONE")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"ew_triggered={triggered}\n")
              f.write(f"ew_count={count}\n")
              f.write(f"ew_signals={signals}\n")
              f.write(f"ew_severity={severity}\n")
          print(f"[EW] triggered={triggered} | count={count} | severity={severity} | signals={signals}")
          PYEOF

      - name: EW 리포트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: ew-report
          path: ${{ env.OUTPUT_DIR }}/ew_report.json
          retention-days: 7

  # ─── Job 3: KG 델타 생성 ──────────────────────────────────────────────────
  kg-delta:
    name: "3. Knowledge Graph 델타 생성"
    needs: [protocol-check, ew-detection]
    runs-on: ubuntu-latest
    # secrets 사용 없음

    outputs:
      kg_next_version: ${{ steps.kg.outputs.next_version }}
      node_count: ${{ steps.kg.outputs.node_count }}
      edge_count: ${{ steps.kg.outputs.edge_count }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - run: pip install -r automation/requirements_ai_intel.txt

      - name: 아티팩트 다운로드
        uses: actions/download-artifact@v4
        with:
          pattern: intel-*
          path: ${{ env.OUTPUT_DIR }}
          merge-multiple: true

      - name: 실행 프로토콜 주입 (SSOT)
        run: |
          echo "EXECUTION_PROTOCOL<<__PROTOCOL_EOF__" >> $GITHUB_ENV
          cat "${{ env.PROTOCOL_PATH }}" >> $GITHUB_ENV
          echo "__PROTOCOL_EOF__" >> $GITHUB_ENV
          INJECTED=$(wc -c < "${{ env.PROTOCOL_PATH }}")
          if [ "$INJECTED" -lt "${{ env.PROTOCOL_MIN_BYTES }}" ]; then
            echo "::error::프로토콜 주입 크기 이상: ${INJECTED} bytes"
            exit 1
          fi
          echo "EXECUTION_PROTOCOL_HASH=${{ needs.protocol-check.outputs.protocol_hash }}" >> $GITHUB_ENV
          echo "EXECUTION_PROTOCOL_VERSION=${{ needs.protocol-check.outputs.protocol_version }}" >> $GITHUB_ENV
          echo "✅ EXECUTION_PROTOCOL 주입 완료 — ${INJECTED} bytes"

      - name: KG 버전 계산 및 델타 생성
        id: kg
        run: |
          OVERRIDE="${{ github.event.inputs.kg_version_override }}"
          CURRENT="${{ env.KG_BASE_VERSION }}"

          if [ -n "$OVERRIDE" ]; then
            NEXT_VER="$OVERRIDE"
          else
            MAJOR=$(echo $CURRENT | cut -d. -f1)
            MINOR=$(echo $CURRENT | cut -d. -f2)
            NEXT_MINOR=$((MINOR + 1))
            NEXT_VER="${MAJOR}.${NEXT_MINOR}"
          fi
          echo "next_version=$NEXT_VER" >> $GITHUB_OUTPUT
          echo "[INFO] KG 버전: ${CURRENT} → ${NEXT_VER}"

          python automation/kg_delta_generator.py \
            --intel-dir "${{ env.OUTPUT_DIR }}" \
            --current-version "$CURRENT" \
            --next-version "$NEXT_VER" \
            --week "${{ needs.ew-detection.outputs.week }}" \
            --run-date "${{ needs.ew-detection.outputs.run_date }}" \
            --ew-signals "${{ needs.ew-detection.outputs.ew_signals }}" \
            --output "knowledge_graph_v${NEXT_VER}_delta.json"

          python3 << 'PYEOF'
          import json, os, glob
          files = glob.glob("knowledge_graph_v*_delta.json")
          if files:
              data = json.load(open(files[0]))
              node_count = data.get("node_count", len(data.get("nodes", [])))
              edge_count = data.get("edge_count", len(data.get("edges", [])))
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write(f"node_count={node_count}\n")
                  f.write(f"edge_count={edge_count}\n")
              print(f"[KG] nodes={node_count} | edges={edge_count}")
          else:
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("node_count=0\nedge_count=0\n")
              print("[WARN] KG 델타 파일 미발견")
          PYEOF

      - name: KG 델타 업로드
        uses: actions/upload-artifact@v4
        with:
          name: kg-delta
          path: knowledge_graph_v*_delta.json
          retention-days: 30

  # ─── Job 4: Notion C-31 업데이트 ─────────────────────────────────────────
  notion-update:
    name: "4. Notion C-31 업데이트"
    needs: [protocol-check, ew-detection, kg-delta]
    runs-on: ubuntu-latest
    # secrets: NOTION_API_KEY, NOTION_C31_PAGE_ID → "Notion C-31 업데이트" step에만 주입

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - run: pip install -r automation/requirements_ai_intel.txt

      - name: 아티팩트 다운로드
        uses: actions/download-artifact@v4
        with:
          pattern: intel-*
          path: ${{ env.OUTPUT_DIR }}
          merge-multiple: true

      - name: 실행 프로토콜 주입 (SSOT)
        run: |
          echo "EXECUTION_PROTOCOL<<__PROTOCOL_EOF__" >> $GITHUB_ENV
          cat "${{ env.PROTOCOL_PATH }}" >> $GITHUB_ENV
          echo "__PROTOCOL_EOF__" >> $GITHUB_ENV
          INJECTED=$(wc -c < "${{ env.PROTOCOL_PATH }}")
          if [ "$INJECTED" -lt "${{ env.PROTOCOL_MIN_BYTES }}" ]; then
            echo "::error::프로토콜 주입 크기 이상: ${INJECTED} bytes"
            exit 1
          fi
          echo "EXECUTION_PROTOCOL_HASH=${{ needs.protocol-check.outputs.protocol_hash }}" >> $GITHUB_ENV
          echo "EXECUTION_PROTOCOL_VERSION=${{ needs.protocol-check.outputs.protocol_version }}" >> $GITHUB_ENV
          echo "✅ EXECUTION_PROTOCOL 주입 완료 — ${INJECTED} bytes"

      - name: NOTION_C31_PAGE_ID Secret 확인
        id: secret_check
        run: |
          if [ -z "${{ secrets.NOTION_C31_PAGE_ID }}" ]; then
            echo "::warning::NOTION_C31_PAGE_ID Secret 미설정 — Notion 업데이트를 건너뜁니다."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      # ── step-level env 블록 — NOTION_API_KEY / NOTION_C31_PAGE_ID 이 step에만 노출 ─
      - name: Notion C-31 업데이트
        if: steps.secret_check.outputs.skip != 'true'
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_C31_PAGE_ID: ${{ secrets.NOTION_C31_PAGE_ID }}
        run: |
          python automation/notion_c31_updater.py \
            --page-id "$NOTION_C31_PAGE_ID" \
            --week "${{ needs.ew-detection.outputs.week }}" \
            --run-date "${{ needs.ew-detection.outputs.run_date }}" \
            --ew-triggered "${{ needs.ew-detection.outputs.ew_triggered }}" \
            --ew-count "${{ needs.ew-detection.outputs.ew_count }}" \
            --ew-signals "${{ needs.ew-detection.outputs.ew_signals }}" \
            --ew-severity "${{ needs.ew-detection.outputs.ew_severity }}" \
            --kg-version "${{ needs.kg-delta.outputs.kg_next_version }}" \
            --node-count "${{ needs.kg-delta.outputs.node_count }}" \
            --edge-count "${{ needs.kg-delta.outputs.edge_count }}" \
            --intel-dir "${{ env.OUTPUT_DIR }}"

  # ─── Job 4.5: Notion Weekly Report 페이지 자동 생성 ─────────────────────
  create-weekly-page:
    name: "4.5. Notion Weekly Intel Report 페이지 생성"
    needs: [protocol-check, ew-detection, kg-delta]
    runs-on: ubuntu-latest
    # secrets: NOTION_API_KEY, NOTION_C31_PAGE_ID → "Notion Weekly Report 페이지 생성" step에만 주입

    outputs:
      page_url: ${{ steps.create_page.outputs.page_url }}
      page_id: ${{ steps.create_page.outputs.page_id }}
      week: ${{ steps.week_meta.outputs.week }}
      week_range: ${{ steps.week_meta.outputs.week_range }}
      next_week: ${{ steps.week_meta.outputs.next_week }}
      next_run_date: ${{ steps.week_meta.outputs.next_run_date }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - run: pip install -r automation/requirements_ai_intel.txt

      - name: 주차 및 리포트 메타 계산
        id: week_meta
        run: |
          python3 << 'PYEOF'
          import os
          from datetime import date, timedelta

          today = date.today()
          iso = today.isocalendar()
          year, week = iso[0], iso[1]

          monday = today - timedelta(days=today.weekday())
          sunday = monday + timedelta(days=6)
          week_range = f"{monday.strftime('%Y-%m-%d')} ~ {sunday.strftime('%Y-%m-%d')}"

          next_monday = monday + timedelta(days=7)
          next_iso = next_monday.isocalendar()
          next_week = f"{next_iso[0]}-W{next_iso[1]:02d}"
          next_run_date = next_monday.strftime('%Y-%m-%d')

          week_str = f"{year}-W{week:02d}"

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"week={week_str}\n")
              f.write(f"week_range={week_range}\n")
              f.write(f"next_week={next_week}\n")
              f.write(f"next_run_date={next_run_date}\n")

          print(f"[META] week={week_str} | range={week_range} | next={next_week} ({next_run_date})")
          PYEOF

      - name: NOTION_C31_PAGE_ID Secret 확인
        id: secret_check
        run: |
          if [ -z "${{ secrets.NOTION_C31_PAGE_ID }}" ]; then
            echo "::warning::NOTION_C31_PAGE_ID Secret 미설정 — Weekly Report 페이지 생성을 건너뜁니다."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      # ── step-level env 블록 — NOTION_API_KEY / NOTION_C31_PAGE_ID 이 step에만 노출 ─
      # ※ Python 코드에서 os.environ["NOTION_API_KEY"] 로 읽는 구조와 완전히 일치
      - name: Notion Weekly Report 페이지 생성
        id: create_page
        if: steps.secret_check.outputs.skip != 'true'
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_C31_PAGE_ID: ${{ secrets.NOTION_C31_PAGE_ID }}
          WEEK: ${{ steps.week_meta.outputs.week }}
          WEEK_RANGE: ${{ steps.week_meta.outputs.week_range }}
          NEXT_WEEK: ${{ steps.week_meta.outputs.next_week }}
          NEXT_RUN_DATE: ${{ steps.week_meta.outputs.next_run_date }}
          RUN_DATE: ${{ needs.ew-detection.outputs.run_date }}
          EW_TRIGGERED: ${{ needs.ew-detection.outputs.ew_triggered }}
          EW_COUNT: ${{ needs.ew-detection.outputs.ew_count }}
          EW_SIGNALS: ${{ needs.ew-detection.outputs.ew_signals }}
          EW_SEVERITY: ${{ needs.ew-detection.outputs.ew_severity }}
          KG_VER: ${{ needs.kg-delta.outputs.kg_next_version }}
          NODES: ${{ needs.kg-delta.outputs.node_count }}
          EDGES: ${{ needs.kg-delta.outputs.edge_count }}
        run: |
          python3 << PYEOF
          import os, json, urllib.request, urllib.error, datetime

          NOTION_API_KEY = os.environ["NOTION_API_KEY"]
          C31_PAGE_ID    = os.environ["NOTION_C31_PAGE_ID"]
          WEEK           = os.environ["WEEK"]
          WEEK_RANGE     = os.environ["WEEK_RANGE"]
          NEXT_WEEK      = os.environ["NEXT_WEEK"]
          NEXT_RUN_DATE  = os.environ["NEXT_RUN_DATE"]
          RUN_DATE       = os.environ["RUN_DATE"]
          EW_TRIGGERED   = os.environ["EW_TRIGGERED"]
          EW_COUNT       = os.environ["EW_COUNT"]
          EW_SIGNALS     = os.environ["EW_SIGNALS"]
          EW_SEVERITY    = os.environ["EW_SEVERITY"]
          KG_VER         = os.environ["KG_VER"]
          NODES          = os.environ["NODES"]
          EDGES          = os.environ["EDGES"]

          severity_emoji = {"HIGH": "🔴", "MEDIUM": "🟡", "LOW": "🟢", "NONE": "⚪️"}.get(EW_SEVERITY, "⚪️")
          ew_status = f"{severity_emoji} EW {EW_TRIGGERED.upper()} — {EW_COUNT}개 신호 ({EW_SEVERITY})" \
                      if EW_TRIGGERED == "true" else "✅ EW 없음"

          title = f"📊 Weekly Intel Report — {WEEK}"

          def rt(text, bold=False, code=False):
              annotations = {"bold": bold, "italic": False, "strikethrough": False,
                             "underline": False, "code": code, "color": "default"}
              return {"type": "text", "text": {"content": text}, "annotations": annotations}

          def heading(level, text):
              return {"object": "block", "type": f"heading_{level}",
                      f"heading_{level}": {"rich_text": [rt(text)]}}

          def para(items):
              return {"object": "block", "type": "paragraph",
                      "paragraph": {"rich_text": items if isinstance(items, list) else [rt(items)]}}

          def divider():
              return {"object": "block", "type": "divider", "divider": {}}

          def callout(text, emoji="⚙️"):
              return {"object": "block", "type": "callout",
                      "callout": {"rich_text": [rt(text)], "icon": {"type": "emoji", "emoji": emoji}}}

          def table_row(cells):
              return {"type": "table_row", "table_row": {
                  "cells": [[rt(c)] for c in cells]}}

          def table_block(rows, has_header=True):
              return {"object": "block", "type": "table",
                      "table": {"table_width": len(rows[0]), "has_column_header": has_header,
                                "has_row_header": False,
                                "children": [table_row(r) for r in rows]}}

          def todo(text):
              return {"object": "block", "type": "to_do",
                      "to_do": {"rich_text": [rt(text)], "checked": False}}

          def toggle(summary, children_text):
              return {"object": "block", "type": "toggle",
                      "toggle": {"rich_text": [rt(summary)],
                                 "children": [para(children_text)]}}

          def quote(text):
              return {"object": "block", "type": "quote",
                      "quote": {"rich_text": [rt(text)]}}

          companies = ["ASML", "LamResearch", "AMAT", "KLA", "TEL"]
          prev_edi  = {"ASML": "0.78", "LamResearch": "0.71", "AMAT": "0.65", "KLA": "0.58", "TEL": "0.52"}
          prev_fdrs = {"ASML": "0.81", "LamResearch": "0.74", "AMAT": "0.68", "KLA": "0.62", "TEL": "0.55"}

          children = [
              heading(1, "📋 리포트 메타데이터"),
              table_block([
                  ["항목", "값"],
                  ["리포트 ID", f"INTEL-{WEEK.replace('-','')}-AUTO"],
                  ["대상 기간", WEEK_RANGE],
                  ["생성일", f"{RUN_DATE} KST (자동)"],
                  ["도메인", "C-31 PE-EQP-MAP"],
                  ["커버 기업", "ASML · LamResearch · AMAT · KLA · TEL"],
                  ["EW 상태", ew_status],
                  ["KG 버전", f"v{KG_VER} ({NODES} nodes / {EDGES} edges)"],
                  ["생성 방식", "GitHub Actions 자동 파이프라인 (cron: 0 1 * * 1)"],
                  ["상태", "🟢 파이프라인 완료"],
              ]),
              divider(),

              heading(1, "🚨 EW (Early Warning) 탐지 결과"),
              callout("이 섹션은 GitHub Actions ew-detection Job 결과가 자동 주입됩니다.", "⚙️"),
              table_block([
                  ["기업", "FSM State", "EDI", "FDRS", "ExportShock", "긴급도"],
              ] + [
                  [c, "—", "TBD", "TBD", "TBD", "⏳"] for c in companies
              ]),
              divider(),

              heading(1, "📡 도메인별 인텔 수집 결과"),
              callout("이 섹션은 GitHub Actions collect-intel Job 결과가 자동 주입됩니다.", "⚙️"),
              heading(2, "🔧 PE-EQP (첨단 장비)"),
              toggle("ASML — 주간 동향", f"⏳ {WEEK} 파이프라인 실행 후 자동 채워집니다"),
              toggle("LamResearch — 주간 동향", f"⏳ {WEEK} 파이프라인 실행 후 자동 채워집니다"),
              toggle("AMAT / KLA / TEL — 주간 동향", f"⏳ {WEEK} 파이프라인 실행 후 자동 채워집니다"),
              heading(2, "🤖 PE-AI (AI 플랫폼)"),
              toggle("AI 인프라 장비 연계 동향", f"⏳ {WEEK} 파이프라인 실행 후 자동 채워집니다"),
              heading(2, "💾 PE-SEMI (반도체 공급망)"),
              toggle("ASML EUV → 첨단 노드 연계", f"⏳ {WEEK} 파이프라인 실행 후 자동 채워집니다"),
              divider(),

              heading(1, "📈 주간 지표 변화 추적"),
              table_block([
                  ["기업", f"EDI (전주)", f"EDI ({WEEK})", f"FDRS (전주)", f"FDRS ({WEEK})", "변화"],
              ] + [
                  [c, prev_edi[c], "TBD", prev_fdrs[c], "TBD", "⏳"] for c in companies
              ]),
              quote("수치는 분기 IR 발표 이후 자동 갱신. 주간 리포트는 신규 규제 이벤트 발생 시에만 변동"),
              divider(),

              heading(1, "🔗 액션 아이템"),
              todo("ASML: NL 수출허가 발표 모니터링 (주간)"),
              todo("TEL: 일본 경제안보추진법 시행령 개정 여부 확인"),
              todo("KLA: Inspection 이중용도 재심 결과 추적"),
              todo("전체: Q2 2026 IR 시즌 대비 EDI/FDRS 업데이트 준비"),
              divider(),

              heading(1, "🔗 연계 리소스"),
              table_block([
                  ["항목", "링크"],
                  ["C-31 PE-EQP-MAP", f"https://www.notion.so/{C31_PAGE_ID.replace('-','')}"],
                  ["GitHub Actions 워크플로우", "https://github.com/GilbertKwak/prompt-engineering-system/blob/main/.github/workflows/ai-intel-weekly.yml"],
                  ["EW 탐지 스크립트", "automation/ai_ew_detector.py"],
                  ["인텔 수집 스크립트", "automation/ai_intel_collector.py"],
              ]),
              divider(),

              quote(f"🤖 자동 생성: GitHub Actions create-weekly-page Job | cron: 0 1 * * 1"),
              quote(f"📅 다음 리포트: {NEXT_RUN_DATE} ({NEXT_WEEK}) 자동 생성 예정"),
          ]

          payload = {
              "parent": {"type": "page_id", "page_id": C31_PAGE_ID},
              "icon": {"type": "emoji", "emoji": "📊"},
              "properties": {
                  "title": {"title": [{"type": "text", "text": {"content": title}}]}
              },
              "children": children
          }

          headers = {
              "Authorization": f"Bearer {NOTION_API_KEY}",
              "Content-Type": "application/json",
              "Notion-Version": "2022-06-28"
          }

          req = urllib.request.Request(
              "https://api.notion.com/v1/pages",
              data=json.dumps(payload).encode("utf-8"),
              headers=headers,
              method="POST"
          )

          try:
              with urllib.request.urlopen(req) as resp:
                  result = json.loads(resp.read().decode("utf-8"))
              page_id  = result["id"]
              page_url = result["url"]
              print(f"✅ Notion 페이지 생성 완료!")
              print(f"   제목  : {title}")
              print(f"   ID    : {page_id}")
              print(f"   URL   : {page_url}")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write(f"page_id={page_id}\n")
                  f.write(f"page_url={page_url}\n")
          except urllib.error.HTTPError as e:
              body = e.read().decode("utf-8")
              print(f"::error::Notion API 오류 {e.code}: {body}")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("page_id=\npage_url=\n")

          PYEOF

      - name: 생성된 페이지 URL 요약 출력
        if: steps.create_page.outputs.page_url != ''
        run: |
          echo "════════════════════════════════════════════════════════"
          echo "  📊 Weekly Intel Report 페이지 생성 완료"
          echo "════════════════════════════════════════════════════════"
          echo "  주차  : ${{ steps.week_meta.outputs.week }}"
          echo "  URL   : ${{ steps.create_page.outputs.page_url }}"
          echo "  ID    : ${{ steps.create_page.outputs.page_id }}"
          echo "════════════════════════════════════════════════════════"

          cat >> $GITHUB_STEP_SUMMARY << SUMMARY_EOF
          ## 📊 Weekly Intel Report 페이지 생성

          | 항목 | 값 |
          |---|---|
          | 주차 | ${{ steps.week_meta.outputs.week }} |
          | 대상 기간 | ${{ steps.week_meta.outputs.week_range }} |
          | Notion URL | ${{ steps.create_page.outputs.page_url }} |
          | 다음 리포트 | ${{ steps.week_meta.outputs.next_week }} (${{ steps.week_meta.outputs.next_run_date }}) |
          SUMMARY_EOF

  # ─── Job 5: EW 긴급 알림 ─────────────────────────────────────────────────
  ew-alert:
    name: "5. EW 긴급 알림"
    needs: [protocol-check, ew-detection]
    runs-on: ubuntu-latest
    if: needs.ew-detection.outputs.ew_triggered == 'true' && needs.ew-detection.outputs.ew_severity == 'HIGH'
    # secrets 사용 없음 (github-script는 GITHUB_TOKEN 자동 주입)

    steps:
      - name: EW 긴급 Issue 생성
        uses: actions/github-script@v7
        with:
          script: |
            const week     = "${{ needs.ew-detection.outputs.week }}";
            const signals  = "${{ needs.ew-detection.outputs.ew_signals }}";
            const severity = "${{ needs.ew-detection.outputs.ew_severity }}";
            const pHash    = "${{ needs.protocol-check.outputs.protocol_hash }}";
            const pVersion = "${{ needs.protocol-check.outputs.protocol_version }}";
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `🚨 [EW-${severity}] AI Intel Early Warning · ${week}`,
              body: [
                "## Early Warning 발동",
                "",
                `- **주차**: ${week}`,
                `- **심각도**: ${severity}`,
                `- **신호**: ${signals || "(없음)"}`,
                `- **실행 프로토콜**: \`${pVersion}\` (hash: \`${pHash}\`)`,
                `- **SSOT 경로**: \`.github/prompts/execution_protocol_v2.6.md\``,
                "",
                "> 자동 생성된 EW 이슈입니다. 즉각 검토 필요."
              ].join("\n"),
              labels: ["early-warning", "ai-intel", "urgent"]
            });

  # ─── Job 6: 파이프라인 완료 요약 ─────────────────────────────────────────
  pipeline-summary:
    name: "6. 파이프라인 완료 요약"
    needs: [protocol-check, ew-detection, kg-delta, notion-update, create-weekly-page]
    runs-on: ubuntu-latest
    if: always()
    # secrets 사용 없음

    steps:
      - name: Step Summary 및 로그 출력
        run: |
          WEEK="${{ needs.ew-detection.outputs.week }}"
          RUN_DATE="${{ needs.ew-detection.outputs.run_date }}"
          EW_TRIGGERED="${{ needs.ew-detection.outputs.ew_triggered }}"
          EW_SEVERITY="${{ needs.ew-detection.outputs.ew_severity }}"
          EW_SIGNALS="${{ needs.ew-detection.outputs.ew_signals }}"
          KG_VER="${{ needs.kg-delta.outputs.kg_next_version }}"
          NODES="${{ needs.kg-delta.outputs.node_count }}"
          EDGES="${{ needs.kg-delta.outputs.edge_count }}"
          P_HASH="${{ needs.protocol-check.outputs.protocol_hash }}"
          P_VER="${{ needs.protocol-check.outputs.protocol_version }}"
          PAGE_URL="${{ needs.create-weekly-page.outputs.page_url }}"
          PAGE_WEEK="${{ needs.create-weekly-page.outputs.week }}"

          echo "════════════════════════════════════════════════════════"
          echo "  PE · AI Intel Weekly Digest — 파이프라인 완료 요약"
          echo "════════════════════════════════════════════════════════"
          echo "  주차              : ${WEEK}"
          echo "  실행일            : ${RUN_DATE}"
          echo "  EW 발동           : ${EW_TRIGGERED}"
          echo "  EW 심각도         : ${EW_SEVERITY}"
          echo "  EW 신호           : ${EW_SIGNALS:-없음}"
          echo "  KG 버전           : ${KG_VER}"
          echo "  노드 수           : ${NODES}"
          echo "  엣지 수           : ${EDGES}"
          echo "  Weekly Page URL   : ${PAGE_URL:-생성 실패}"
          echo "  프로토콜 해시     : ${P_HASH}"
          echo "  프로토콜 버전     : ${P_VER}"
          echo "  SSOT 경로         : ${{ env.PROTOCOL_PATH }}"
          echo "════════════════════════════════════════════════════════"

          cat >> $GITHUB_STEP_SUMMARY << SUMMARY_EOF
          ## 🤖 PE · AI Intel Weekly Digest — ${WEEK}

          | 항목 | 값 |
          |---|---|
          | 실행일 | ${RUN_DATE} |
          | EW 발동 | ${EW_TRIGGERED} |
          | EW 심각도 | ${EW_SEVERITY} |
          | EW 신호 | ${EW_SIGNALS:-없음} |
          | KG 버전 | ${KG_VER} |
          | 신규 노드 | ${NODES} |
          | 신규 엣지 | ${EDGES} |
          | 📊 Weekly Report | ${PAGE_URL:-생성 실패} |
          | 프로토콜 | \`${P_VER}\` (hash: \`${P_HASH}\`) |
          | SSOT | \`.github/prompts/execution_protocol_v2.6.md\` |
          SUMMARY_EOF

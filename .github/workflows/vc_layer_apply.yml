name: VC · Layer Apply

on:
  workflow_dispatch:
    inputs:
      layer_id:
        description: 'VC 레이어 ID'
        required: true
      target_version:
        description: '대상 버전'
        required: false
        default: 'latest'
      apply_mode:
        description: '적용 모드 (dry-run | apply)'
        required: false
        default: 'dry-run'
        type: choice
        options:
          - dry-run
          - apply

env:
  PYTHON_VERSION: '3.12'

jobs:
  vc_layer_apply:
    name: 🏗️ VC Layer Apply
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r automation/requirements.txt

      - name: Apply VC layer
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          LAYER_ID: ${{ github.event.inputs.layer_id }}
          TARGET_VERSION: ${{ github.event.inputs.target_version || 'latest' }}
          MODE: ${{ github.event.inputs.apply_mode || 'dry-run' }}
        run: |
          python automation/vc_layer_applier.py \
            --layer-id "$LAYER_ID" \
            --target-version "$TARGET_VERSION" \
            --mode "$MODE" \
            --output output/vc/

      - name: Commit if applied
        if: github.event.inputs.apply_mode == 'apply'
        run: |
          git config --global user.name "VC Bot"
          git config --global user.email "vc-bot@github-actions"
          git add output/vc/ || true
          git diff --staged --quiet || git commit -m "auto: vc layer ${{ github.event.inputs.layer_id }} applied v${{ github.event.inputs.target_version }} [vc-bot]"
          git push || true

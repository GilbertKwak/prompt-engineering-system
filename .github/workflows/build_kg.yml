name: Build KG

on:
  workflow_dispatch:
    inputs:
      kg_version:
        description: 'KG 버전 (예: 4.27)'
        required: true
      source_file:
        description: '소스 델타 파일 경로'
        required: false
        default: ''
  push:
    paths:
      - 'knowledge_graph_v*.json'

env:
  PYTHON_VERSION: '3.12'

jobs:
  build_kg:
    name: 🧠 Build Knowledge Graph
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r automation/requirements.txt

      - name: Build KG
        env:
          KG_VERSION: ${{ github.event.inputs.kg_version || 'auto' }}
        run: |
          echo "[INFO] Building KG v${KG_VERSION}"
          python automation/kg_builder.py \
            --version "$KG_VERSION" \
            --output output/kg/

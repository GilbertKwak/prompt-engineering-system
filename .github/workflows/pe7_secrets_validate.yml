# PE-7 Secrets Validation Workflow
# PE-1/PE-2/PE-3 파이프라인 실행 전 Secrets 유효성 자동 검증
# 트리거: PR (engines/ 변경 시), workflow_dispatch, 수동 실행

name: "PE-7 · Secrets Validation"

on:
  pull_request:
    paths:
      - "engines/**"
      - "scripts/validate_secrets.py"
      - ".github/workflows/pe7_secrets_validate.yml"
  workflow_dispatch:
    inputs:
      engine:
        description: "특정 엔진만 검증 (비워두면 전체)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - "PE-1"
          - "PE-2"
          - "PE-3"
          - "PE-7"
      strict_mode:
        description: "Strict 모드 (API 연결 테스트 포함)"
        required: false
        default: "false"
        type: boolean
  # PE-1/PE-2/PE-3 파이프라인 실행 전 자동 호출 가능
  workflow_call:
    outputs:
      secrets_valid:
        description: "모든 Secrets 유효 여부 (true/false)"
        value: ${{ jobs.validate.outputs.secrets_valid }}

env:
  PYTHON_VERSION: "3.11"

jobs:
  validate:
    name: "Secrets Validation — PE-1/PE-2/PE-3 연계 확인"
    runs-on: ubuntu-latest
    outputs:
      secrets_valid: ${{ steps.check.outputs.valid }}

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🐍 Python 설정"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: "🔐 Secrets 유효성 검증"
        id: check
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_KPI_DB_ID: ${{ secrets.NOTION_KPI_DB_ID }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          ENGINE_FILTER=""
          STRICT_FLAG=""

          if [ -n "${{ inputs.engine }}" ]; then
            ENGINE_FILTER="--engine ${{ inputs.engine }}"
          fi

          if [ "${{ inputs.strict_mode }}" = "true" ]; then
            STRICT_FLAG="--strict"
          fi

          if python scripts/validate_secrets.py $ENGINE_FILTER $STRICT_FLAG; then
            echo "valid=true" >> $GITHUB_OUTPUT
          else
            echo "valid=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: "✅ 검증 통과 — 파이프라인 실행 가능"
        if: steps.check.outputs.valid == 'true'
        run: |
          echo "::notice title=Secrets Valid::모든 PE-1/PE-2/PE-3 연계 Secrets 검증 완료 ✅"

      - name: "❌ 검증 실패 — Slack 알림"
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d '{
              "text": "❌ *PE-7 Secrets Validation FAILED*",
              "attachments": [{
                "color": "danger",
                "fields": [
                  {"title": "Repository", "value": "${{ github.repository }}", "short": true},
                  {"title": "Triggered by", "value": "${{ github.actor }}", "short": true},
                  {"title": "Branch", "value": "${{ github.ref_name }}", "short": true},
                  {"title": "Action", "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Run 확인>", "short": true}
                ],
                "footer": "PE-7 AI Automation",
                "ts": ${{ github.event.repository.updated_at || 0 }}
              }]
            }' || true

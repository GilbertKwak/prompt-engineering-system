name: PE· Build KG

on:
  workflow_dispatch:
    inputs:
      kg_version:
        description: 'KG 빌드 버전 (예: 4.26)'
        required: false
        default: ''
      dry_run:
        description: 'Dry-run 모드'
        required: false
        default: 'false'
        type: boolean
  push:
    branches: [main]
    paths:
      - 'knowledge_graph_v*.json'

env:
  PYTHON_VERSION: '3.12'

jobs:
  build:
    name: 🧠 Build Knowledge Graph
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Build KG
        env:
          KG_VERSION: ${{ github.event.inputs.kg_version || '' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          python scripts/build_kg.py \
            --version "$KG_VERSION" \
            --dry-run "$DRY_RUN"
      - uses: actions/upload-artifact@v4
        with:
          name: kg-build
          path: knowledge_graph/
          if-no-files-found: ignore

name: PE7 · Daily Pipeline

on:
  schedule:
    - cron: '0 1 * * *'  # 매일 01:00 UTC = 10:00 KST
  workflow_dispatch:
    inputs:
      target_domain:
        description: '처리 도메인 (all | smr | ai | kg)'
        required: false
        default: 'all'

env:
  PYTHON_VERSION: '3.12'

jobs:
  daily_run:
    name: 🔄 Daily Pipeline Run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r automation/requirements.txt

      - name: Run daily pipeline
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TARGET_DOMAIN: ${{ github.event.inputs.target_domain || 'all' }}
        run: |
          echo "[INFO] Daily pipeline — domain: $TARGET_DOMAIN"
          python automation/pe7_daily_runner.py \
            --domain "$TARGET_DOMAIN" \
            --run-date "$(date -u '+%Y-%m-%d')" \
            --output output/daily/

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-output-${{ github.run_number }}
          path: output/daily/
          retention-days: 7

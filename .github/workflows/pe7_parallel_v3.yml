name: PE· Parallel v3

on:
  workflow_dispatch:
    inputs:
      execution_mode:
        description: '실행 모드: full | validate-only | collect-only | analyze-only'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - validate-only
          - collect-only
          - analyze-only
      target_domains:
        description: '대상 도메인 (콤마 구분, 부비지른 시 전체)'
        required: false
        default: ''
      parallel_workers:
        description: '병렬 워커 수 (1-5)'
        required: false
        default: '3'
  schedule:
    - cron: '0 3 * * 0'  # 매주 일요일 12:00 KST

env:
  PYTHON_VERSION: '3.12'
  OUTPUT_DIR: output/parallel

jobs:
  # ─── STAGE 0: 실행 계획 수립 ────────────────────────────────────────────────
  plan:
    name: 📍 Plan Execution
    runs-on: ubuntu-latest
    outputs:
      run_date: ${{ steps.plan.outputs.run_date }}
      week_label: ${{ steps.plan.outputs.week_label }}
      mode: ${{ steps.plan.outputs.mode }}
      workers: ${{ steps.plan.outputs.workers }}
      domains_json: ${{ steps.plan.outputs.domains_json }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Plan
        id: plan
        run: |
          MODE="${{ github.event.inputs.execution_mode || 'full' }}"
          WORKERS="${{ github.event.inputs.parallel_workers || '3' }}"
          RAW_DOMAINS="${{ github.event.inputs.target_domains || '' }}"

          # 도메인 JSON 배열로 변환
          if [ -n "$RAW_DOMAINS" ]; then
            DOMAINS_JSON=$(python3 -c "
import json, sys
doms = [d.strip() for d in '$RAW_DOMAINS'.split(',') if d.strip()]
print(json.dumps(doms))
")
          else
            DOMAINS_JSON='["enterprise","frameworks","models","infra","semiconductor"]'
          fi

          echo "run_date=$(date -u '+%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "week_label=$(date -u '+%Y-W%V')" >> $GITHUB_OUTPUT
          echo "mode=${MODE}" >> $GITHUB_OUTPUT
          echo "workers=${WORKERS}" >> $GITHUB_OUTPUT
          echo "domains_json=${DOMAINS_JSON}" >> $GITHUB_OUTPUT

          echo "### 📍 실행 계획" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 모드 | ${MODE} |" >> $GITHUB_STEP_SUMMARY
          echo "| 워커 수 | ${WORKERS} |" >> $GITHUB_STEP_SUMMARY
          echo "| 도메인 | ${DOMAINS_JSON} |" >> $GITHUB_STEP_SUMMARY

  # ─── STAGE 1: 유효성 검증 ──────────────────────────────────────────────────
  validate:
    name: ✅ Validate
    needs: plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Validate schemas
        run: |
          python scripts/validate_prompts.py \
            --schema schemas/prompt_schema.json \
            --dir prompts/ \
            --strict || true

  # ─── STAGE 2A: 도메인 1 병렬 수집 ──────────────────────────────────────────
  collect_domain_1:
    name: 📡 Collect D1
    needs: [plan, validate]
    runs-on: ubuntu-latest
    if: |
      needs.plan.outputs.mode == 'full' ||
      needs.plan.outputs.mode == 'collect-only'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Collect domain 1
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          RUN_DATE: ${{ needs.plan.outputs.run_date }}
          WEEK: ${{ needs.plan.outputs.week_label }}
        run: |
          mkdir -p ${{ env.OUTPUT_DIR }}
          python scripts/parallel_collector.py \
            --worker-id 1 \
            --total-workers "${{ needs.plan.outputs.workers }}" \
            --domains '${{ needs.plan.outputs.domains_json }}' \
            --week "$WEEK" \
            --output "${{ env.OUTPUT_DIR }}/collect_d1.json"
      - uses: actions/upload-artifact@v4
        with:
          name: collect-d1
          path: ${{ env.OUTPUT_DIR }}/collect_d1.json
          if-no-files-found: ignore

  # ─── STAGE 2B: 도메인 2 병렬 수집 ──────────────────────────────────────────
  collect_domain_2:
    name: 📡 Collect D2
    needs: [plan, validate]
    runs-on: ubuntu-latest
    if: |
      (needs.plan.outputs.mode == 'full' ||
      needs.plan.outputs.mode == 'collect-only') &&
      fromJson(needs.plan.outputs.workers) >= 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Collect domain 2
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          RUN_DATE: ${{ needs.plan.outputs.run_date }}
          WEEK: ${{ needs.plan.outputs.week_label }}
        run: |
          mkdir -p ${{ env.OUTPUT_DIR }}
          python scripts/parallel_collector.py \
            --worker-id 2 \
            --total-workers "${{ needs.plan.outputs.workers }}" \
            --domains '${{ needs.plan.outputs.domains_json }}' \
            --week "$WEEK" \
            --output "${{ env.OUTPUT_DIR }}/collect_d2.json"
      - uses: actions/upload-artifact@v4
        with:
          name: collect-d2
          path: ${{ env.OUTPUT_DIR }}/collect_d2.json
          if-no-files-found: ignore

  # ─── STAGE 2C: 도메인 3 병렬 수집 ──────────────────────────────────────────
  collect_domain_3:
    name: 📡 Collect D3
    needs: [plan, validate]
    runs-on: ubuntu-latest
    if: |
      (needs.plan.outputs.mode == 'full' ||
      needs.plan.outputs.mode == 'collect-only') &&
      fromJson(needs.plan.outputs.workers) >= 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Collect domain 3
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          RUN_DATE: ${{ needs.plan.outputs.run_date }}
          WEEK: ${{ needs.plan.outputs.week_label }}
        run: |
          mkdir -p ${{ env.OUTPUT_DIR }}
          python scripts/parallel_collector.py \
            --worker-id 3 \
            --total-workers "${{ needs.plan.outputs.workers }}" \
            --domains '${{ needs.plan.outputs.domains_json }}' \
            --week "$WEEK" \
            --output "${{ env.OUTPUT_DIR }}/collect_d3.json"
      - uses: actions/upload-artifact@v4
        with:
          name: collect-d3
          path: ${{ env.OUTPUT_DIR }}/collect_d3.json
          if-no-files-found: ignore

  # ─── STAGE 3: 병렬 분석 ──────────────────────────────────────────────────────
  analyze:
    name: 🧠 Analyze
    needs: [plan, collect_domain_1, collect_domain_2, collect_domain_3]
    runs-on: ubuntu-latest
    if: |
      always() &&
      (needs.plan.outputs.mode == 'full' ||
      needs.plan.outputs.mode == 'analyze-only')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Download all collect artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ env.OUTPUT_DIR }}/
          merge-multiple: true
      - name: Merge and analyze
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          WEEK: ${{ needs.plan.outputs.week_label }}
          RUN_DATE: ${{ needs.plan.outputs.run_date }}
        run: |
          python scripts/parallel_analyzer.py \
            --input-dir "${{ env.OUTPUT_DIR }}" \
            --week "$WEEK" \
            --run-date "$RUN_DATE" \
            --output "${{ env.OUTPUT_DIR }}/analysis_result.json"
      - uses: actions/upload-artifact@v4
        with:
          name: analysis-result
          path: ${{ env.OUTPUT_DIR }}/analysis_result.json
          if-no-files-found: ignore

  # ─── STAGE 4: 코미트 & 리포트 ────────────────────────────────────────────────
  commit_and_report:
    name: 💾 Commit & Report
    needs: [plan, validate, analyze]
    runs-on: ubuntu-latest
    if: always() && needs.plan.result == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ env.OUTPUT_DIR }}/
          merge-multiple: true
      - name: Commit outputs
        env:
          RUN_DATE: ${{ needs.plan.outputs.run_date }}
          MODE: ${{ needs.plan.outputs.mode }}
        run: |
          git config --global user.name "Parallel v3 Bot"
          git config --global user.email "parallel-bot@github-actions"
          git add output/parallel/ || true
          git diff --staged --quiet || git commit -m \
            "auto: parallel-v3 ${MODE} — ${RUN_DATE} [PE Parallel]"
          git push || true
      - name: Step Summary
        env:
          RUN_DATE: ${{ needs.plan.outputs.run_date }}
          MODE: ${{ needs.plan.outputs.mode }}
        run: |
          echo "# 📡 PE Parallel v3 — ${RUN_DATE} (${MODE})" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Validate | ${{ needs.validate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Collect D1 | ${{ needs.collect_domain_1.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Collect D2 | ${{ needs.collect_domain_2.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Collect D3 | ${{ needs.collect_domain_3.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Analyze | ${{ needs.analyze.result }} |" >> $GITHUB_STEP_SUMMARY

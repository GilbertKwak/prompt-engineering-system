name: "PE · AI Intel Weekly Digest"

on:
  schedule:
    # 매주 월요일 KST 06:00 (UTC 21:00 일요일)
    - cron: "0 21 * * 0"
  workflow_dispatch:
    inputs:
      intel_scope:
        description: "수집 범위 (standard | deep | emergency)"
        required: false
        default: "standard"
      force_ew_check:
        description: "EW 강제 체크 (true | false)"
        required: false
        default: "false"
      kg_version_override:
        description: "KG 버전 오버라이드 (e.g. 4.26, 비워두면 자동)"
        required: false
        default: ""

env:
  PYTHON_VERSION: "3.11"
  INTEL_OUTPUT_DIR: "output/ai_intel"
  WEEK_ID: ""

jobs:
  # ─────────────────────────────────────────────
  # STEP 1: Preflight — 환경·Secrets 검증
  # ─────────────────────────────────────────────
  preflight:
    name: "STEP 1 · Preflight Check"
    runs-on: ubuntu-latest
    outputs:
      week_id: ${{ steps.set_week.outputs.week_id }}
      run_date: ${{ steps.set_week.outputs.run_date }}
      kg_current: ${{ steps.set_week.outputs.kg_current }}
      kg_next: ${{ steps.set_week.outputs.kg_next }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -q requests python-dateutil

      - name: Set week/date/KG version
        id: set_week
        run: |
          WEEK_ID=$(python -c "from datetime import date; d=date.today(); print(f'{d.year}-W{d.isocalendar()[1]:02d}')")
          RUN_DATE=$(date +%Y-%m-%d)
          # KG 버전: 오버라이드 없으면 WEEK_NUM 기반 자동 계산
          if [ -n "${{ github.event.inputs.kg_version_override }}" ]; then
            KG_NEXT="${{ github.event.inputs.kg_version_override }}"
            KG_CURRENT=$(python -c "v='$KG_NEXT'; parts=v.split('.'); parts[-1]=str(int(parts[-1])-1); print('.'.join(parts))")
          else
            WEEK_NUM=$(python -c "from datetime import date; print(date.today().isocalendar()[1])")
            KG_CURRENT="4.$(( $WEEK_NUM - 1 ))"
            KG_NEXT="4.$WEEK_NUM"
          fi
          echo "week_id=$WEEK_ID" >> $GITHUB_OUTPUT
          echo "run_date=$RUN_DATE" >> $GITHUB_OUTPUT
          echo "kg_current=$KG_CURRENT" >> $GITHUB_OUTPUT
          echo "kg_next=$KG_NEXT" >> $GITHUB_OUTPUT
          echo "✅ WEEK=$WEEK_ID | DATE=$RUN_DATE | KG $KG_CURRENT → $KG_NEXT"

      - name: Validate Secrets
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: |
          python - <<'EOF'
          import os, sys
          missing = []
          for k in ["PERPLEXITY_API_KEY", "NOTION_API_KEY"]:
              if not os.getenv(k, "").strip():
                  missing.append(k)
          if missing:
              print(f"❌ Missing secrets: {missing}")
              sys.exit(1)
          print("✅ All required secrets present")
          EOF

  # ─────────────────────────────────────────────
  # STEP 2: Unit Tests — Section A·B·C·D 병렬
  # ─────────────────────────────────────────────
  test-parallel:
    name: "STEP 2 · Tests [Section ${{ matrix.section }}]"
    runs-on: ubuntu-latest
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        section: [A, B, C, D]
        include:
          - section: A
            module: test_section_a
            label: "ai_intel_collector"
          - section: B
            module: test_section_b
            label: "ai_ew_detector"
          - section: C
            module: test_section_c
            label: "kg_delta_generator"
          - section: D
            module: test_section_d
            label: "notion_c31_updater"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -q requests python-dateutil
          if [ -f automation/requirements_ai_intel.txt ]; then
            pip install -q -r automation/requirements_ai_intel.txt
          fi

      - name: Run Section ${{ matrix.section }} — ${{ matrix.label }}
        working-directory: automation
        run: python ${{ matrix.module }}.py

  # ─────────────────────────────────────────────
  # STEP 3: AI Intel Collection
  # ─────────────────────────────────────────────
  collect-intel:
    name: "STEP 3 · AI Intel Collection"
    runs-on: ubuntu-latest
    needs: test-parallel
    outputs:
      intel_dir: ${{ steps.collect.outputs.intel_dir }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -q requests python-dateutil
          if [ -f automation/requirements_ai_intel.txt ]; then
            pip install -q -r automation/requirements_ai_intel.txt
          fi

      - name: Collect AI Intel (all domains)
        id: collect
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: |
          mkdir -p ${{ env.INTEL_OUTPUT_DIR }}
          WEEK_ID=${{ needs.preflight.outputs.week_id }}
          SCOPE=${{ github.event.inputs.intel_scope || 'standard' }}

          DOMAINS=("enterprise_deployment" "rag_architecture" "multimodal_ai" \
                   "edge_inference" "ai_regulation" "open_source_models" \
                   "semiconductor_ai" "agentic_systems")

          for DOMAIN in "${DOMAINS[@]}"; do
            echo "▶ Collecting: $DOMAIN"
            python automation/ai_intel_collector.py \
              --domain "$DOMAIN" \
              --week "$WEEK_ID" \
              --scope "$SCOPE" \
              --output "${{ env.INTEL_OUTPUT_DIR }}/intel_${DOMAIN}.json" || \
              echo "⚠ $DOMAIN collection failed, continuing..."
          done

          echo "intel_dir=${{ env.INTEL_OUTPUT_DIR }}" >> $GITHUB_OUTPUT
          echo "✅ Intel collection complete"

      - name: Upload intel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-intel-${{ needs.preflight.outputs.week_id }}
          path: ${{ env.INTEL_OUTPUT_DIR }}
          retention-days: 30

  # ─────────────────────────────────────────────
  # STEP 4A·4B·4C·4D — 병렬 처리
  # ─────────────────────────────────────────────

  # 4A: EW Detection
  ew-detection:
    name: "STEP 4A · EW Detection"
    runs-on: ubuntu-latest
    needs: [preflight, collect-intel]
    outputs:
      ew_triggered: ${{ steps.ew.outputs.ew_triggered }}
      ew_count: ${{ steps.ew.outputs.ew_count }}
      ew_signals: ${{ steps.ew.outputs.ew_signals }}
      ew_severity: ${{ steps.ew.outputs.ew_severity }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -q requests python-dateutil

      - name: Download intel artifacts
        uses: actions/download-artifact@v4
        with:
          name: ai-intel-${{ needs.preflight.outputs.week_id }}
          path: ${{ env.INTEL_OUTPUT_DIR }}

      - name: Run EW Detector
        id: ew
        env:
          FORCE_EW_CHECK: ${{ github.event.inputs.force_ew_check || 'false' }}
        run: |
          python automation/ai_ew_detector.py \
            --input-dir ${{ env.INTEL_OUTPUT_DIR }} \
            --week ${{ needs.preflight.outputs.week_id }} \
            --output ${{ env.INTEL_OUTPUT_DIR }}/ew_report.json

          # ew_report.json → GitHub Outputs
          python - <<'EOF'
          import json, os
          try:
              with open("${{ env.INTEL_OUTPUT_DIR }}/ew_report.json") as f:
                  r = json.load(f)
              summary = r.get("summary", {})
              ew_triggered = str(summary.get("ew_triggered", False)).lower()
              ew_count     = str(summary.get("ew_count", 0))
              ew_signals   = json.dumps(summary.get("ew_signals", []))
              ew_severity  = summary.get("ew_severity", "NONE")
          except Exception:
              ew_triggered, ew_count, ew_signals, ew_severity = "false", "0", "[]", "NONE"
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"ew_triggered={ew_triggered}\n")
              f.write(f"ew_count={ew_count}\n")
              f.write(f"ew_signals={ew_signals}\n")
              f.write(f"ew_severity={ew_severity}\n")
          print(f"EW triggered={ew_triggered} | count={ew_count} | severity={ew_severity}")
          EOF

      - name: Upload EW report
        uses: actions/upload-artifact@v4
        with:
          name: ew-report-${{ needs.preflight.outputs.week_id }}
          path: ${{ env.INTEL_OUTPUT_DIR }}/ew_report.json
          retention-days: 30

  # 4B: KG Delta Generation
  kg-delta:
    name: "STEP 4B · KG Delta Generation"
    runs-on: ubuntu-latest
    needs: [preflight, collect-intel, ew-detection]
    outputs:
      node_count: ${{ steps.kg.outputs.node_count }}
      edge_count: ${{ steps.kg.outputs.edge_count }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -q requests python-dateutil

      - name: Download intel + EW artifacts
        uses: actions/download-artifact@v4
        with:
          name: ai-intel-${{ needs.preflight.outputs.week_id }}
          path: ${{ env.INTEL_OUTPUT_DIR }}

      - name: Generate KG Delta
        id: kg
        run: |
          python automation/kg_delta_generator.py \
            --intel-dir ${{ env.INTEL_OUTPUT_DIR }} \
            --current-version ${{ needs.preflight.outputs.kg_current }} \
            --next-version ${{ needs.preflight.outputs.kg_next }} \
            --week ${{ needs.preflight.outputs.week_id }} \
            --run-date ${{ needs.preflight.outputs.run_date }} \
            --ew-signals '${{ needs.ew-detection.outputs.ew_signals }}' \
            --output knowledge_graph_v${{ needs.preflight.outputs.kg_next }}_delta.json

          # node/edge count 추출
          python - <<'EOF'
          import json, os
          try:
              kg_file = f"knowledge_graph_v${{ needs.preflight.outputs.kg_next }}_delta.json"
              with open(kg_file) as f:
                  kg = json.load(f)
              nc = len(kg.get("nodes", []))
              ec = len(kg.get("edges", []))
          except Exception:
              nc, ec = 0, 0
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"node_count={nc}\n")
              f.write(f"edge_count={ec}\n")
          print(f"KG delta: {nc} nodes, {ec} edges")
          EOF

      - name: Upload KG delta
        uses: actions/upload-artifact@v4
        with:
          name: kg-delta-${{ needs.preflight.outputs.week_id }}
          path: knowledge_graph_v${{ needs.preflight.outputs.kg_next }}_delta.json
          retention-days: 90

  # 4C: Notion C-31 Update
  notion-update:
    name: "STEP 4C · Notion C-31 Update"
    runs-on: ubuntu-latest
    needs: [preflight, collect-intel, ew-detection, kg-delta]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -q requests python-dateutil

      - name: Download intel artifacts
        uses: actions/download-artifact@v4
        with:
          name: ai-intel-${{ needs.preflight.outputs.week_id }}
          path: ${{ env.INTEL_OUTPUT_DIR }}

      - name: Update Notion C-31 Page
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: |
          python automation/notion_c31_updater.py \
            --page-id 34a55ed436f0814d9cffe6a2f0816e29 \
            --week ${{ needs.preflight.outputs.week_id }} \
            --run-date ${{ needs.preflight.outputs.run_date }} \
            --ew-triggered ${{ needs.ew-detection.outputs.ew_triggered }} \
            --ew-count ${{ needs.ew-detection.outputs.ew_count }} \
            --ew-signals '${{ needs.ew-detection.outputs.ew_signals }}' \
            --ew-severity ${{ needs.ew-detection.outputs.ew_severity }} \
            --kg-version ${{ needs.preflight.outputs.kg_next }} \
            --node-count ${{ needs.kg-delta.outputs.node_count }} \
            --edge-count ${{ needs.kg-delta.outputs.edge_count }} \
            --intel-dir ${{ env.INTEL_OUTPUT_DIR }}

  # 4D: Git Commit KG Delta
  commit-kg:
    name: "STEP 4D · Commit KG Delta to Repo"
    runs-on: ubuntu-latest
    needs: [preflight, kg-delta]
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download KG delta
        uses: actions/download-artifact@v4
        with:
          name: kg-delta-${{ needs.preflight.outputs.week_id }}
          path: knowledge_graphs/

      - name: Commit & Push KG Delta
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add knowledge_graphs/
          git diff --staged --quiet && echo "No KG delta changes" && exit 0
          git commit -m "chore(kg): v${{ needs.preflight.outputs.kg_next }} delta — ${{ needs.preflight.outputs.week_id }} [skip ci]"
          git push
          echo "✅ KG delta committed"

  # ─────────────────────────────────────────────
  # STEP 5: Summary Report
  # ─────────────────────────────────────────────
  summary:
    name: "STEP 5 · Summary Report"
    runs-on: ubuntu-latest
    needs: [preflight, ew-detection, kg-delta, notion-update, commit-kg]
    if: always()
    steps:
      - name: Print Run Summary
        run: |
          echo "## 🤖 AI Intel Weekly — Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 주차 | ${{ needs.preflight.outputs.week_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 실행일 | ${{ needs.preflight.outputs.run_date }} |" >> $GITHUB_STEP_SUMMARY
          echo "| KG 버전 | ${{ needs.preflight.outputs.kg_current }} → ${{ needs.preflight.outputs.kg_next }} |" >> $GITHUB_STEP_SUMMARY
          echo "| KG 노드 | ${{ needs.kg-delta.outputs.node_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| KG 엣지 | ${{ needs.kg-delta.outputs.edge_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| EW 발동 | ${{ needs.ew-detection.outputs.ew_triggered }} |" >> $GITHUB_STEP_SUMMARY
          echo "| EW 건수 | ${{ needs.ew-detection.outputs.ew_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| EW 심각도 | ${{ needs.ew-detection.outputs.ew_severity }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 4단계 병렬 처리 결과" >> $GITHUB_STEP_SUMMARY
          echo "- 4A EW Detection: ${{ needs.ew-detection.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 4B KG Delta: ${{ needs.kg-delta.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 4C Notion Update: ${{ needs.notion-update.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 4D KG Commit: ${{ needs.commit-kg.result }}" >> $GITHUB_STEP_SUMMARY

name: JV Fund Prompt Validation & Monthly Review

on:
  push:
    paths:
      - 'applied-cases/jv-fund/**'
  pull_request:
    paths:
      - 'applied-cases/jv-fund/**'
  schedule:
    # 매월 1일 00:00 UTC — 월간 리뷰 이슈 자동 생성
    - cron: '0 0 1 * *'

jobs:
  validate:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    name: PE-1 / PE-3 Prompt Validation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run PE-1 / PE-3 Validation
        run: |
          python automation/auto_validate.py \
            --dir applied-cases/jv-fund/ \
            --rules PE-1,PE-3,SQ \
            --output /tmp/jv_validation_result.json || true

      - name: Upload Validation Report
        uses: actions/upload-artifact@v4
        with:
          name: jv-validation-report
          path: /tmp/jv_validation_result.json

      - name: Comment PR with Validation Summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary = '## ✅ JV Prompt Validation Report\n\n';
            try {
              const result = JSON.parse(fs.readFileSync('/tmp/jv_validation_result.json', 'utf8'));
              summary += `**PE-1 통과:** ${result.pe1_pass || 'N/A'}\n`;
              summary += `**PE-3 통과:** ${result.pe3_pass || 'N/A'}\n`;
              summary += `**구조 품질:** ${result.sq_pass || 'N/A'}\n`;
            } catch(e) {
              summary += '_검증 스크립트 실행 결과를 확인하세요._\n';
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

  monthly-review:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    name: Monthly Prompt Review Issue
    steps:
      - name: Create Monthly Review Issue
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().slice(0, 7);
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Monthly Review] JV Fund Prompt Performance — ${date}`,
              labels: ['prompt-review', 'monthly', 'jv-fund'],
              body: `## 📋 JV Fund 프롬프트 월간 리뷰\n\n**기준 월:** ${date}\n\n### 검토 항목\n- [ ] PE-1 준수율 확인\n- [ ] PE-3 시나리오 균형 점검\n- [ ] Domain Variants (FU/eCO2/AI) 성능 비교\n- [ ] 신규 시장 데이터 반영 필요 여부\n- [ ] Notion 연동 페이지 동기화 상태\n- [ ] GitHub Actions 정상 실행 여부\n\n### 관련 파일\n- \`applied-cases/jv-fund/master_prompt_v3.md\`\n- \`applied-cases/jv-fund/validation_checklist.md\`\n\n### Notion 연동\n- [PE-JV Prompt Library](https://www.notion.so/34f55ed436f08150b07dc7f5f800311b)\n`
            });
`
name: PE· Univ Apply

on:
  workflow_dispatch:
    inputs:
      target_program:
        description: '대상 프로그램'
        required: true
      deadline:
        description: '마감일 (YYYY-MM-DD)'
        required: false
        default: ''
      dry_run:
        description: 'Dry-run'
        required: false
        default: 'false'
        type: boolean

env:
  PYTHON_VERSION: '3.12'
  OUTPUT_DIR: output/univ_apply

jobs:
  prepare:
    name: 🎓 Prepare Application
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Prepare application materials
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          TARGET: ${{ github.event.inputs.target_program }}
          DEADLINE: ${{ github.event.inputs.deadline || '' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          mkdir -p ${{ env.OUTPUT_DIR }}
          python scripts/univ_apply_preparer.py \
            --target "$TARGET" \
            --deadline "$DEADLINE" \
            --output "${{ env.OUTPUT_DIR }}/apply_materials.json" \
            --dry-run "$DRY_RUN"
      - uses: actions/upload-artifact@v4
        with:
          name: apply-materials
          path: ${{ env.OUTPUT_DIR }}/apply_materials.json
          if-no-files-found: ignore

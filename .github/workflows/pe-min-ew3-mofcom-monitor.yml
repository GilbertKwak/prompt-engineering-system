name: PE-MIN · EW3 MOFCOM Monitor

on:
  schedule:
    - cron: '0 3 * * *'  # 매일 03:00 UTC = 12:00 KST
  workflow_dispatch:
    inputs:
      force_alert:
        description: '강제 알림 발송 (true/false)'
        required: false
        default: 'false'

env:
  PYTHON_VERSION: '3.12'

jobs:
  mofcom_monitor:
    name: 🔍 MOFCOM Monitor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r automation/requirements.txt

      - name: Run MOFCOM monitor
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          FORCE_ALERT: ${{ github.event.inputs.force_alert || 'false' }}
        run: |
          python automation/pe_min_ew3_mofcom.py \
            --run-date "$(date -u '+%Y-%m-%d')" \
            --force-alert "$FORCE_ALERT" \
            --output output/mofcom/

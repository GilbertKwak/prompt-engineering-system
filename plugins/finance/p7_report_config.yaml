# P7 Word 보고서 빌더 설정
# 로컈 실행 전용 (GitHub Actions 사용 안 함)
# python docx_report_builder.py [––lang ko|en] [––out path]

report:
  title_ko: "PE-7 ExaFLOPS TCO 분석 보고서"
  title_en: "PE-7 ExaFLOPS TCO Analysis Report"
  subtitle_ko: "SMR 통합 자원모델 — HBM · Glass · 전력 · 패키징 4-레이어 TCO"
  subtitle_en: "SMR Integrated Resource Model — 4-Layer TCO: HBM · Glass · Power · Packaging"
  version: "v1.0"
  classification: "Confidential"
  language_default: "ko"
  supported_languages: ["ko", "en"]

# 주의: 이 파일은 로컈 실행용입니다.
# Word 보고서는 AI 터미널(Perplexity)에서 직접 생성하거나
# 로컈에서 python docx_report_builder.py 실행하여 생성합니다.
# GitHub Actions를 통한 자동 빌드는 지원하지 않습니다.

style:
  brand_blue: "2C5F8A"
  dark_blue:  "1A3A5C"
  light_blue: "EBF3FB"
  gray:       "F5F5F5"
  page:
    width_cm:  21.0
    height_cm: 29.7
    margin_cm: 2.5
  fonts:
    cover_title_pt:  26
    cover_subtitle_pt: 13
    body_pt:         11
    table_header_pt: 10
    caption_pt:       9
  chart_width_inches: 5.8

sections:
  - {id: cover,             order: 1,  enabled: true}
  - {id: toc,               order: 2,  enabled: true}
  - {id: executive_summary, order: 3,  enabled: true}
  - {id: methodology,       order: 4,  enabled: true}
  - {id: system_definitions,order: 5,  enabled: true}
  - {id: tco_results,       order: 6,  enabled: true}
  - {id: sensitivity,       order: 7,  enabled: true}
  - {id: portfolio,         order: 8,  enabled: true}
  - {id: conclusions,       order: 9,  enabled: true}
  - {id: appendix,          order: 10, enabled: true}

dependencies:
  python_packages:
    - python-docx>=0.8.11
    - pyyaml>=6.0
  input_files:
    - path: "output/p6_exaflops_tco.json"
      required: false
      fallback: "embedded_dummy_data"
  output_dir: "."   # 현재 디렉토리 또는 --out 지정

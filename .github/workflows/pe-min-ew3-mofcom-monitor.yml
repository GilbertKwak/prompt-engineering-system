# ============================================================
# PE-MIN EW3 CRITICAL — MOFCOM 수출허가 자동 모니터링 파이프라인
# CMD-MIN-01 · Alert Stage · Weekly
# ============================================================
name: PE-MIN EW3 MOFCOM Monitor → Notion Sync

on:
  schedule:
    # 매주 월요일 09:00 KST (00:00 UTC)
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      force_alert:
        description: '강제 EW3 알림 발송 (true/false)'
        required: false
        default: 'false'

jobs:
  # ──────────────────────────────────────────
  # JOB 1: MOFCOM 수출허가 데이터 수집
  # ──────────────────────────────────────────
  fetch-mofcom-data:
    name: 'Fetch MOFCOM Export License Data'
    runs-on: ubuntu-latest
    outputs:
      ga_license_count: ${{ steps.parse.outputs.ga_count }}
      ge_license_count: ${{ steps.parse.outputs.ge_count }}
      ga_price_usd:     ${{ steps.parse.outputs.ga_price }}
      ge_price_usd:     ${{ steps.parse.outputs.ge_price }}
      ew3_triggered:    ${{ steps.ew3_check.outputs.triggered }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pandas python-dateutil

      - name: Fetch MOFCOM Export License Data
        id: fetch
        env:
          MOFCOM_API_KEY: ${{ secrets.MOFCOM_API_KEY }}
        run: |
          python scripts/pe_min/fetch_mofcom_licenses.py \
            --minerals gallium germanium \
            --output_json /tmp/mofcom_latest.json

      - name: Parse & EW Signal Detection
        id: parse
        run: |
          python scripts/pe_min/parse_ew_signals.py \
            --input /tmp/mofcom_latest.json \
            --output_env $GITHUB_OUTPUT

      - name: EW3 Threshold Check
        id: ew3_check
        run: |
          python scripts/pe_min/ew3_trigger_check.py \
            --ga_count ${{ steps.parse.outputs.ga_count }} \
            --ge_count ${{ steps.parse.outputs.ge_count }} \
            --threshold_pct 20 \
            --output_env $GITHUB_OUTPUT

      - name: Upload raw data artifact
        uses: actions/upload-artifact@v4
        with:
          name: mofcom-raw-${{ github.run_id }}
          path: /tmp/mofcom_latest.json
          retention-days: 90

  # ──────────────────────────────────────────
  # JOB 2: Notion PE-MIN 테이블 자동 갱신
  # ──────────────────────────────────────────
  update-notion-table:
    name: 'Update Notion PE-MIN EW Table'
    runs-on: ubuntu-latest
    needs: fetch-mofcom-data
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Notion SDK
        run: pip install notion-client python-dotenv

      - name: Update Notion PE-MIN EW Monitor Table
        env:
          NOTION_API_KEY:         ${{ secrets.NOTION_API_KEY }}
          NOTION_PE_MIN_DB_ID:    ${{ secrets.NOTION_PE_MIN_DB_ID }}
          GA_LICENSE_COUNT:       ${{ needs.fetch-mofcom-data.outputs.ga_license_count }}
          GE_LICENSE_COUNT:       ${{ needs.fetch-mofcom-data.outputs.ge_license_count }}
          GA_PRICE_USD:           ${{ needs.fetch-mofcom-data.outputs.ga_price_usd }}
          GE_PRICE_USD:           ${{ needs.fetch-mofcom-data.outputs.ge_price_usd }}
          EW3_TRIGGERED:          ${{ needs.fetch-mofcom-data.outputs.ew3_triggered }}
        run: |
          python scripts/pe_min/notion_sync_ew_table.py

      - name: Update knowledge_graph v4.0 node timestamps
        env:
          NOTION_API_KEY:         ${{ secrets.NOTION_API_KEY }}
          NOTION_KG_DB_ID:        ${{ secrets.NOTION_KG_DB_ID }}
        run: |
          python scripts/pe_min/kg_node_update.py \
            --version v4.0 \
            --nodes PE-MIN-001 PE-PWR PE-JV PE-CHEM PE-SEMI PE-FIN PE-SAT

  # ──────────────────────────────────────────
  # JOB 3: EW3 CRITICAL 알림 발송
  # ──────────────────────────────────────────
  send-ew3-alert:
    name: 'Send EW3 CRITICAL Alert'
    runs-on: ubuntu-latest
    needs: [fetch-mofcom-data, update-notion-table]
    if: needs.fetch-mofcom-data.outputs.ew3_triggered == 'true' || github.event.inputs.force_alert == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install notification libs
        run: pip install requests

      - name: Send EW3 CRITICAL Webhook Alert
        env:
          SLACK_WEBHOOK_URL:   ${{ secrets.SLACK_WEBHOOK_URL }}
          GA_LICENSE_COUNT:    ${{ needs.fetch-mofcom-data.outputs.ga_license_count }}
          GE_LICENSE_COUNT:    ${{ needs.fetch-mofcom-data.outputs.ge_license_count }}
          GA_PRICE_USD:        ${{ needs.fetch-mofcom-data.outputs.ga_price_usd }}
          RUN_DATE:            ${{ github.run_id }}
        run: |
          python scripts/pe_min/send_ew3_alert.py \
            --channel slack \
            --severity CRITICAL \
            --mineral gallium germanium

      - name: Create GitHub Issue for EW3 Event
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 EW3 CRITICAL — MOFCOM 갈륨/게르마늄 수출허가 임계 감지 (${ new Date().toISOString().split('T')[0] })`;
            const body = [
              '## PE-MIN EW3 CRITICAL 자동 감지',
              '',
              `- **갈륨 허가 건수**: ${ process.env.GA_COUNT || 'N/A' }`,
              `- **게르마늄 허가 건수**: ${ process.env.GE_COUNT || 'N/A' }`,
              `- **트리거 임계**: 전주 대비 -20% 이상 감소`,
              '',
              '### 즉시 조치 필요',
              '- [ ] Notion PE-MIN 테이블 확인',
              '- [ ] 전략 비축량 현황 점검',
              '- [ ] PE-JV 파트너 대체공급 가능 여부 확인',
              '- [ ] MIN-SIM-D 재실행 (시나리오 업데이트)',
              '',
              `*PE-MIN-001-v6.3-OPT | CMD-MIN-01 Alert Loop | Run: ${ context.runId }*`
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title,
              body,
              labels: ['pe-min', 'ew3-critical', 'minerals', 'automated']
            });
        env:
          GA_COUNT: ${{ needs.fetch-mofcom-data.outputs.ga_license_count }}
          GE_COUNT: ${{ needs.fetch-mofcom-data.outputs.ge_license_count }}

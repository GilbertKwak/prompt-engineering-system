name: Register Variant

on:
  workflow_dispatch:
    inputs:
      variant_id:
        description: '변형 ID'
        required: true
      base_prompt:
        description: '기반 프롬프트 경로'
        required: true
      variant_type:
        description: '변형 유형 (A/B | shadow | experimental)'
        required: false
        default: 'A/B'

env:
  PYTHON_VERSION: '3.12'

jobs:
  register:
    name: 📝 Register Variant
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r automation/requirements.txt

      - name: Register variant
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          VARIANT_ID: ${{ github.event.inputs.variant_id }}
          BASE_PROMPT: ${{ github.event.inputs.base_prompt }}
          VARIANT_TYPE: ${{ github.event.inputs.variant_type }}
        run: |
          python automation/variant_registrar.py \
            --variant-id "$VARIANT_ID" \
            --base-prompt "$BASE_PROMPT" \
            --type "$VARIANT_TYPE" \
            --output output/variants/

      - name: Commit variant registry
        run: |
          git config --global user.name "Variant Bot"
          git config --global user.email "variant-bot@github-actions"
          git add output/variants/ || true
          git diff --staged --quiet || git commit -m "auto: register variant ${{ github.event.inputs.variant_id }} [variant-bot]"
          git push || true

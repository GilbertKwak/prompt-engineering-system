name: PE7 · E0N Validate

on:
  push:
    paths:
      - 'e0n/**'
      - 'prompts/e0n/**'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'

jobs:
  e0n_validate:
    name: ✅ E0N Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r automation/requirements.txt

      - name: Run E0N validation
        run: |
          python automation/pe7_e0n_validator.py \
            --input-dir e0n/ \
            --output output/e0n/

name: PE-MIN · GA S4 Monthly Report

on:
  schedule:
    - cron: '0 4 1 * *'  # 매월 1일 04:00 UTC = 13:00 KST
  workflow_dispatch:
    inputs:
      month_override:
        description: '월 강제 지정 (예: 2026-05)'
        required: false
        default: ''

env:
  PYTHON_VERSION: '3.12'
  OUTPUT_DIR: output/monthly

jobs:
  monthly_report:
    name: 📋 Monthly Report Generation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r automation/requirements.txt

      - name: Set month label
        id: month
        run: |
          if [ -n "${{ github.event.inputs.month_override }}" ]; then
            MONTH="${{ github.event.inputs.month_override }}"
          else
            MONTH=$(date -u '+%Y-%m')
          fi
          echo "label=${MONTH}" >> $GITHUB_OUTPUT

      - name: Generate monthly report
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MONTH: ${{ steps.month.outputs.label }}
        run: |
          mkdir -p ${{ env.OUTPUT_DIR }}
          python automation/pe_min_ga_s4_monthly.py \
            --month "$MONTH" \
            --output "${{ env.OUTPUT_DIR }}/report_${MONTH}.json"

      - uses: actions/upload-artifact@v4
        with:
          name: monthly-report-${{ steps.month.outputs.label }}
          path: ${{ env.OUTPUT_DIR }}/
          retention-days: 90

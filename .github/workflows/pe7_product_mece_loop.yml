name: PE7 · Product MECE Loop

on:
  workflow_dispatch:
    inputs:
      product_id:
        description: '제품 ID'
        required: true
      loop_count:
        description: 'MECE 루프 횟수 (기본: 3)'
        required: false
        default: '3'

env:
  PYTHON_VERSION: '3.12'

jobs:
  mece_loop:
    name: 🔁 MECE Loop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r automation/requirements.txt

      - name: Run MECE loop
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PRODUCT_ID: ${{ github.event.inputs.product_id }}
          LOOP_COUNT: ${{ github.event.inputs.loop_count || '3' }}
        run: |
          python automation/pe7_mece_loop.py \
            --product-id "$PRODUCT_ID" \
            --loops "$LOOP_COUNT" \
            --output output/mece/

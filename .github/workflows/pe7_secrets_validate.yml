name: PE7· Secrets Validate

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'  # 매주 일요일 09:00 KST

env:
  PYTHON_VERSION: '3.12'

jobs:
  validate_secrets:
    name: 🔐 Validate Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Check required secrets
        run: |
          python - <<'EOF'
          import os, sys
          REQUIRED = [
              'PERPLEXITY_API_KEY',
              'NOTION_API_KEY',
          ]
          missing = []
          present = []
          for k in REQUIRED:
              v = os.environ.get(k, '')
              if not v or v == 'NOT_SET':
                  missing.append(k)
              else:
                  present.append(k)
          print(f'Present ({len(present)}): {present}')
          if missing:
              print(f'MISSING ({len(missing)}): {missing}', file=sys.stderr)
              sys.exit(1)
          print('All required secrets are configured.')
          EOF
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      - name: Test Perplexity API connectivity
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: |
          python - <<'EOF'
          import os, sys, requests
          key = os.environ.get('PERPLEXITY_API_KEY', '')
          if not key:
              print('PERPLEXITY_API_KEY not set', file=sys.stderr)
              sys.exit(1)
          resp = requests.post(
              'https://api.perplexity.ai/chat/completions',
              headers={'Authorization': f'Bearer {key}', 'Content-Type': 'application/json'},
              json={'model': 'sonar', 'messages': [{'role': 'user', 'content': 'ping'}], 'max_tokens': 5},
              timeout=15
          )
          if resp.status_code == 200:
              print('Perplexity API: OK')
          else:
              print(f'Perplexity API error: {resp.status_code}', file=sys.stderr)
              sys.exit(1)
          EOF
      - name: Test Notion API connectivity
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: |
          python - <<'EOF'
          import os, sys, requests
          key = os.environ.get('NOTION_API_KEY', '')
          if not key:
              print('NOTION_API_KEY not set', file=sys.stderr)
              sys.exit(1)
          resp = requests.get(
              'https://api.notion.com/v1/users/me',
              headers={'Authorization': f'Bearer {key}', 'Notion-Version': '2022-06-28'},
              timeout=15
          )
          if resp.status_code == 200:
              print('Notion API: OK')
          else:
              print(f'Notion API error: {resp.status_code}', file=sys.stderr)
              sys.exit(1)
          EOF

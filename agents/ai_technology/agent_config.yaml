# AI Technology — Agent Config
# Version: 1.0.0 | PE-7 v1.1

agent_id: ai_technology_analyst
version: "1.0.0"
category: domain_specialist

tracking_domains:
  architecture:
    models_tracked:
      - GPT-4o, GPT-5
      - Claude 3.5 Sonnet, Claude 4
      - Gemini 1.5, Gemini 2.0
      - Llama 3, Llama 4
      - Mistral Large, Mixtral
    architecture_types:
      - Transformer (dense)
      - Mixture of Experts (MoE)
      - State Space Models (Mamba, RWKV)
      - Hybrid (SSM + Attention)
  benchmarks:
    primary: [MMLU, GPQA, HumanEval, MATH]
    secondary: [MT-Bench, Arena-Elo, HELM]
    tracking_frequency: weekly
  inference_optimization:
    techniques:
      - speculative_decoding
      - quantization (INT4/INT8/FP8)
      - KV_cache_optimization
      - batching_strategies
  agent_frameworks:
    - LangChain
    - AutoGen
    - CrewAI
    - LlamaIndex
    - Haystack

models:
  default: sonar-pro
  reasoning: claude-3-5-sonnet

pe_integrations:
  - PE-7
  - PE-11
  - PE-OPT

outputs:
  dir: output/ai_technology/
  format: json

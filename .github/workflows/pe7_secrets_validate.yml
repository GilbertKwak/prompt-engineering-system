name: PE7 · Secrets Validate

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # 매주 월요일 06:00 UTC = 15:00 KST

env:
  PYTHON_VERSION: '3.12'

jobs:
  secrets_validate:
    name: 🔑 Secrets Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r automation/requirements.txt

      - name: Validate all secrets
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python automation/pe7_secrets_validator.py \
            --check-perplexity \
            --check-notion \
            --check-anthropic \
            --check-openai \
            --output output/secrets_check.json

          echo "### 🔑 Secrets 검증 결과" >> $GITHUB_STEP_SUMMARY
          python3 -c "
import json, sys
d = json.load(open('output/secrets_check.json'))
for k, v in d.items():
    icon = '✅' if v else '❌'
    print(f'| {k} | {icon} |')
" >> $GITHUB_STEP_SUMMARY

name: PE7 · SMR Pipeline

on:
  schedule:
    - cron: '30 1 * * 1'  # 매주 월요일 01:30 UTC = 10:30 KST
  workflow_dispatch:
    inputs:
      smr_scope:
        description: 'SMR 범위: standard | deep | full'
        required: false
        default: 'standard'
        type: choice
        options:
          - standard
          - deep
          - full
      week_override:
        description: '주간 레이블 강제 지정 (예: 2026-W22)'
        required: false
        default: ''

env:
  PYTHON_VERSION: '3.12'
  OUTPUT_DIR: output/smr

jobs:
  smr_run:
    name: 📊 SMR Pipeline Run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r automation/requirements.txt

      - name: Set week label
        id: week
        run: |
          if [ -n "${{ github.event.inputs.week_override }}" ]; then
            WEEK="${{ github.event.inputs.week_override }}"
          else
            WEEK=$(date -u '+%Y-W%V')
          fi
          echo "label=${WEEK}" >> $GITHUB_OUTPUT
          echo "run_date=$(date -u '+%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Run SMR pipeline
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WEEK: ${{ steps.week.outputs.label }}
          SCOPE: ${{ github.event.inputs.smr_scope || 'standard' }}
        run: |
          mkdir -p ${{ env.OUTPUT_DIR }}
          echo "[INFO] SMR pipeline — week: $WEEK scope: $SCOPE"
          python automation/pe7_smr_runner.py \
            --week "$WEEK" \
            --scope "$SCOPE" \
            --run-date "${{ steps.week.outputs.run_date }}" \
            --output "${{ env.OUTPUT_DIR }}/smr_${WEEK}.json"

      - name: Upload SMR artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smr-${{ steps.week.outputs.label }}
          path: ${{ env.OUTPUT_DIR }}/
          retention-days: 30

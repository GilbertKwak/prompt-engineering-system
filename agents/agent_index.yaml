# =============================================================================
# AGENT INDEX — PE System Multi-Agent Registry
# Version: 2.0.0 | Updated: 2026-05-20
# Owner: GilbertKwak
# =============================================================================
# 이 파일은 모든 에이전트의 단일 진실 소스(Single Source of Truth)입니다.
# orchestrator가 라우팅 결정 시 이 인덱스를 우선 참조합니다.
# =============================================================================

meta:
  version: "2.0.0"
  last_updated: "2026-05-20"
  total_agents: 12
  active_agents: 10
  registry_owner: GilbertKwak
  routing_strategy: "priority_cascade"   # priority_cascade | round_robin | domain_affinity
  fallback_model: "sonar"                # Perplexity 최소 모델
  emergency_model: "sonar-pro"           # EW 발동 시 강제 업그레이드

# =============================================================================
# AGENT DEFINITIONS
# =============================================================================
agents:

  # ---------------------------------------------------------------------------
  # 1. AI INTEL COLLECTOR — 도메인별 AI 인텔 수집
  # ---------------------------------------------------------------------------
  - id: ai_intel_collector
    name: "AI Intel Collector"
    version: "1.2.0"
    status: active
    category: collection
    script: automation/ai_intel_collector.py
    prompt_dir: agents/ai_intel/
    description: |
      Perplexity sonar/sonar-pro API를 사용해 4개 AI 도메인의
      주간 인텔리전스를 수집하고 구조화된 JSON으로 저장합니다.
    domains:
      - enterprise_deployment
      - model_architecture
      - regulatory_policy
      - investment_funding
    models:
      standard: sonar
      deep: sonar-pro
      emergency: sonar-pro
    triggers:
      schedule: "0 6 * * 1"   # 매주 월요일 06:00 KST
      manual: true
      ew_override: true        # EW 발동 시 즉시 재실행
    outputs:
      dir: output/ai_intel/
      format: json
      naming: "intel_{domain}_{week}.json"
    rate_limit:
      requests_per_minute: 20
      retry_max: 3
      retry_backoff_base: 2.0
    health_check:
      timeout_seconds: 120
      min_confidence_score: 0.70

  # ---------------------------------------------------------------------------
  # 2. EW DETECTOR — Early Warning 탐지
  # ---------------------------------------------------------------------------
  - id: ew_detector
    name: "EW Detector"
    version: "1.1.0"
    status: active
    category: analysis
    script: automation/ai_ew_detector.py
    prompt_dir: agents/ew_detection/
    description: |
      수집된 인텔 데이터에서 시장 변화 신호(EW)를 탐지합니다.
      정량 임계값 + 키워드 휴리스틱 2단계 검증을 수행합니다.
    detection_layers:
      - name: metric_threshold
        description: "메트릭 수치 기반 임계값 탐지"
        priority: 1
      - name: keyword_heuristic
        description: "경고 키워드 hit count 기반 폴백"
        priority: 2
      - name: llm_reasoning
        description: "LLM 컨텍스트 추론 (선택적)"
        priority: 3
    thresholds:
      adoption_rate_delta: 15.0        # % 포인트 변화
      market_share_delta: 10.0
      investment_volume_delta: 30.0
      regulatory_risk_score: 7.0       # 10점 만점
      keyword_hit_min: 2               # 휴리스틱 최소 hit수
    severity_levels:
      - CRITICAL: "즉시 행동 필요, sonar-pro 강제 전환"
      - HIGH: "당주 분석 심화, KG 긴급 업데이트"
      - MEDIUM: "모니터링 강화, 다음 주 추적"
      - LOW: "기록만, 정기 사이클 유지"
      - NONE: "정상"
    outputs:
      dir: output/ai_intel/
      format: json
      naming: "ew_report_{week}.json"
    depends_on: [ai_intel_collector]

  # ---------------------------------------------------------------------------
  # 3. KG BUILDER — Knowledge Graph 빌더
  # ---------------------------------------------------------------------------
  - id: kg_builder
    name: "KG Delta Generator"
    version: "1.3.0"
    status: active
    category: knowledge
    script: automation/kg_delta_generator.py
    prompt_dir: agents/kg_builder/
    description: |
      인텔 데이터와 EW 시그널을 결합해 Knowledge Graph의
      증분(delta) 노드/엣지를 자동 생성합니다.
    node_types:
      - COMPANY
      - TECHNOLOGY
      - PERSON
      - EVENT
      - METRIC
      - REGULATION
    edge_types:
      - DEVELOPS
      - ACQUIRES
      - COMPETES_WITH
      - PARTNERS_WITH
      - REGULATES
      - INVESTS_IN
      - EW_SIGNAL
    versioning:
      major_trigger: "EW CRITICAL 또는 paradigm shift"
      minor_trigger: "신규 노드 5개 이상"
      patch_trigger: "속성 업데이트만"
    outputs:
      format: json
      naming: "knowledge_graph_v{version}_delta.json"
    depends_on: [ai_intel_collector, ew_detector]

  # ---------------------------------------------------------------------------
  # 4. NOTION SYNC — Notion C-31 동기화
  # ---------------------------------------------------------------------------
  - id: notion_sync
    name: "Notion C-31 Updater"
    version: "1.2.0"
    status: active
    category: sync
    script: automation/notion_c31_updater.py
    prompt_dir: agents/notion_sync/
    description: |
      KG delta와 EW 리포트를 Notion C-31 페이지에
      Blocks API append 방식으로 동기화합니다.
    notion:
      page_id: "34a55ed436f0814d9cffe6a2f0816e29"
      api_version: "2022-06-28"
      batch_size: 50
    callout_colors:
      CRITICAL: red
      HIGH: orange
      MEDIUM: yellow
      LOW: blue
      NONE: green
    outputs:
      log_dir: logs/notion_sync/
      format: json
    depends_on: [kg_builder]

  # ---------------------------------------------------------------------------
  # 5. ORCHESTRATOR — 멀티에이전트 오케스트레이터
  # ---------------------------------------------------------------------------
  - id: orchestrator
    name: "PE System Orchestrator"
    version: "2.0.0"
    status: active
    category: orchestration
    script: agents/orchestrator/run_pipeline.py
    prompt_dir: agents/orchestrator/
    description: |
      전체 파이프라인을 조율하는 마스터 오케스트레이터입니다.
      에이전트 실행 순서, EW 조건 분기, 재시도 로직을 관리합니다.
    pipeline_order:
      - ai_intel_collector
      - ew_detector
      - kg_builder
      - notion_sync
    execution_modes:
      sequential: "기본 모드, 의존성 순서 준수"
      parallel_collect: "도메인별 수집 병렬화 (4 threads)"
      emergency: "EW CRITICAL 시 sonar-pro 강제, 즉시 실행"
    retry_policy:
      max_retries: 3
      backoff_multiplier: 2.0
      timeout_per_agent: 300
    health_monitoring:
      enabled: true
      heartbeat_interval: 30
      alert_on_failure: true
    depends_on: []

  # ---------------------------------------------------------------------------
  # 6. SEMICONDUCTOR ANALYST — 반도체 도메인 전문 에이전트
  # ---------------------------------------------------------------------------
  - id: semiconductor_analyst
    name: "Semiconductor Domain Analyst"
    version: "1.0.0"
    status: active
    category: domain_specialist
    prompt_dir: agents/domain_specialists/semiconductor/
    description: |
      HBM, CoWoS, 패키징, 공급망, TSMC/삼성/SK하이닉스 동향을
      전문적으로 분석하는 반도체 도메인 특화 에이전트입니다.
    focus_areas:
      - HBM3/HBM3E/HBM4 수급 동향
      - CoWoS/SoIC 패키징 capacity
      - 지정학적 공급망 리스크
      - TSMC/삼성/Intel Foundry 경쟁 구도
      - AI 가속기 ASIC vs GPU
    data_sources:
      - perplexity_sonar_pro
      - industry_reports
      - earnings_calls
    models:
      default: sonar-pro
      reasoning: claude-3-5-sonnet
    outputs:
      dir: output/semiconductor/
      format: json
    status_note: "standalone 실행 또는 orchestrator 통합 가능"

  # ---------------------------------------------------------------------------
  # 7. INVESTMENT ANALYST — 투자 분석 에이전트
  # ---------------------------------------------------------------------------
  - id: investment_analyst
    name: "Investment & Due Diligence Analyst"
    version: "1.0.0"
    status: active
    category: domain_specialist
    prompt_dir: agents/domain_specialists/investment/
    description: |
      AI/반도체 섹터 M&A, PE 투자, 밸류에이션,
      due diligence 분석을 수행하는 투자 전문 에이전트입니다.
    focus_areas:
      - AI infrastructure 투자 라운드
      - 반도체 M&A 동향
      - PE 포트폴리오 scoring
      - 밸류에이션 멀티플 분석
      - 경쟁사 재무 비교
    models:
      default: sonar-pro
      reasoning: claude-3-5-sonnet
    outputs:
      dir: output/investment/
      format: json

  # ---------------------------------------------------------------------------
  # 8. STRATEGIC ANALYST — 전략 분석 에이전트
  # ---------------------------------------------------------------------------
  - id: strategic_analyst
    name: "Corporate Strategy Analyst"
    version: "1.0.0"
    status: active
    category: domain_specialist
    prompt_dir: agents/domain_specialists/strategy/
    description: |
      기업 전략, 경쟁 포지셔닝, M&A 시너지,
      시장 진입 전략 분석을 수행합니다.
    focus_areas:
      - 경쟁 구도 분석 (Porter's Five Forces)
      - 전략적 M&A 타깃 스크리닝
      - 시장 진입/확장 전략
      - 기술 로드맵 평가
    models:
      default: sonar-pro
      reasoning: claude-3-5-sonnet
    outputs:
      dir: output/strategy/
      format: json

  # ---------------------------------------------------------------------------
  # 9. REGULATORY MONITOR — 규제 모니터링 에이전트
  # ---------------------------------------------------------------------------
  - id: regulatory_monitor
    name: "AI Regulatory Policy Monitor"
    version: "1.0.0"
    status: active
    category: monitoring
    prompt_dir: agents/regulatory/
    description: |
      EU AI Act, US AI Policy, 각국 반도체 수출통제,
      규제 변화를 실시간 모니터링합니다.
    jurisdictions:
      - EU
      - US
      - KR
      - JP
      - CN
    regulatory_areas:
      - AI safety regulations
      - Export control (ITAR/EAR)
      - Data localization
      - Competition law (antitrust)
    ew_sensitivity: HIGH    # 규제 변화는 EW 민감도 높음
    models:
      default: sonar-pro
    outputs:
      dir: output/regulatory/
      format: json

  # ---------------------------------------------------------------------------
  # 10. QUALITY VALIDATOR — 품질 검증 에이전트
  # ---------------------------------------------------------------------------
  - id: quality_validator
    name: "Output Quality Validator"
    version: "1.1.0"
    status: active
    category: validation
    prompt_dir: agents/validation/
    description: |
      모든 에이전트 출력의 품질을 검증합니다.
      confidence score, completeness, consistency를 평가합니다.
    validation_rules:
      min_confidence_score: 0.70
      required_fields_check: true
      json_schema_validation: true
      duplicate_detection: true
      hallucination_flags:
        - unsourced_statistics
        - future_date_claims
        - contradictory_statements
    scoring:
      confidence: 0.40
      completeness: 0.30
      consistency: 0.20
      freshness: 0.10
    outputs:
      dir: logs/validation/
      format: json
      naming: "validation_{agent_id}_{timestamp}.json"
    runs_after: all_agents

  # ---------------------------------------------------------------------------
  # 11-12. RESERVED (planned)
  # ---------------------------------------------------------------------------
  - id: graph_visualizer
    name: "KG Visualizer"
    version: "0.1.0"
    status: planned
    category: visualization
    description: "Knowledge Graph 시각화 에이전트 (개발 예정)"

  - id: report_generator
    name: "Auto Report Generator"
    version: "0.1.0"
    status: planned
    category: reporting
    description: "주간 보고서 자동 생성 에이전트 (개발 예정)"

# =============================================================================
# ROUTING RULES
# =============================================================================
routing:
  default_pipeline:
    - ai_intel_collector
    - ew_detector
    - kg_builder
    - notion_sync

  conditional_routes:
    - condition: "ew_severity == CRITICAL"
      action: emergency_pipeline
      pipeline:
        - ai_intel_collector  # sonar-pro 강제
        - ew_detector
        - semiconductor_analyst   # 추가 심층 분석
        - investment_analyst
        - kg_builder
        - notion_sync

    - condition: "domain == semiconductor"
      action: domain_specialist_route
      additional_agents: [semiconductor_analyst]

    - condition: "domain == investment"
      action: domain_specialist_route
      additional_agents: [investment_analyst]

    - condition: "regulatory_event == true"
      action: regulatory_route
      additional_agents: [regulatory_monitor]

  always_run: [quality_validator]

# =============================================================================
# GLOBAL SETTINGS
# =============================================================================
global:
  log_level: INFO                    # DEBUG | INFO | WARNING | ERROR
  output_base_dir: output/
  log_base_dir: logs/
  timezone: Asia/Seoul
  week_format: "%Y-W%V"              # ISO 8601
  secrets:
    - PERPLEXITY_API_KEY
    - NOTION_API_KEY
    - GITHUB_TOKEN                   # optional, for PR creation
  notification:
    slack_webhook: false             # TODO: Slack 알림 추가
    email: false
  monitoring:
    prometheus: false                # TODO: 메트릭 수집
    grafana: false

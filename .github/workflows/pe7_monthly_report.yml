name: PE7· Monthly Report

on:
  schedule:
    - cron: '0 6 2 * *'  # 매월 2일 15:00 KST
  workflow_dispatch:
    inputs:
      report_month:
        description: '리포트 월 (YYYY-MM)'
        required: false
        default: ''
      include_kg:
        description: 'KG 변화량 포함'
        required: false
        default: 'true'
        type: boolean

env:
  PYTHON_VERSION: '3.12'
  OUTPUT_DIR: output/pe7_monthly

jobs:
  generate:
    name: 📈 Generate PE7 Monthly Report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Set month
        id: month
        run: |
          if [ -n "${{ github.event.inputs.report_month }}" ]; then
            echo "month=${{ github.event.inputs.report_month }}" >> $GITHUB_OUTPUT
          else
            echo "month=$(date -u -d '1 month ago' '+%Y-%m' 2>/dev/null || date -u '+%Y-%m')" >> $GITHUB_OUTPUT
          fi
      - name: Generate PE7 monthly report
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          REPORT_MONTH: ${{ steps.month.outputs.month }}
          INCLUDE_KG: ${{ github.event.inputs.include_kg || 'true' }}
        run: |
          mkdir -p ${{ env.OUTPUT_DIR }}
          python scripts/pe7_monthly_reporter.py \
            --month "$REPORT_MONTH" \
            --include-kg "$INCLUDE_KG" \
            --kg-dir knowledge_graph/ \
            --output "${{ env.OUTPUT_DIR }}/pe7_monthly_${REPORT_MONTH}.json"
      - uses: actions/upload-artifact@v4
        with:
          name: pe7-monthly
          path: ${{ env.OUTPUT_DIR }}/
          if-no-files-found: ignore

  update_notion:
    name: 📓 Update Notion
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: pe7-monthly
          path: ${{ env.OUTPUT_DIR }}/
      - name: Update Notion PE7 monthly
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          REPORT_MONTH: ${{ needs.generate.outputs.month || '' }}
        run: |
          python scripts/pe7_notion_monthly.py \
            --input-dir "${{ env.OUTPUT_DIR }}" \
            --month "$REPORT_MONTH"

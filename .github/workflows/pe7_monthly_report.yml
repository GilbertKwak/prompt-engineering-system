name: PE7 · Monthly Report

on:
  schedule:
    - cron: '0 5 1 * *'  # 매월 1일 05:00 UTC = 14:00 KST
  workflow_dispatch:
    inputs:
      month_override:
        description: '월 강제 지정 (예: 2026-05)'
        required: false
        default: ''

env:
  PYTHON_VERSION: '3.12'
  OUTPUT_DIR: output/pe7_monthly

jobs:
  pe7_monthly:
    name: 📊 PE7 Monthly Report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r automation/requirements.txt

      - name: Set month
        id: month
        run: |
          if [ -n "${{ github.event.inputs.month_override }}" ]; then
            MONTH="${{ github.event.inputs.month_override }}"
          else
            MONTH=$(date -u '+%Y-%m')
          fi
          echo "label=${MONTH}" >> $GITHUB_OUTPUT

      - name: Generate PE7 monthly report
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MONTH: ${{ steps.month.outputs.label }}
        run: |
          mkdir -p ${{ env.OUTPUT_DIR }}
          python automation/pe7_monthly_reporter.py \
            --month "$MONTH" \
            --output "${{ env.OUTPUT_DIR }}/pe7_monthly_${MONTH}.json"

      - uses: actions/upload-artifact@v4
        with:
          name: pe7-monthly-${{ steps.month.outputs.label }}
          path: ${{ env.OUTPUT_DIR }}/
          retention-days: 90

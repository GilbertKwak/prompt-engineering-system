# ============================================================
# PE-3 제품 PM용 QC 체크리스트 v2.0
# Version : 2.0 | Date: 2026-05-09
# Author  : Gilbert
# 대상  : PE-PROD-ORCH-v2 출력물 전체 (8-Block MECE)
# 연동  : pe7_product_mece_loop.py / pe3_product_validator.py
# 변경  : v1.0 → v2.0 | D6(JTBD) + D7(AARRR) + D8(Blue Ocean/NSM) 추가
# 총계  : 8차원 / 28개 체크항목 / PASS 기준 88점
# ============================================================

meta:
  name        : PE-3-PROD — 제품 PM용 QC 체크리스트
  version     : "2.0"
  created     : "2026-05-09"
  updated     : "2026-05-09"
  parent_spec : PE-3 자동검증 엔진 v2.0
  scope       : 신사업·제품 기획 프롬프트 품질 검증 (9-Framework 통합)
  pass_threshold: 88          # 88점 이상 자동 PASS
  total_weight: 100
  dimensions  : 8
  total_checks: 28

# ============================================================
# 차원 배점 배분 (총 100점)
# D1 명확성        : 14점
# D2 구조적 MECE성 : 14점
# D3 시장·재무     : 16점  ← IRR 핵심 (MUST 가중)
# D4 실행가능성    : 14점
# D5 적용가능성    : 14점
# D6 고객심리 JTBD : 14점  ← 신규 v2.0
# D7 성장퍼널 AARRR: 7점   ← 신규 v2.0
# D8 혁신·KPI      : 7점   ← 신규 v2.0 (Blue Ocean + NSM)
# ============================================================
dimensions:

  # ──────────────────────────────────────────────────────────
  - id     : D1
    name   : 명확성 (Clarity)
    weight : 14
    desc   : 입력 조건, 출력 포맷, 역할이 구체적으로 정의되어 있는가
    checks:
      - id      : D1-C1
        name    : 필수 입력필드 MECE 정의
        desc    : IDEA_NAME / DOMAIN / TARGET_CUSTOMER 등 입력필드가 명시되어 있는가
        pattern : "IDEA_NAME|PRODUCT_IDEA|\{\{.*\}\}|TARGET_CUSTOMER|DOMAIN"
        weight  : 5
        level   : MUST

      - id      : D1-C2
        name    : 출력 포맷 표준 준수
        desc    : 표준 블록 헤더(## B1~B8) 또는 섹션 구분자가 포함되어 있는가
        pattern : "## B[1-8]|={10,}|\\[\\d/[58]\\]"
        weight  : 5
        level   : MUST

      - id      : D1-C3
        name    : SYSTEM ROLE 명시
        desc    : """당신은 ..." 또는 McKinsey/Sequoia 수준 역할 정의가 포함되는가
        pattern : "SYSTEM ROLE|당신은|You are|McKinsey|Sequoia|Reforge"
        weight  : 4
        level   : MUST

  # ──────────────────────────────────────────────────────────
  - id     : D2
    name   : 구조적 MECE성 (Structure)
    weight : 14
    desc   : B1~B8 블록이 누락없이 MECE 커버하���가
    checks:
      - id      : D2-C1
        name    : 고객·문제 정의 블록 포함 (B1)
        desc    : 문제 정의, Pain Point, 3C 분석 중 하나 이상이 명시되어 있는가
        pattern : "Pain Point|3C|문제 정의|B1|고객 세그먼트"
        weight  : 3
        level   : MUST

      - id      : D2-C2
        name    : 시장구조 블록 포함 (B2)
        desc    : TAM/SAM/SOM 또는 Porter 5 Forces가 명시되어 있는가
        pattern : "TAM|SAM|SOM|Porter|B2|시장 규모"
        weight  : 3
        level   : MUST

      - id      : D2-C3
        name    : 비즈니스 모델 블록 포함 (B5)
        desc    : 수익모델, Unit Economics, Lean Canvas 중 하나 이상이 명시되어 있는가
        pattern : "SaaS|수익모델|Unit Economics|LTV|CAC|Lean Canvas|B5"
        weight  : 3
        level   : MUST

      - id      : D2-C4
        name    : 실행 로드맵 블록 포함 (B8)
        desc    : Phase별 마일스톤 또는 KPI가 명시되어 있는가
        pattern : "Phase [123]|마일스톤|로드맵|KPI|B8|Go.*No-Go"
        weight  : 3
        level   : MUST

      - id      : D2-C5
        name    : Strategic Priorities 표 포함
        desc    : Priority / Strategy / Impact / Difficulty 표가 포함되어 있는가
        pattern : "Priority|Strategic Priorities|Impact.*Difficulty|Time Horizon"
        weight  : 2
        level   : SHOULD

  # ──────────────────────────────────────────────────────────
  - id     : D3
    name   : 시장·재무 특이성 (Market & Finance)
    weight : 16
    desc   : TAM/SAM/SOM 수치화 + IRR 역산 + 3시나리오가 모두 포함되는가
    checks:
      - id      : D3-C1
        name    : TAM/SAM/SOM 수치 기재
        desc    : TAM, SAM, SOM 세 가지에 $ 또는 단위 수치가 모두 포함되는가
        pattern : "TAM.*\\$|SAM.*\\$|SOM.*\\$|TAM.*[\\d]+|\\$[\\d]+[BMT]"
        weight  : 5
        level   : MUST

      - id      : D3-C2
        name    : Unit Economics 4지표
        desc    : CAC / LTV / Payback Period / ARPU 중 2개 이상이 포함되는가
        pattern : "LTV.*CAC|CAC.*LTV|Payback|ARPU|Unit Economics"
        weight  : 4
        level   : MUST

      - id      : D3-C3
        name    : IRR 역산 수식 명시
        desc    : IRR 역산 공식 또는 목표 IRR 수치가 포함되는가
        pattern : "IRR.*%|\\d+%.*IRR|역산|Entry EV|Exit.*Multiple"
        weight  : 4
        level   : MUST

      - id      : D3-C4
        name    : 3-시나리오 (Bull/Base/Bear)
        desc    : Bull Case, Base Case, Bear Case 세 가지가 모두 명시되는가
        pattern : "Bull.*Base.*Bear|Bull Case|Base Case|Bear Case|낙관.*기준.*비관"
        weight  : 3
        level   : MUST

  # ──────────────────────────────────────────────────────────
  - id     : D4
    name   : 실행가능성 (Executability)
    weight : 14
    desc   : TRL 평가 + 로드맵 + 리스크 대응방안이 포함되는가
    checks:
      - id      : D4-C1
        name    : TRL 수준 명시
        desc    : TRL 1~9 수준 수치가 명시되어 있는가
        pattern : "TRL [1-9]|TRL\\d|Technology Readiness"
        weight  : 4
        level   : SHOULD

      - id      : D4-C2
        name    : Phase 로드맵 명시
        desc    : Phase 1/2/3 또는 0~6개월 / 6~18개월 구분 로드맵이 명시되어 있는가
        pattern : "Phase [123]|0~6|6~18|18~36|로드맵|마일스톤"
        weight  : 5
        level   : MUST

      - id      : D4-C3
        name    : 리스크 & 미티게이션
        desc    : 크리티컬 리스크 또는 Mitigation 방안이 최소 2개 이상 명시되어 있는가
        pattern : "Critical|리스크.*Mitigation|Mitigation|대응 방안|Contingency|크리티컬"
        weight  : 5
        level   : MUST

  # ──────────────────────────────────────────────────────────
  - id     : D5
    name   : 적용가능성 (Applicability)
    weight : 14
    desc   : Executive Summary + Top 5 Insights + 크로스 라이브러리 권고가 포함되는가
    checks:
      - id      : D5-C1
        name    : Executive Summary 또는 Top 5 Insights 포함
        desc    : Executive Summary 또는 Top 5 Key Insights 섹션이 포함되어 있는가
        pattern : "Executive Summary|Top 5|Key Insights|핵심 결론"
        weight  : 5
        level   : MUST

      - id      : D5-C2
        name    : 근거수준 표시
        desc    : "[HIGH] [MEDIUM] [LOW] [ESTIMATED] 중 하나 이상 명시"
        pattern : "\\[HIGH\\]|\\[MEDIUM\\]|\\[LOW\\]|\\[ESTIMATED\\]"
        weight  : 4
        level   : SHOULD

      - id      : D5-C3
        name    : 크로스 라이브러리 연계 권고
        desc    : PE-STRAT/PE-FIN/PE-SEMI/PE-AI/PE-DD/PE-NBD 중 하나 이상 포함되는가
        pattern : "PE-STRAT|PE-FIN|PE-SEMI|PE-AI|PE-DD|PE-NBD|\\[CROSS:"
        weight  : 5
        level   : MUST

  # ──────────────────────────────────────────────────────────
  # ★ 신규 v2.0 — D6 JTBD 고객심리 분석
  # ──────────────────────────────────────────────────────────
  - id     : D6
    name   : 고객심리 JTBD (Jobs-to-be-Done)
    weight : 14
    desc   : Functional / Emotional / Social Jobs + Switching Trigger가 명시되는가
    version_added: "2.0"
    checks:
      - id      : D6-C1
        name    : Functional Jobs 최소 2개
        desc    : 고객이 실제 해결하려는 기능적 과업(Functional Job)이 2개 이상 명시되는가
        pattern : "Functional Job|기능적 과업|B3-1|Functional.*해결"
        weight  : 4
        level   : MUST

      - id      : D6-C2
        name    : Emotional Jobs 최소 1개
        desc    : 고객의 감정적 욕구(Emotional Job)가 1개 이상 명시되는가
        pattern : "Emotional Job|감정적 욕구|B3-2|Emotional.*고객"
        weight  : 3
        level   : MUST

      - id      : D6-C3
        name    : Social Jobs 최소 1개
        desc    : 사회적 인정 또는 정체성 욕구(Social Job)가 명시되는가
        pattern : "Social Job|사회적 인정|정체성|B3-3"
        weight  : 3
        level   : SHOULD

      - id      : D6-C4
        name    : Switching Trigger 최소 2개
        desc    : 고객이 기존 솔루션에서 이탈하는 전환 트리거가 2개 이상 명시되는가
        pattern : "Switching Trigger|전환 트리거|이탈 계기|B3-4|기존.*이탈"
        weight  : 4
        level   : MUST

  # ──────────────────────────────────────────────────────────
  # ★ 신규 v2.0 — D7 AARRR 성장퍼널
  # ──────────────────────────────────────────────────────────
  - id     : D7
    name   : 성장퍼널 AARRR
    weight : 7
    desc   : Acquisition / Activation / Retention / Revenue / Referral 5단계가 포함되는가
    version_added: "2.0"
    checks:
      - id      : D7-C1
        name    : Acquisition CAC 포함
        desc    : 고객 획득 채널 Top3 또는 CAC 가정값이 명시되는가
        pattern : "Acquisition|CAC|고객 획득|채널.*Top|B4-1"
        weight  : 2
        level   : MUST

      - id      : D7-C2
        name    : Retention 락인 요소 포함
        desc    : 락인(Lock-in) 요소 또는 재방문율 KPI가 명시되는가
        pattern : "Retention|락인|Lock-in|재방문|B4-3"
        weight  : 2
        level   : MUST

      - id      : D7-C3
        name    : Revenue ARPU 또는 결제전환율
        desc    : ARPU 또는 결제 전환율 수치가 명시되는가
        pattern : "ARPU|결제 전환|Revenue.*전환|B4-4"
        weight  : 2
        level   : SHOULD

      - id      : D7-C4
        name    : Referral 바이럴 메커니즘
        desc    : 바이럴 메커니즘 또는 NPS 목표값이 명시되는가
        pattern : "Referral|바이럴|NPS|추천.*메커니즘|B4-5"
        weight  : 1
        level   : SHOULD

  # ──────────────────────────────────────────────────────────
  # ★ 신규 v2.0 — D8 Blue Ocean & North Star Metric
  # ──────────────────────────────────────────────────────────
  - id     : D8
    name   : 혁신·KPI (Blue Ocean & NSM)
    weight : 7
    desc   : ERRC 4액션 + North Star Metric 정의 + Vanity Metric 경고가 포함되는가
    version_added: "2.0"
    checks:
      - id      : D8-C1
        name    : ERRC 4액션 프레임워크
        desc    : Eliminate / Reduce / Raise / Create 4개 액션이 모두 명시되는가
        pattern : "Eliminate|Reduce|Raise|Create|ERRC|Blue Ocean|B7-1"
        weight  : 3
        level   : MUST

      - id      : D8-C2
        name    : North Star Metric 정의
        desc    : North Star Metric 또는 핵심 성장 지표가 측정 주기와 함께 명시되는가
        pattern : "North Star|NSM|핵심 성장 지표|B7-3|North Star Metric"
        weight  : 2
        level   : MUST

      - id      : D8-C3
        name    : NSM 선행지표 (Input Metrics)
        desc    : NSM을 움직이는 선행지표(Input Metrics)가 최소 2개 명시되는가
        pattern : "Input Metric|선행지표|B7-4|NSM.*선행"
        weight  : 1
        level   : SHOULD

      - id      : D8-C4
        name    : Vanity Metric 위험 경고
        desc    : 허무 지표(Vanity Metric) 위험 항목이 명시되는가
        pattern : "Vanity Metric|허무 지표|B7-5|Vanity.*위험"
        weight  : 1
        level   : SHOULD

# ============================================================
# PE-3 자동검증 셀프체크 (v2.0 확장)
# ============================================================
self_check_items:
  # D1~D5 (기존 유지)
  - "[ ] IDEA_NAME / DOMAIN / TARGET_CUSTOMER 입력필드 명시"
  - "[ ] B1~B8 블록 헤더 MECE 완비"
  - "[ ] TAM/SAM/SOM 수치화 완료"
  - "[ ] Unit Economics (CAC/LTV/Payback/ARPU) 기재"
  - "[ ] IRR 역산 수식 명시 (B6-2 MUST)"
  - "[ ] Bull/Base/Bear 3-시나리오 완성"
  - "[ ] Phase 1/2/3 로드맵 & KPI 5개 기재"
  - "[ ] 리스크 & Mitigation 3개 이상"
  - "[ ] Executive Summary + Top 5 Key Insights"
  - "[ ] 크로스 라이브러리 [CROSS: XX] 태그 포함"
  # D6 JTBD (신규)
  - "[ ] Functional Jobs 2개 이상 (B3-1)"
  - "[ ] Emotional Jobs 1개 이상 (B3-2)"
  - "[ ] Switching Trigger 2개 이상 (B3-4)"
  # D7 AARRR (신규)
  - "[ ] Acquisition 채널 Top3 + CAC (B4-1)"
  - "[ ] Retention 락인 요소 (B4-3)"
  - "[ ] Revenue ARPU + 결제전환율 (B4-4)"
  # D8 Blue Ocean / NSM (신규)
  - "[ ] ERRC 4액션 표 완성 (B7-1)"
  - "[ ] North Star Metric 정의 (B7-3)"
  - "[ ] Vanity Metric 위험 경고 (B7-5)"

# ============================================================
# 점수 등급 정의
# ============================================================
grade_thresholds:
  S  : { min: 95, label: "⭐ S-Grade — 즉시 배포 가능"                 }
  A  : { min: 88, label: "✅ A-Grade — PASS (정식 사용 가능)"           }
  B  : { min: 75, label: "⚠️ B-Grade — REVIEW (일부 수정 후 사용)"      }
  C  : { min: 60, label: "🔄 C-Grade — REWORK (구조 재설계 필요)"       }
  F  : { min:  0, label: "❌ F-Grade — FAIL (실사용 불가)"              }


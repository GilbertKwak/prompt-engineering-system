# PE-7 Secrets Schema — PE-1/PE-2/PE-3 엔진 연계 설정
# Version: 1.0.0 | Updated: 2026-04-26
# 이 파일은 필요한 Secrets의 구조와 연계 엔진을 정의합니다.
# 실제 값은 GitHub Secrets에 저장 — 이 파일에 값 입력 금지

version: "1.0.0"
project: prompt-engineering-system

secrets:
  # ─────────────────────────────────────────
  # 1. NOTION KPI DB
  # ─────────────────────────────────────────
  NOTION_API_KEY:
    description: "Notion Integration Token (secret_xxx...)"
    source: "notion.so → Settings → Integrations → New Integration"
    format: "^secret_[A-Za-z0-9]{43}$"
    used_by:
      - PE-1  # auto-refinement: KPI 지표 읽기/업데이트
      - PE-2  # auto-proliferation: 새 prompt 항목 Notion DB에 기록
      - PE-3  # auto-validation: 검증 결과 DB 저장
      - PE-7  # ai-automation-design: 통합 대시보드 연계
    env_var: NOTION_API_KEY
    required: true

  NOTION_KPI_DB_ID:
    description: "KPI Database ID — Notion URL의 /d/{32자리}/ 부분"
    source: "Notion DB 페이지 URL → /d/ 뒤 32자리 hex 문자열"
    format: "^[a-f0-9]{32}$"
    example: "abcdef1234567890abcdef1234567890"
    note: "하이픈 포함 UUID라면 하이픈 제거 후 입력"
    used_by:
      - PE-1  # KPI 읽기: validate → update
      - PE-2  # 새 prompt 레코드 생성
      - PE-3  # 검증 Pass/Fail 결과 기록
    env_var: NOTION_KPI_DB_ID
    required: true

  # ─────────────────────────────────────────
  # 2. GOOGLE SHEETS
  # ─────────────────────────────────────────
  GOOGLE_SHEETS_ID:
    description: "Google Sheets Spreadsheet ID"
    source: "Sheets URL → /spreadsheets/d/{ID}/edit 에서 {ID} 추출"
    format: "^[A-Za-z0-9_-]{44}$"
    example: "1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgVE2upms"
    used_by:
      - PE-1  # 실험 로그 시트 기록
      - PE-3  # 검증 결과 누적 시트
      - PE-7  # 대시보드 데이터 소스
    env_var: GOOGLE_SHEETS_ID
    required: true

  GOOGLE_SERVICE_ACCOUNT_JSON:
    description: "GCP 서비스 계정 JSON 키 전체 내용"
    source: "GCP Console → IAM → 서비스 계정 → KEYS → JSON 다운로드"
    format: "JSON string (minified 또는 원본)"
    scopes_required:
      - "https://www.googleapis.com/auth/spreadsheets"
      - "https://www.googleapis.com/auth/drive.readonly"
    used_by:
      - PE-1
      - PE-3
      - PE-7
    env_var: GOOGLE_SERVICE_ACCOUNT_JSON
    required: true
    security_note: "절대 파일로 커밋 금지 — GitHub Secret으로만 관리"

  # ─────────────────────────────────────────
  # 3. SLACK NOTIFICATIONS
  # ─────────────────────────────────────────
  SLACK_WEBHOOK_URL:
    description: "Slack Incoming Webhook URL"
    source: "api.slack.com → Your Apps → Incoming Webhooks → Add Webhook"
    format: "^https://hooks\\.slack\\.com/services/[A-Z0-9]+/[A-Z0-9]+/[A-Za-z0-9]+$"
    example: "https://hooks.slack.com/services/T.../B.../xxx"
    used_by:
      - PE-1  # refinement 완료 알림
      - PE-2  # proliferation 배치 완료 알림
      - PE-3  # validation 실패시 즉시 알림
      - PE-7  # 일일 파이프라인 요약 알림
    env_var: SLACK_WEBHOOK_URL
    required: true
    channels:
      - "#pe-automation"  # 권장 채널명

# ─────────────────────────────────────────
# PE 엔진별 Secret 의존성 매트릭스
# ─────────────────────────────────────────
dependency_matrix:
  PE-1_auto-refinement:
    required: [NOTION_API_KEY, NOTION_KPI_DB_ID, GOOGLE_SHEETS_ID, GOOGLE_SERVICE_ACCOUNT_JSON, SLACK_WEBHOOK_URL]
    optional: []

  PE-2_auto-proliferation:
    required: [NOTION_API_KEY, NOTION_KPI_DB_ID, SLACK_WEBHOOK_URL]
    optional: [GOOGLE_SHEETS_ID, GOOGLE_SERVICE_ACCOUNT_JSON]

  PE-3_auto-validation:
    required: [NOTION_API_KEY, NOTION_KPI_DB_ID, GOOGLE_SHEETS_ID, GOOGLE_SERVICE_ACCOUNT_JSON, SLACK_WEBHOOK_URL]
    optional: []

  PE-7_ai-automation-design:
    required: [NOTION_API_KEY, NOTION_KPI_DB_ID, GOOGLE_SHEETS_ID, GOOGLE_SERVICE_ACCOUNT_JSON, SLACK_WEBHOOK_URL]
    optional: []

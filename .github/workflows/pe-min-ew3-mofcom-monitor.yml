name: PE· MIN EW3 MOFCOM Monitor

on:
  schedule:
    - cron: '0 4 * * 1,3,5'  # 월/수/금 13:00 KST
  workflow_dispatch:
    inputs:
      force_alert:
        description: '알림 강제 발동'
        required: false
        default: 'false'
        type: boolean
      dry_run:
        description: 'Dry-run'
        required: false
        default: 'false'
        type: boolean

env:
  PYTHON_VERSION: '3.12'
  OUTPUT_DIR: output/mofcom

jobs:
  monitor:
    name: 👁️ MOFCOM Monitor
    runs-on: ubuntu-latest
    outputs:
      ew_triggered: ${{ steps.monitor.outputs.ew_triggered }}
      alert_level: ${{ steps.monitor.outputs.alert_level }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run MOFCOM monitor
        id: monitor
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          FORCE_ALERT: ${{ github.event.inputs.force_alert || 'false' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          mkdir -p ${{ env.OUTPUT_DIR }}
          python scripts/mofcom_monitor.py \
            --output "${{ env.OUTPUT_DIR }}/mofcom_report.json" \
            --force-alert "$FORCE_ALERT" \
            --dry-run "$DRY_RUN"

          EW=$(python3 -c "import json,sys; d=json.load(open('${{ env.OUTPUT_DIR }}/mofcom_report.json')); print(str(d.get('ew_triggered',False)).lower())" 2>/dev/null || echo 'false')
          LEVEL=$(python3 -c "import json,sys; d=json.load(open('${{ env.OUTPUT_DIR }}/mofcom_report.json')); print(d.get('alert_level','LOW'))" 2>/dev/null || echo 'LOW')
          echo "ew_triggered=${EW}" >> $GITHUB_OUTPUT
          echo "alert_level=${LEVEL}" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v4
        with:
          name: mofcom-report
          path: ${{ env.OUTPUT_DIR }}/mofcom_report.json
          if-no-files-found: ignore

  notify:
    name: 🔔 Notify
    needs: monitor
    runs-on: ubuntu-latest
    if: needs.monitor.outputs.ew_triggered == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: mofcom-report
          path: ${{ env.OUTPUT_DIR }}/
      - name: Send EW notification
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          ALERT_LEVEL: ${{ needs.monitor.outputs.alert_level }}
        run: |
          python scripts/ew_notifier.py \
            --report "${{ env.OUTPUT_DIR }}/mofcom_report.json" \
            --level "$ALERT_LEVEL"

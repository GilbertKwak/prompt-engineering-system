name: PE· VC Layer Apply

on:
  workflow_dispatch:
    inputs:
      target_layer:
        description: '대상 VC 레이어'
        required: true
      apply_mode:
        description: '적용 모드'
        required: false
        default: 'merge'
        type: choice
        options:
          - merge
          - replace
          - diff-only
      dry_run:
        description: 'Dry-run'
        required: false
        default: 'false'
        type: boolean

env:
  PYTHON_VERSION: '3.12'
  OUTPUT_DIR: output/vc_layer

jobs:
  validate_layer:
    name: ✅ Validate VC Layer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Validate VC layer
        env:
          LAYER: ${{ github.event.inputs.target_layer }}
        run: |
          python scripts/vc_layer_validator.py \
            --layer "$LAYER" \
            --schema schemas/vc_layer_schema.json

  apply_layer:
    name: ⚙️ Apply VC Layer
    needs: validate_layer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Apply VC layer
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          LAYER: ${{ github.event.inputs.target_layer }}
          MODE: ${{ github.event.inputs.apply_mode || 'merge' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          mkdir -p ${{ env.OUTPUT_DIR }}
          python scripts/vc_layer_applier.py \
            --layer "$LAYER" \
            --mode "$MODE" \
            --output "${{ env.OUTPUT_DIR }}/vc_apply_result.json" \
            --dry-run "$DRY_RUN"
      - name: Commit VC layer
        env:
          LAYER: ${{ github.event.inputs.target_layer }}
          MODE: ${{ github.event.inputs.apply_mode || 'merge' }}
        run: |
          git config --global user.name "VC Layer Bot"
          git config --global user.email "vc-layer-bot@github-actions"
          git add vc_layers/ output/vc_layer/ || true
          git diff --staged --quiet || git commit -m \
            "auto: vc-layer ${LAYER} (${MODE}) [VC Layer Apply]"
          git push || true
      - uses: actions/upload-artifact@v4
        with:
          name: vc-apply-result
          path: ${{ env.OUTPUT_DIR }}/vc_apply_result.json
          if-no-files-found: ignore

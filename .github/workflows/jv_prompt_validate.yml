name: PE· JV Prompt Validate

on:
  push:
    branches: [main, develop]
    paths:
      - 'prompts/**'
      - 'schemas/**'
  pull_request:
    paths:
      - 'prompts/**'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'

jobs:
  validate:
    name: ✅ JV Prompt Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Validate JV prompts
        run: |
          python scripts/jv_prompt_validator.py \
            --schema schemas/jv_prompt_schema.json \
            --dir prompts/jv/ \
            --strict
      - name: Check PE-7 metadata
        run: |
          python scripts/check_pe7_metadata.py \
            --dir prompts/ \
            --required-fields "id,version,domain,created_at"
